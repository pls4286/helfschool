<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acid Reflux — Visuals Screen | helf.school</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --navy:#1B2A4A;--coral:#E8634A;--cream:#FAF7F2;--sage:#7A9E87;--amber:#E8A84A;
      --digest:#D47C3A;--digest-dim:rgba(212,124,58,.18);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#0F1A2E;color:#fff;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

    /* ── TOP BAR ── */
    .topbar{background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.08);padding:0 1.5rem;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .topbar-sub{font-size:.75rem;color:rgba(255,255,255,.75);}
    .slide-counter{font-size:.85rem;font-weight:600;color:rgba(255,255,255,.90);}

    /* ── PROGRESS ── */
    .progress-bar{height:3px;background:rgba(255,255,255,.08);flex-shrink:0;}
    .progress-fill{height:100%;background:var(--digest);transition:width .35s ease;}

    /* ── VISUAL STAGE ── */
    .visual-stage{flex:1;background:var(--navy);display:flex;align-items:center;justify-content:center;padding:0.6rem 0.75rem;position:relative;overflow:hidden;}
    .visual-stage::before{content:'';position:absolute;top:-80px;right:-80px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(212,124,58,.1) 0%,transparent 70%);pointer-events:none;}
    .slide-type-badge{position:absolute;top:12px;right:12px;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.22rem .65rem;border-radius:100px;}
    .badge-opening{background:rgba(232,99,74,.2);color:var(--coral);}
    .badge-section{background:rgba(27,42,74,.6);color:rgba(255,255,255,.85);}
    .badge-cta{background:rgba(122,158,135,.2);color:var(--sage);}
    .badge-closing{background:rgba(232,168,74,.2);color:var(--amber);}
    .visual-content{width:100%;max-height:100%;display:flex;align-items:center;justify-content:center;}

    /* ── BOTTOM NAV ── */
    .bottom-nav{background:rgba(255,255,255,.03);border-top:1px solid rgba(255,255,255,.07);padding:.5rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .nav-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.75);font-size:.82rem;font-weight:500;padding:.45rem 1rem;border-radius:7px;cursor:pointer;transition:all .2s;}
    .nav-btn:hover{background:rgba(255,255,255,.10);color:#fff;}
    .nav-btn:disabled{opacity:.3;cursor:not-allowed;}
    .nav-btn-primary{background:var(--digest);border-color:var(--digest);color:#fff;}
    .nav-btn-primary:hover{background:#C06A2A;}
    .nav-dots{display:flex;gap:.4rem;}
    .nav-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.20);cursor:pointer;transition:all .2s;}
    .nav-dot.active{background:var(--digest);transform:scale(1.3);}

    /* ── VISUAL COMPONENT STYLES ── */
    /* Stat card */
    .stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:1.5rem 1.75rem;width:100%;max-width:340px;text-align:center;}
    .stat-big{font-family:'Fraunces',serif;font-size:4.5rem;font-weight:700;line-height:1;}
    .stat-label{font-size:.9rem;color:rgba(255,255,255,.90);margin-top:.5rem;line-height:1.45;}
    .stat-source{font-size:.75rem;color:rgba(255,255,255,.65);margin-top:.75rem;letter-spacing:.04em;}

    /* Risk factors grid */
    .factors-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;width:100%;}
    .factor-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:.75rem .85rem;display:flex;align-items:flex-start;gap:.6rem;opacity:0;transform:translateY(8px);transition:opacity .4s ease,transform .4s ease;}
    .factor-card.visible{opacity:1;transform:translateY(0);}
    .factor-icon{font-size:1.1rem;flex-shrink:0;}
    .factor-title{font-size:.8rem;font-weight:600;color:#fff;margin-bottom:.15rem;}
    .factor-sub{font-size:.73rem;color:rgba(255,255,255,.85);line-height:1.4;}

    /* Medication ladder */
    .med-ladder{display:flex;flex-direction:column;gap:.5rem;width:100%;}
    .med-step{display:flex;align-items:center;gap:.85rem;padding:.7rem 1rem;border-radius:10px;border:1px solid;opacity:0;transform:translateX(-12px);transition:opacity .4s ease,transform .4s ease;}
    .med-step.visible{opacity:1;transform:translateX(0);}
    .med-step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;}
    .med-step-text h5{font-size:.85rem;font-weight:600;color:#fff;margin-bottom:.1rem;}
    .med-step-text p{font-size:.75rem;color:rgba(255,255,255,.85);line-height:1.4;}
    .ms1{background:rgba(122,158,135,.08);border-color:rgba(122,158,135,.25);}
    .ms1 .med-step-num{background:rgba(122,158,135,.2);color:var(--sage);}
    .ms2{background:rgba(232,168,74,.07);border-color:rgba(232,168,74,.22);}
    .ms2 .med-step-num{background:rgba(232,168,74,.18);color:var(--amber);}
    .ms3{background:rgba(212,124,58,.1);border-color:rgba(212,124,58,.3);}
    .ms3 .med-step-num{background:rgba(212,124,58,.2);color:var(--digest);}

    /* Research summary */
    .research-rows{display:flex;flex-direction:column;gap:.5rem;width:100%;}
    .research-row{display:flex;flex-direction:column;gap:.3rem;padding:.55rem .7rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:9px;opacity:0;transition:opacity .4s ease;}
    .research-row.visible{opacity:1;}
    .rr-badge{font-size:.62rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;background:rgba(212,124,58,.15);color:var(--digest);padding:.2rem .55rem;border-radius:100px;white-space:nowrap;align-self:flex-start;}
    .rr-text{font-size:.78rem;color:rgba(255,255,255,.85);line-height:1.55;}
    .rr-text strong{color:#fff;}
    .rr-takehome{display:block;margin-top:.35rem;padding:.3rem .6rem;background:rgba(212,124,58,.18);border-left:3px solid var(--digest);border-radius:0 6px 6px 0;font-size:.78rem;font-weight:700;color:#fff;line-height:1.4;}

    /* CTA action cards */
    .cta-cards{display:flex;flex-direction:column;gap:.6rem;width:100%;}
    .cta-card{display:flex;align-items:flex-start;gap:.85rem;padding:.85rem 1rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:11px;opacity:0;transform:translateY(8px);transition:opacity .4s ease,transform .4s ease;}
    .cta-card.visible{opacity:1;transform:translateY(0);}
    .cta-num{width:28px;height:28px;background:var(--digest);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:#fff;flex-shrink:0;}
    .cta-text h5{font-size:.87rem;font-weight:600;color:#fff;margin-bottom:.2rem;}
    .cta-text p{font-size:.77rem;color:rgba(255,255,255,.80);line-height:1.45;}

    /* Intro / sign-off */
    .intro-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.1rem;text-align:center;padding:1rem;}
    .intro-logo{font-family:'Fraunces',serif;font-size:2rem;font-weight:700;color:var(--digest);}
    .intro-tagline{font-size:.72rem;color:rgba(255,255,255,.70);letter-spacing:.14em;text-transform:uppercase;}
    .intro-topic{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:600;color:#fff;line-height:1.3;max-width:280px;}
    .intro-series{font-size:.72rem;color:rgba(255,255,255,.70);margin-top:.25rem;}
    .end-logo{font-family:'Fraunces',serif;font-size:2.8rem;font-weight:700;color:var(--digest);margin-bottom:.2rem;text-align:center;}
    .end-tagline{font-size:.78rem;color:rgba(255,255,255,.70);text-align:center;margin-bottom:1.25rem;}
    .end-series{display:flex;flex-wrap:wrap;gap:.35rem;justify-content:center;}
    .end-pill{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);font-size:.68rem;padding:.18rem .65rem;border-radius:100px;}
    .end-pill.active{background:rgba(212,124,58,.14);border-color:var(--digest);color:var(--digest);}
  
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-sub">helf.school · Digestive Health Series · Article 13 — Acid Reflux · Visuals Screen</div>
  <div class="slide-counter">Screen <span id="slideNum">1</span> of 9</div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:11.1%"></div></div>

<div class="visual-stage" id="visualStage">
  <div class="slide-type-badge" id="typeBadge"></div>
  <div class="visual-content" id="visualContent"></div>
</div>

<div class="bottom-nav">
  <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>← Previous</button>
  <div class="nav-dots" id="navDots"></div>
  <button class="nav-btn nav-btn-primary" id="nextBtn" onclick="navigate(1)">Next →</button>
</div>

<script>
const TOTAL = 9;
const badgeCls = { opening:'badge-opening', section:'badge-section', cta:'badge-cta', closing:'badge-closing' };
const badgeLbl = { opening:'Opening', section:'Section', cta:'Call to Action', closing:'Closing' };
const slideTypes = ['opening','opening','section','section','section','section','section','cta','closing'];
const slideTitles = ['Intro', '1 in 4', 'Sphincter', 'Risk Factors', "Barrett's", 'Treatment', 'Evidence', 'Action', 'Sign-off'];

// ── VISUALS ──
const visuals = {

  s0: () => `
    <div class="intro-wrap">
      <div class="intro-logo">helf<span style="color:rgba(255,255,255,.60)">.</span>school</div>
      <div class="intro-tagline">Health Education</div>
      <div class="intro-topic">Acid Reflux — Causes, Symptoms &amp; Treatment</div>

    </div>`,

  s1: () => `
    <div class="stat-card">
      <div class="stat-big" style="color:var(--digest)">1 in 4</div>

      <div class="stat-source">Guts UK · NHS · Health Research Authority</div>
    </div>`,

  s2: () => {
    setTimeout(() => {
      ['lc0','lc1','lc2'].forEach((id,i) => {
        setTimeout(() => { const e = document.getElementById(id); if(e) e.classList.add('visible'); }, 600 + i * 350);
      });
    }, 100);
    return `
    <div style="width:100%;display:flex;flex-direction:column;gap:.45rem;padding:0 .2rem;">

      <div style="font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.80);text-align:center;">How Acid Reflux Happens</div>

      <div style="display:flex;gap:.6rem;justify-content:center;align-items:flex-start;">

        <!-- NORMAL -->
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:.25rem;">
          <div style="font-size:.8rem;font-weight:700;color:#7A9E87;background:rgba(122,158,135,.15);border:1px solid rgba(122,158,135,.4);border-radius:6px;padding:.12rem .55rem;">✓ Normal</div>
          <svg width="135" height="175" viewBox="0 0 135 175">
            <text x="67" y="11" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,.70)" font-weight="600">Throat</text>
            <rect x="47" y="14" width="38" height="74" rx="8" fill="rgba(255,255,255,.07)" stroke="rgba(255,255,255,.75)" stroke-width="2.5"/>
            <line x1="87" y1="32" x2="113" y2="26" stroke="rgba(255,255,255,.5)" stroke-width="1.2"/>
            <text x="115" y="24" font-size="8.5" fill="rgba(255,255,255,.80)" font-weight="600">Oesophagus</text>
            <line x1="66" y1="22" x2="66" y2="55" stroke="#7A9E87" stroke-width="2" stroke-dasharray="4,3"/>
            <polygon points="66,63 59,50 73,50" fill="#7A9E87"/>
            <path d="M24 90 Q46 82 66 84 Q86 82 110 90" fill="none" stroke="rgba(255,255,255,.45)" stroke-width="1.8" stroke-dasharray="5,3"/>
            <text x="66" y="100" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,.55)" font-style="italic">diaphragm</text>
            <rect x="41" y="86" width="50" height="13" rx="5" fill="#7A9E87"/>
            <text x="66" y="96.5" text-anchor="middle" font-size="9" fill="#fff" font-weight="800">LOS — CLOSED ✓</text>
            <line x1="41" y1="92" x2="14" y2="104" stroke="rgba(255,255,255,.55)" stroke-width="1.2"/>
            <text x="11" y="100" text-anchor="end" font-size="8" fill="rgba(255,255,255,.80)" font-weight="700">Lower Oesophageal</text>
            <text x="11" y="110" text-anchor="end" font-size="8" fill="rgba(255,255,255,.80)" font-weight="700">Sphincter (LOS)</text>
            <path d="M32 102 Q23 118 27 136 Q33 152 66 154 Q99 152 105 136 Q109 118 100 102 Z" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.65)" stroke-width="2.5"/>
            <text x="66" y="127" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,.70)" font-weight="600">STOMACH</text>
            <text x="66" y="144" text-anchor="middle" font-size="13" fill="#7A9E87" font-weight="800">acid stays ✓</text>
          </svg>
        </div>

        <!-- GORD -->
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:.25rem;">
          <div style="font-size:.8rem;font-weight:700;color:#E8634A;background:rgba(232,99,74,.15);border:1px solid rgba(232,99,74,.4);border-radius:6px;padding:.12rem .55rem;">✗ GORD</div>
          <svg width="135" height="175" viewBox="0 0 135 175">
            <text x="67" y="11" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,.70)" font-weight="600">Throat</text>
            <rect x="47" y="14" width="38" height="74" rx="8" fill="rgba(232,99,74,.10)" stroke="rgba(255,255,255,.75)" stroke-width="2.5"/>
            <rect x="48" y="36" width="36" height="52" rx="7" fill="rgba(232,99,74,.28)"/>
            <line x1="87" y1="32" x2="113" y2="26" stroke="rgba(255,255,255,.5)" stroke-width="1.2"/>
            <text x="115" y="24" font-size="8.5" fill="rgba(255,255,255,.80)" font-weight="600">Oesophagus</text>
            <text x="115" y="34" font-size="8" fill="rgba(232,99,74,.90)">(inflamed)</text>
            <circle cx="59" cy="87" r="4" fill="#E8634A" opacity="0" style="animation:rise2 2s ease-in-out 0s infinite"/>
            <circle cx="67" cy="87" r="3" fill="#E8A84A" opacity="0" style="animation:rise2 2s ease-in-out .7s infinite"/>
            <circle cx="75" cy="87" r="4" fill="#E8634A" opacity="0" style="animation:rise2 2s ease-in-out 1.4s infinite"/>
            <path d="M24 90 Q46 82 66 84 Q86 82 110 90" fill="none" stroke="rgba(255,255,255,.45)" stroke-width="1.8" stroke-dasharray="5,3"/>
            <text x="66" y="100" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,.55)" font-style="italic">diaphragm</text>
            <path d="M41 90 Q54 83 66 90 Q78 97 91 90" fill="none" stroke="#E8634A" stroke-width="4" stroke-linecap="round"/>

            <line x1="41" y1="90" x2="14" y2="104" stroke="rgba(255,255,255,.55)" stroke-width="1.2"/>
            <text x="11" y="100" text-anchor="end" font-size="8" fill="rgba(255,255,255,.80)" font-weight="700">Lower Oesophageal</text>
            <text x="11" y="110" text-anchor="end" font-size="8" fill="rgba(255,255,255,.80)" font-weight="700">Sphincter (LOS)</text>
            <path d="M32 102 Q23 118 27 136 Q33 152 66 154 Q99 152 105 136 Q109 118 100 102 Z" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.65)" stroke-width="2.5"/>
            <ellipse cx="66" cy="148" rx="24" ry="6" fill="rgba(232,99,74,.40)"/>
            <text x="66" y="123" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,.70)" font-weight="600">STOMACH</text>
            <text x="66" y="141" text-anchor="middle" font-size="13" fill="#E8634A" font-weight="800">acid escapes ✗</text>
          </svg>
        </div>

      </div>

      <style>
        @keyframes rise2 {
          0%  { opacity:0; transform:translateY(0); }
          20% { opacity:1; }
          80% { opacity:0.7; transform:translateY(-52px); }
          100%{ opacity:0; transform:translateY(-65px); }
        }
      </style>

      <div id="lc0" class="factor-card">
        <span class="factor-icon">🔒</span>
        <div><div class="factor-title">Lower Oesophageal Sphincter (LOS)</div><div class="factor-sub">Muscular valve at the base of the gullet. Opens for food, then closes tightly. In GORD it fails — letting acid back up.</div></div>
      </div>
      <div id="lc1" class="factor-card">
        <span class="factor-icon">🔥</span>
        <div><div class="factor-title">Heartburn</div><div class="factor-sub">Burning behind the breastbone — acid irritating the oesophageal lining. Nothing to do with the heart.</div></div>
      </div>
      <div id="lc2" class="factor-card">
        <span class="factor-icon">🏥</span>
        <div><div class="factor-title">GORD</div><div class="factor-sub">When reflux is frequent enough to cause symptoms or damage — Gastro-Oesophageal Reflux Disease.</div></div>
      </div>

    </div>`;
  },


  s3: () => {
    setTimeout(() => {
      [0,1,2,3,4,5].forEach((i) => {
        setTimeout(() => {
          const cards = document.querySelectorAll('.factor-card');
          if(cards[i]) cards[i].classList.add('visible');
        }, 200 + i * 200);
      });
    }, 150);
    return `
    <div class="factors-grid">
      <div class="factor-card"><span class="factor-icon">⚖️</span><div><div class="factor-title">Excess weight</div><div class="factor-sub">Abdominal pressure pushes stomach contents upwards — the biggest modifiable risk factor.</div></div></div>
      <div class="factor-card"><span class="factor-icon">🕳️</span><div><div class="factor-title">Hiatus hernia</div><div class="factor-sub">Part of stomach slides up through diaphragm, disrupting the sphincter mechanism.</div></div></div>
      <div class="factor-card"><span class="factor-icon">🚬</span><div><div class="factor-title">Smoking</div><div class="factor-sub">Weakens the LOS and reduces saliva — which normally neutralises acid in the oesophagus.</div></div></div>
      <div class="factor-card"><span class="factor-icon">🤰</span><div><div class="factor-title">Pregnancy</div><div class="factor-sub">Hormonal relaxation of the sphincter plus growing uterus increasing abdominal pressure.</div></div></div>
      <div class="factor-card"><span class="factor-icon">💊</span><div><div class="factor-title">Medications</div><div class="factor-sub">NSAIDs, calcium channel blockers, some antidepressants can all worsen reflux.</div></div></div>
      <div class="factor-card"><span class="factor-icon">🍽️</span><div><div class="factor-title">Meal timing &amp; size</div><div class="factor-sub">Large meals, eating late, lying flat soon after eating — all increase opportunity for acid escape.</div></div></div>
    </div>`;
  },

  s4: () => {
    setTimeout(() => {
      ['bt0','bt1','bt2','bt3','bt4'].forEach((id,i) => {
        setTimeout(() => { const e = document.getElementById(id); if(e) e.classList.add('visible'); }, 300 + i * 350);
      });
    }, 100);
    return `
    <div style="width:100%;display:flex;flex-direction:column;gap:.5rem;">
      <div style="font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.75);text-align:center;margin-bottom:.3rem;">The Barrett's Pathway — Why GORD Matters</div>
      <div style="display:flex;align-items:center;gap:.3rem;">
        <div id="bt0" class="med-step ms1" style="flex:1;transition-delay:0s;">
          <div class="med-step-num" style="background:rgba(122,158,135,.2);color:#7A9E87">N</div>
          <div class="med-step-text"><h5>Normal oesophagus</h5><p>Smooth squamous lining</p></div>
        </div>
        <svg width="18" height="18" viewBox="0 0 18 18" style="flex-shrink:0;opacity:.3"><path d="M4 9h10M9 4l5 5-5 5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <div id="bt1" class="med-step ms2" style="flex:1;transition-delay:.35s;">
          <div class="med-step-num" style="background:rgba(232,168,74,.18);color:#E8A84A">1</div>
          <div class="med-step-text"><h5>GORD / oesophagitis</h5><p>Repeated acid damage, inflammation</p></div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:.3rem;">
        <div id="bt2" class="med-step ms3" style="flex:1;transition-delay:.7s;">
          <div class="med-step-num" style="background:rgba(212,124,58,.2);color:#D47C3A">2</div>
          <div class="med-step-text"><h5>Barrett's oesophagus</h5><p>Cell type change — precancerous</p></div>
        </div>
        <svg width="18" height="18" viewBox="0 0 18 18" style="flex-shrink:0;opacity:.3"><path d="M4 9h10M9 4l5 5-5 5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <div id="bt3" class="med-step" style="flex:1;background:rgba(232,99,74,.08);border-color:rgba(232,99,74,.25);transition-delay:1.05s;">
          <div class="med-step-num" style="background:rgba(232,99,74,.18);color:#E8634A">3</div>

const visualKeys = ['s0','s1','s2','s3','s4','s5','s6','s7','s8'];
let current = 0;

function renderSlide(idx) {
  const key = visualKeys[idx];
  document.getElementById('visualContent').innerHTML = visuals[key]();
  document.getElementById('slideNum').textContent = idx + 1;
  document.getElementById('progressFill').style.width = ((idx+1)/TOTAL*100)+'%';
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').textContent = idx === TOTAL-1 ? '✓ Done' : 'Next →';
  const badge = document.getElementById('typeBadge');
  badge.className = 'slide-type-badge ' + badgeCls[slideTypes[idx]];
  badge.textContent = badgeLbl[slideTypes[idx]];
  document.querySelectorAll('.nav-dot').forEach((d,i) => d.classList.toggle('active', i===idx));
}

function navigate(dir) {
  const next = current + dir;
  if(next < 0 || next >= TOTAL) return;
  current = next;
  renderSlide(current);
}

const dotsEl = document.getElementById('navDots');
slideTitles.forEach((t,i) => {
  const d = document.createElement('div');
  d.className = 'nav-dot' + (i===0?' active':'');
  d.title = t;
  d.onclick = () => { current = i; renderSlide(i); };
  dotsEl.appendChild(d);
});

document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight'||e.key==='ArrowDown') navigate(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') navigate(-1);
});

renderSlide(0);
</script>
