<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acid Reflux — Script | helf.school</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #0F1A2E; font-family: 'DM Sans', sans-serif; overflow: hidden; color: #fff; }

    /* ── TOPBAR ── */
    .topbar {
      background: rgba(255,255,255,.04);
      border-bottom: 1px solid rgba(255,255,255,.10);
      height: 52px;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .topbar-left { display: flex; flex-direction: column; gap: .1rem; }
    .topbar-title { font-family: 'Fraunces', serif; font-size: .95rem; font-weight: 600; color: #fff; }
    .topbar-sub { font-size: .75rem; color: rgba(255,255,255,.75); }
    .topbar-right { display: flex; align-items: center; gap: 1.5rem; }
    .slide-counter { font-size: .88rem; font-weight: 600; color: rgba(255,255,255,.90); }
    .kbd-hint { font-size: .72rem; color: rgba(255,255,255,.60); }

    /* ── PROGRESS ── */
    .progress-bar { height: 3px; background: rgba(255,255,255,.08); flex-shrink: 0; }
    .progress-fill { height: 100%; background: #D47C3A; transition: width .35s ease; }

    /* ── MAIN ── */
    .main {
      height: calc(100vh - 55px - 3px - 48px);
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .main::-webkit-scrollbar { width: 4px; }
    .main::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 2px; }

    /* ── SEGMENT HEADER ── */
    .seg-meta {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: .6rem;
      flex-wrap: wrap;
    }
    .seg-label {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #D47C3A;
    }
    .seg-title {
      font-family: 'Fraunces', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
    }
    .seg-timing {
      font-size: .75rem;
      color: rgba(255,255,255,.65);
      margin-left: auto;
    }
    .seg-section {
      font-size: .72rem;
      color: rgba(255,255,255,.55);
      background: rgba(255,255,255,.06);
      border-radius: 4px;
      padding: .15rem .5rem;
    }

    /* ── DIAGRAM CUE ── */
    .diagram-cue {
      background: rgba(232,99,74,.12);
      border: 2px solid rgba(232,99,74,.55);
      border-radius: 10px;
      padding: .7rem 1rem;
      margin: .5rem 0 .8rem;
    }
    .diagram-cue-label {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #E8634A;
      margin-bottom: .3rem;
    }
    .diagram-cue-file {
      font-size: .95rem;
      font-weight: 700;
      color: #fff;
      font-family: 'Fraunces', serif;
    }
    .diagram-cue-desc {
      font-size: .82rem;
      color: rgba(255,255,255,.80);
      margin-top: .2rem;
      line-height: 1.4;
    }
    .diagram-cue-graphic {
      font-size: .78rem;
      color: rgba(255,255,255,.65);
      margin-top: .3rem;
      font-style: italic;
      line-height: 1.4;
    }

    /* ── SCRIPT LINES ── */
    .script-body {
      display: flex;
      flex-direction: column;
      gap: .5rem;
      margin-bottom: 0;
    }
    .script-line {
      font-size: 1.05rem;
      line-height: 1.8;
      color: rgba(255,255,255,.90);
      padding: .4rem .6rem;
      border-radius: 6px;
      border-left: 3px solid transparent;
    }
    .script-line:hover { background: rgba(255,255,255,.04); border-left-color: #D47C3A; }
    .script-pause {
      display: inline-block;
      background: rgba(212,124,58,.15);
      border: 1px solid rgba(212,124,58,.35);
      color: #D47C3A;
      font-size: .70rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .15rem .55rem;
      border-radius: 100px;
      margin: .15rem 0;
    }

    /* ── DIVIDER ── */
    .seg-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,.07);
      margin: 1.2rem 0 1.5rem;
    }

    /* ── TYPE BADGES ── */
    .type-badge {
      display: inline-block;
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: .15rem .6rem;
      border-radius: 100px;
      margin-bottom: .4rem;
    }
    .badge-opening { background: rgba(232,99,74,.2); color: #E8634A; }
    .badge-section  { background: rgba(255,255,255,.08); color: rgba(255,255,255,.75); }
    .badge-cta      { background: rgba(122,158,135,.2); color: #7A9E87; }
    .badge-closing  { background: rgba(232,168,74,.2); color: #E8A84A; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      height: 48px;
      background: rgba(255,255,255,.03);
      border-top: 1px solid rgba(255,255,255,.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      flex-shrink: 0;
    }
    .nav-btn {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.75);
      font-size: .82rem;
      font-weight: 500;
      padding: .4rem 1rem;
      border-radius: 7px;
      cursor: pointer;
      transition: all .2s;
    }
    .nav-btn:hover { background: rgba(255,255,255,.10); color: #fff; }
    .nav-btn:disabled { opacity: .3; cursor: not-allowed; }
    .nav-btn-primary { background: #D47C3A; border-color: #D47C3A; color: #fff; }
    .nav-btn-primary:hover { background: #C06A2A; }
    .nav-dots { display: flex; gap: .4rem; }
    .nav-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,.20); cursor: pointer; transition: all .2s; }
    .nav-dot.active { background: #D47C3A; transform: scale(1.3); }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">Acid Reflux — Script &amp; Broadcaster Notes</div>
    <div class="topbar-sub">helf.school · Digestive Health Series · Article 13</div>
  </div>
  <div class="topbar-right">
    <div class="slide-counter">Segment <span id="segNum">1</span> of 9</div>
    <div class="kbd-hint">← → keys or buttons</div>
  </div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:11.1%"></div></div>

<div class="main" id="mainContent"></div>

<div class="bottom-nav">
  <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>← Previous</button>
  <div class="nav-dots" id="navDots"></div>
  <button class="nav-btn nav-btn-primary" id="nextBtn" onclick="navigate(1)">Next →</button>
</div>

<script>
const TOTAL = 9;

const segments = [

  {
    type: 'opening',
    label: 'Intro · Dr Paul',
    title: 'Introduction',
    section: 'Opening — camera on Dr Paul',
    timing: '⏱ ~15 seconds',
    visuals_screen: null,
    script: [
      `"I'm Dr Paul — I spent over twenty years as an NHS GP before I retired in 2019."`,
      `"Today I want to talk to you about <strong>acid reflux</strong> — what it is, what it does over time, and what the evidence says about how to treat it."`,
      `"Now, I do have to say upfront — what I'm giving you here is health education, not medical advice."`,
      `"If anything I talk about feels relevant to you personally, please do take it to your own doctor."`,
      `"Right — let's get into it."`,
    ]
  },

  {
    type: 'opening',
    label: 'Segment 1 · Opening Hook',
    title: 'The Burning You Learn to Live With',
    section: 'Article intro — Why this matters',
    timing: '⏱ 0:00–0:45',
    visuals_screen: {
      file: 'acid-reflux-visuals.html → Screen 1',
      what: '1 in 4 stat card',
      graphic: 'Large bold figure "1 in 4" with label: UK adults experience regular heartburn. Source: Guts UK · Kennedy & Jones 2000 · Dent et al 2005.'
    },
    script: [
      `"Heartburn affects around <strong>one in four adults in the UK</strong>. Most people manage it with antacids from the chemist. Most people don't talk to their GP about it."`,
      `<span class="script-pause">PAUSE</span>`,
      `"And yet acid reflux — when it's persistent — is one of the most undertreated conditions I encountered in general practice. Not because treatment doesn't work. But because people assume it's just something you put up with."`,
      `"It isn't. And for a small but important number of people, putting up with it for years carries real risks. So let's go through what's actually happening."`,
    ]
  },

  {
    type: 'section',
    label: 'Segment 2 · Section 1',
    title: "What's Actually Happening",
    section: 'Article Section 1 — What is it?',
    timing: '⏱ 0:45–1:35',
    visuals_screen: {
      file: 'ar-sphincter-screen.html',
      what: 'Normal vs GORD anatomy diagram',
      graphic: 'Two side-by-side diagrams: Throat → Oesophagus → LOS → Stomach. Left (Normal): LOS closed in green, "acid stays ✓". Right (GORD): LOS open in red, acid rising, "acid escapes ✗". Three prompt cards below: What the LOS does / What goes wrong in GORD / Why it causes heartburn.'
    },
    script: [
      `"Between your oesophagus — your gullet — and your stomach, there's a muscular valve called the <strong>lower oesophageal sphincter</strong>."`,
      `"In normal digestion, it opens to let food through, then closes tightly. In acid reflux, it doesn't close properly — and stomach acid travels back up into the oesophagus."`,
      `"The oesophageal lining isn't designed to handle acid. So it becomes inflamed. That inflammation is what you experience as <strong>heartburn</strong> — the burning sensation behind the breastbone."`,
      `"When this happens frequently enough to cause symptoms or damage, it becomes GORD — Gastro-Oesophageal Reflux Disease. G-O-R-D. That's the clinical term."`,
      `"Occasional heartburn — everyone gets that. GORD is when it becomes your normal."`,
    ]
  },

  {
    type: 'section',
    label: 'Segment 3 · Section 2',
    title: 'What Makes It More Likely',
    section: 'Article Section 1 — What is it? (risk factors)',
    timing: '⏱ 1:35–2:20',
    visuals_screen: {
      file: 'acid-reflux-visuals.html → Screen 3',
      what: 'Six risk factor cards',
      graphic: 'Six cards animating in one by one: ⚖️ Excess weight · 🕳️ Hiatus hernia · 🚬 Smoking · 🤰 Pregnancy · 💊 Medications · 🍽️ Meal timing & size. Each with brief description.'
    },
    script: [
      `"Several things weaken that sphincter valve or increase pressure on the stomach — making reflux more likely."`,
      `"<strong>Excess weight</strong> is the biggest modifiable factor — abdominal pressure pushes contents upwards. <strong>A hiatus hernia</strong> — where part of the stomach slides up through the diaphragm — physically disrupts the valve mechanism."`,
      `"<strong>Smoking</strong> weakens the sphincter directly and reduces saliva, which normally neutralises acid. <strong>Pregnancy</strong> both relaxes the sphincter through hormones and adds abdominal pressure as the uterus grows."`,
      `"<strong>Certain medications</strong> can worsen reflux — NSAIDs like ibuprofen, calcium channel blockers, and some antidepressants. Worth mentioning to your GP."`,
      `"<strong>Meal timing and size</strong> matter too. Large meals, eating late at night, lying flat soon after eating — all give acid more opportunity to escape upwards."`,
    ]
  },

  {
    type: 'section',
    label: 'Segment 4 · Section 3',
    title: 'Why Persistent GORD Matters',
    section: 'Article Section 2 — Why does it matter?',
    timing: '⏱ 2:20–3:10',
    visuals_screen: {
      file: 'ar-barretts-screen.html',
      what: "The Barrett's Pathway diagram",
      graphic: "Five-stage pathway animating left to right: 🟢 Normal oesophagus → 🟡 GORD/Oesophagitis → 🟠 Barrett's oesophagus (pre-cancerous) → 🔴 Dysplasia → ⚠️ Adenocarcinoma (rare). Three context cards below: How common is this? / Annual cancer risk in Barrett's (0.33%/yr) / Why surveillance matters."
    },
    script: [
      `"For most people, GORD is a nuisance. But I want to be direct about why it matters more than that."`,
      `"Repeated acid exposure inflames the oesophagus. Over time, this can cause erosions, ulceration, and in some cases narrowing — making swallowing progressively difficult."`,
      `"More importantly: in around 10–15% of people with longstanding GORD, the normal oesophageal lining is replaced by a different cell type. This is called <strong>Barrett's oesophagus</strong>."`,
      `"Barrett's is a precancerous change. Each year, approximately <strong>0.33% of people with Barrett's develop oesophageal adenocarcinoma</strong> — around 1 in 300 per year. For short-segment Barrett's, the risk is lower still, at about 0.19% per year."`,
      `"To keep this in proportion: that risk is low for any individual in any given year. But it compounds. And it's the reason that persistent, longstanding reflux — particularly in middle-aged and older men — warrants investigation."`,
      `"The good news: Barrett's can be detected by endoscopy, monitored, and in many cases treated before cancer develops. The NHS has surveillance programmes for exactly this reason."`,
    ]
  },

  {
    type: 'section',
    label: 'Segment 5 · Section 4',
    title: 'What Your Doctor Will Discuss',
    section: 'Article Section 3 — What your doctor might do',
    timing: '⏱ 3:10–3:55',
    visuals_screen: {
      file: 'acid-reflux-visuals.html → Screen 5',
      what: 'Stepped care medication ladder',
      graphic: 'Three-step ladder: 1 — Antacids/Alginates (green) · 2 — H2 Receptor Antagonists (amber) · 3 — Proton Pump Inhibitors (orange). Below: amber callout box "⏰ PPI timing matters — 30–60 min before food, not at bedtime."'
    },
    script: [
      `"GORD is usually diagnosed from the history — there's no test needed for a typical presentation. Your GP hears a clear description of heartburn and starts treatment."`,
      `"Lifestyle first: <strong>weight loss</strong> is the most evidence-based lifestyle intervention. Raising the head of the bed, avoiding late meals, stopping smoking — all recommended in NICE guideline CG184."`,
      `"For medication, the approach is stepped. Start with antacids and alginates — Gaviscon, for instance — for mild symptoms. If those aren't enough, H2 receptor antagonists. If those aren't enough: a <strong>proton pump inhibitor</strong> — a PPI."`,
      `"PPIs — omeprazole, lansoprazole — are the most effective acid-suppressing medicines we have. One important thing: take them <strong>30 to 60 minutes before a meal</strong>. Not at bedtime. They work by blocking the proton pump — which is activated by eating. Wrong timing, reduced effect."`,
      `"Endoscopy — a camera test — isn't needed for most people. NICE recommends it when there are alarm features, or symptoms that persist despite adequate treatment."`,
      `"And alarm features — difficulty swallowing, unexplained weight loss, vomiting blood — those need urgent GP assessment. Not because they always mean something serious. But because they need to be ruled out."`,
    ]
  },

  {
    type: 'section',
    label: 'Segment 6 · Evidence in Brief',
    title: 'What the Research Shows',
    section: 'Article Section 4 — What the research shows',
    timing: '⏱ 3:55–4:35',
    visuals_screen: {
      file: 'acid-reflux-visuals.html → Screen 6',
      what: 'Four research summary cards',
      graphic: 'Four cards animating in: Cochrane (PPIs vs H2RAs) · LOTUS RCT (surgery vs PPI) · NEJM 2006 / Nurses Health Study (weight loss) · Gut 2012 / Desai et al (Barrett\'s cancer risk). Each card has evidence summary + highlighted amber take-home sentence.'
    },
    script: [
      `"Let me pull out the key evidence."`,
      `"PPIs versus older H2 receptor antagonists: a large Cochrane analysis confirmed PPIs are significantly more effective at healing oesophagitis and controlling symptoms. <strong>PPIs are the right first-line treatment for GORD.</strong>"`,
      `"The LOTUS trial — a randomised controlled trial across Europe — compared laparoscopic surgery with long-term PPI treatment in over 500 patients, followed for five years. Both produced similar remission rates — around 85–90%. Surgery works as well as long-term medication in appropriately selected patients."`,
      `"On weight loss: the Nurses' Health Study found that even modest weight loss — around 3–4 kilograms — produced significant symptom improvement. This is not soft advice. It's evidence-based first-line treatment."`,
      `"On long-term PPI safety: observational data shows small associations with kidney disease, certain gut infections, and nutrient deficiencies. The absolute risks are modest and these are observational findings — not proven causation. PPIs are safe for appropriate long-term use. The key word is appropriate: lowest effective dose, reviewed regularly."`,
    ]
  },

  {
    type: 'cta',
    label: 'Segment 7 · Call to Action',
    title: 'What You Can Do',
    section: 'Call to action — three key messages',
    timing: '⏱ 4:35–5:05',
    visuals_screen: {
      file: 'acid-reflux-visuals.html → Screen 7',
      what: 'Three action cards',
      graphic: 'Three numbered cards: 1 — Talk to your GP if heartburn is frequent (>twice/week). 2 — Check your PPI timing (30–60 min before meals). 3 — Alarm features need prompt attention (dysphagia, weight loss, vomiting blood).'
    },
    script: [
      `"<strong>First: if you have frequent heartburn — more than twice a week — speak to your GP.</strong> Don't just manage it indefinitely with over-the-counter antacids. There are effective treatments, and it's worth getting a proper assessment."`,
      `"<strong>Second: if you're taking a PPI, check your timing.</strong> Take it 30 to 60 minutes before a meal — not at bedtime. This single change makes a meaningful difference to how well it works."`,
      `"<strong>Third: if you have any alarm features — difficulty swallowing, unexplained weight loss, vomiting blood — see your GP promptly.</strong> These need investigation. Not next month. Now."`,
      `"The full article with references is at <strong>helf.school</strong> — Article 13 in the Digestive Health series."`,
    ]
  },

  {
    type: 'closing',
    label: 'Segment 8 · Closing',
    title: 'Sign-off',
    section: 'Closing — camera on Dr Paul',
    timing: '⏱ 5:05–5:20',
    visuals_screen: {
      file: 'acid-reflux-visuals.html → Screen 8',
      what: 'helf.school closing card',
      graphic: 'helf.school logo, tagline "Evidence-based health education for everyone", series pill list with Article 13 highlighted.'
    },
    script: [
      `"Acid reflux is one of those conditions where the gap between how common it is and how seriously it's taken is much too wide."`,
      `"For most people, it's very treatable. For the few where it progresses — surveillance and early treatment work. But none of that happens if you never speak to your doctor."`,
      `<span class="script-pause">PAUSE</span>`,
      `"Thanks for watching. helf.school — take care of yourself."`,
    ]
  },

];

// ── RENDER ──
let current = 0;

function buildSegment(s, idx) {
  const badgeClass = { opening:'badge-opening', section:'badge-section', cta:'badge-cta', closing:'badge-closing' }[s.type];
  const badgeLabel = { opening:'Opening', section:'Section', cta:'Call to Action', closing:'Closing' }[s.type];

  let html = '';

  // Badge + meta
  html += `<div class="seg-meta">
    <span class="type-badge ${badgeClass}">${badgeLabel}</span>
    <span class="seg-label">${s.label}</span>
    <span class="seg-section">${s.section}</span>
    <span class="seg-timing">${s.timing}</span>
  </div>`;

  html += `<div class="seg-title">${s.title}</div>`;

  // Diagram cue
  if (s.visuals_screen) {
    html += `<div class="diagram-cue">
      <div class="diagram-cue-label">📺 Switch to visuals screen</div>
      <div class="diagram-cue-file">${s.visuals_screen.file}</div>
      <div class="diagram-cue-desc">${s.visuals_screen.what}</div>
      <div class="diagram-cue-graphic">On screen: ${s.visuals_screen.graphic}</div>
    </div>`;
  }

  // Script
  html += `<div class="script-body">`;
  s.script.forEach(line => {
    html += `<p class="script-line">${line}</p>`;
  });
  html += `</div>`;

  return html;
}

function renderSegment(idx) {
  const s = segments[idx];
  document.getElementById('mainContent').innerHTML = buildSegment(s, idx);
  document.getElementById('mainContent').scrollTop = 0;
  document.getElementById('segNum').textContent = idx + 1;
  document.getElementById('progressFill').style.width = ((idx + 1) / TOTAL * 100) + '%';
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').textContent = idx === TOTAL - 1 ? '✓ Done' : 'Next →';
  document.querySelectorAll('.nav-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= TOTAL) return;
  current = next;
  renderSegment(current);
}

// Build nav dots
const dotsEl = document.getElementById('navDots');
segments.forEach((s, i) => {
  const d = document.createElement('div');
  d.className = 'nav-dot' + (i === 0 ? ' active' : '');
  d.title = s.title;
  d.onclick = () => { current = i; renderSegment(i); };
  dotsEl.appendChild(d);
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
});

renderSegment(0);
</script>
</body>
</html>
