const slides=[
  {type:'opening',label:'Intro · Dr Paul',title:'Introduction',timing:'⏱ ~10 seconds',visual:'s0',script:[
    `"I'm Dr Paul — I spent over twenty years as an NHS GP before I retired in 2019."`,
    `"Today I want to talk to you about <strong>whether supplements lower cholesterol</strong>."`,
    `"Now, I do have to say upfront — what I'm giving you here is health education, not medical advice."`,
    `"If anything I talk about feels relevant to you personally, please do take it to your own doctor."`,

  ]},
  {type:'opening',label:'Segment 1 · Opening',title:"Natural Doesn't Mean Effective",timing:'⏱ 0:00–0:45',visual:'s1',script:[
    `"The supplement market is built on a powerful idea: that there must be a gentler, more natural path to the same health benefit as prescription medicine."`,
    `"For cholesterol, this idea is particularly appealing. Fish oil, red yeast rice, plant sterols, garlic, berberine, cinnamon, turmeric — all marketed for heart health."`,
    `<span class="script-pause">PAUSE</span>`,
    `"But what does the <strong>evidence actually show</strong>? In this video I want to go through the main supplements, tell you what the trials say — and explain the important difference between changing a number and changing an outcome."`,
    `"I'm Dr Paul — over twenty years as an NHS GP. Health education, not medical advice."`,
  ]},
  {type:'section',label:'Segment 2 · Section 1',title:'The Head-to-Head Trial',timing:'⏱ 0:45–1:35',visual:'s2',script:[
    `"The most direct evidence comes from the SPORT trial, published in JACC in 2023. Cleveland Clinic. 190 adults with elevated cardiovascular risk, randomised to: a low-dose statin, a placebo, or one of six popular supplements — fish oil, cinnamon, garlic, turmeric, plant sterols, or red yeast rice. All for 28 days."`,
    `"The statin — rosuvastatin 5mg — reduced LDL by an average of <strong>37.9%</strong>."`,
    `"<strong>None of the six supplements showed any significant LDL reduction compared to placebo.</strong> Garlic actually slightly increased LDL versus placebo."`,
    `"One trial doesn't tell the whole story. Let's look at each supplement more carefully."`,
  ]},
  {type:'section',label:'Segment 3 · Section 2',title:'What the Evidence Says for Each',timing:'⏱ 1:35–2:30',visual:'s3',script:[
    `"<strong>Plant sterols</strong> stand out as having the best evidence. A meta-analysis of 124 randomised trials found that 0.6–3.3 grams per day reduces LDL by 6–12%. Safe at recommended doses. But — no large trial has shown this LDL reduction translates into fewer heart attacks or strokes."`,
    `"<strong>Fish oil</strong> genuinely reduces triglycerides — dose-dependently — but does not lower LDL. UK Biobank data in BMJ Medicine 2024 found regular fish oil use was associated with increased atrial fibrillation risk in people without existing heart disease."`,
    `"<strong>Red yeast rice</strong> — its active compound monacolin K is chemically identical to lovastatin, a prescription statin. Same mechanism, same risks — muscle breakdown, liver injury — but without quality controls. EFSA concluded in January 2025 that there is <strong>no safe dose</strong> of monacolin K in food supplements."`,
    `"<strong>Garlic, cinnamon, and turmeric</strong>: no significant effect on LDL in trials. Despite widespread marketing for exactly that purpose."`,
  ]},
  {type:'section',label:'Segment 4 · Section 3',title:'The Key Distinction',timing:'⏱ 2:30–3:10',visual:'s4',script:[
    `"There's a crucial distinction that gets lost in supplement marketing."`,
    `"Plant sterols genuinely lower LDL on a blood test. But lowering LDL is only valuable if it reduces the risk of a heart attack or stroke."`,
    `"For <strong>statins</strong>, this link has been demonstrated in trials involving hundreds of thousands of people over decades. We know statins reduce LDL. We know they reduce heart attacks. We have both pieces of evidence."`,
    `"For <strong>plant sterols</strong>, we have the LDL reduction — confirmed. But we do not yet have the outcome data showing fewer cardiovascular events."`,
    `"Lowering a number is a surrogate endpoint. Preventing a heart attack is the actual goal. For people at meaningful cardiovascular risk, only statins currently give you both."`,
  ]},
  {type:'section',label:'Segment 5 · Section 4',title:'What the Research Shows',timing:'⏱ 3:10–3:55',visual:'s5',script:[
    `"Key evidence to know:"`,
    `"<strong>SPORT trial, JACC 2023</strong> — six supplements vs statin vs placebo: statin reduced LDL 37.9%, supplements performed no better than placebo."`,
    `"<strong>Ras et al., Br J Nutr 2014</strong> — 124-trial meta-analysis — plant sterols: 6–12% LDL reduction. No outcome data."`,
    `"<strong>Wang et al., JAHA 2023</strong> — 90-trial meta-analysis — omega-3: near-linear triglyceride reduction, no LDL lowering, 72,598 participants."`,
    `"<strong>Chen et al., BMJ Medicine 2024</strong> — UK Biobank, 415,000 participants — fish oil: 13% higher AF risk and 5% higher stroke risk in people without existing CVD."`,
    `"<strong>EFSA 2025</strong> — red yeast rice: no safe dose of monacolin K in food supplements. EU ban in progress."`,
  ]},
  {type:'section',label:'Segment 6 · What Your Doctor Will Say',title:'The Clinical View',timing:'⏱ 3:55–4:30',visual:'s6',script:[
    `"Your GP will look at your full QRISK3 cardiovascular risk — not just your cholesterol number — before recommending any strategy."`,
    `"If LDL reduction is the goal for someone at meaningful risk, the evidence strongly favours statins. They typically reduce LDL by 30–50% and have decades of outcome data."`,
    `"Plant sterols may be reasonable as an addition for mildly elevated cholesterol and low overall risk — but they shouldn't replace lifestyle changes."`,
    `"If you're taking red yeast rice, tell your GP. It carries the same risks as a statin without the monitoring."`,
    `"And always tell your GP about all supplements. They can interact with prescription medicines in ways that may be harmful."`,
  ]},
  {type:'cta',label:'Segment 7 · Call to Action',title:'What You Can Do',timing:'⏱ 4:30–5:00',visual:'s7',script:[
    `"<strong>Understand what the supplement is actually doing</strong>. Does it lower LDL? Triglycerides? Has it been tested in outcomes trials? The difference matters enormously."`,
    `"<strong>Be cautious about red yeast rice</strong>. It is effectively an unregulated statin. EFSA 2025 declared no safe dose exists. Discuss with your GP if you're taking it."`,
    `"<strong>Don't use supplements to avoid the statin conversation</strong>. If your cardiovascular risk is elevated, that conversation is the one most worth having — the evidence is in a different category."`,
    `"Full article with all evidence at <strong>helf.school</strong>."`,
  ]},
  {type:'closing',label:'Segment 8 · Closing',title:'Sign-off',timing:'⏱ 5:00–5:25',visual:'s8',script:[
    `"The supplement market is built on the appeal of a gentler, more natural path. That appeal is understandable."`,
    `"But the evidence is clear. For people at meaningful cardiovascular risk, the available treatments have an evidence base that no supplement currently matches."`,
    `"Supplements can be part of a health-conscious life. They are not a substitute for understanding your cardiovascular risk and making decisions with your GP based on the evidence."`,
    `<span class="script-pause">PAUSE</span>`,
    `"That's the last in the Cardiovascular Series. All seven articles are at helf.school. Take care of yourself."`,
  ]},
];

function afterRender(v){
  if(v==='s0'){const e=document.getElementById('introTopic');if(e)e.textContent='Do Supplements Lower Cholesterol?';}
  if(v==='s3')[0,1,2,3,4].forEach(i=>setTimeout(()=>{const e=document.getElementById('sr'+i);if(e)e.classList.add('visible');},150+i*200));
  if(v==='s7')[0,1,2].forEach(i=>setTimeout(()=>{const e=document.getElementById('ac'+i);if(e)e.classList.add('visible');},200+i*300));
}

const TOTAL=slides.length;
const badgeCls={opening:'badge-opening',section:'badge-section',cta:'badge-cta',closing:'badge-closing'};
const badgeLbl={opening:'Opening',section:'Content',cta:'Call to Action',closing:'Closing'};
const visualKeys=slides.map(s=>s.visual);
const slideTypes=slides.map(s=>s.type);
const slideTitles=['Introduction', 'The Head-to-Head Trial', 'What the Evidence Says for Each', 'The Key Distinction', 'What the Research Shows', 'The Clinical View', 'What You Can Do', 'Sign-off'];
let current=0;
function renderSlide(idx){
  document.getElementById('visualContent').innerHTML=visuals[visualKeys[idx]]();
  document.getElementById('slideNum').textContent=idx+1;
  document.getElementById('progressFill').style.width=((idx+1)/TOTAL*100)+'%';
  document.getElementById('prevBtn').disabled=idx===0;
  document.getElementById('nextBtn').textContent=idx===TOTAL-1?'✓ Done':'Next →';
  const b=document.getElementById('typeBadge');
  b.className='slide-type-badge '+badgeCls[slideTypes[idx]];
  b.textContent=badgeLbl[slideTypes[idx]];
  document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}
function navigate(dir){const n=current+dir;if(n<0||n>=TOTAL)return;current=n;renderSlide(n);}
const de=document.getElementById('navDots');
slideTitles.forEach((t,i)=>{const d=document.createElement('div');d.className='nav-dot'+(i===0?' active':'');d.title=t;d.onclick=()=>{current=i;renderSlide(i);};de.appendChild(d);});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')navigate(1);if(e.key==='ArrowLeft'||e.key==='ArrowUp')navigate(-1);});
renderSlide(0);
</script>
