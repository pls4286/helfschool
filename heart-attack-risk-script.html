<!DOCTYPE html>

<head>

  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:#0F1A2E;font-family:'DM Sans',sans-serif;overflow:hidden;color:#fff;}
    .topbar{background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.10);height:52px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .topbar-left{display:flex;flex-direction:column;gap:.1rem;}
    .topbar-title{font-family:'Fraunces',serif;font-size:.95rem;font-weight:600;color:#fff;}
    .topbar-sub{font-size:.75rem;color:rgba(255,255,255,.75);}
    .topbar-right{display:flex;align-items:center;gap:1.5rem;}
    .slide-counter{font-size:.88rem;font-weight:600;color:rgba(255,255,255,.90);}
    .kbd-hint{font-size:.72rem;color:rgba(255,255,255,.60);}
    .progress-bar{height:3px;background:rgba(255,255,255,.08);flex-shrink:0;}
    .progress-fill{height:100%;background:#C8423A;transition:width .35s ease;}
    .main{height:calc(100vh - 55px - 3px - 48px);overflow-y:auto;padding:1.5rem 2rem;}
    .main::-webkit-scrollbar{width:4px;}
    .main::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px;}
    .seg-meta{display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem;flex-wrap:wrap;}
    .seg-label{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C8423A;}
    .seg-title{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:700;color:#fff;margin-bottom:.75rem;}
    .seg-timing{font-size:.75rem;color:rgba(255,255,255,.65);margin-left:auto;}
    .seg-section{font-size:.72rem;color:rgba(255,255,255,.55);background:rgba(255,255,255,.06);border-radius:4px;padding:.15rem .5rem;}
    .diagram-cue{background:rgba(232,99,74,.12);border:2px solid rgba(232,99,74,.55);border-radius:10px;padding:.7rem 1rem;margin:.5rem 0 .8rem;}
    .diagram-cue-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#E8634A;margin-bottom:.25rem;}
    .diagram-cue-file{font-size:.95rem;font-weight:700;color:#fff;font-family:'Fraunces',serif;}
    .diagram-cue-desc{font-size:.82rem;color:rgba(255,255,255,.80);margin-top:.2rem;line-height:1.4;}
    .diagram-cue-graphic{font-size:.78rem;color:rgba(255,255,255,.65);margin-top:.25rem;font-style:italic;line-height:1.4;}
    .script-body{display:flex;flex-direction:column;gap:.5rem;}
    .script-line{font-size:1.05rem;line-height:1.8;color:rgba(255,255,255,.90);padding:.4rem .6rem;border-radius:6px;border-left:3px solid transparent;}
    .script-line:hover{background:rgba(255,255,255,.04);border-left-color:#C8423A;}
    .script-pause{display:inline-block;background:rgba(200,66,58,.15);border:1px solid rgba(200,66,58,.35);color:#C8423A;font-size:.70rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.15rem .55rem;border-radius:100px;}
    .type-badge{display:inline-block;font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.15rem .6rem;border-radius:100px;margin-bottom:.35rem;}
    .badge-opening{background:rgba(232,99,74,.2);color:#E8634A;}
    .badge-section{background:rgba(255,255,255,.08);color:rgba(255,255,255,.75);}
    .badge-cta{background:rgba(122,158,135,.2);color:#7A9E87;}
    .badge-closing{background:rgba(232,168,74,.2);color:#E8A84A;}
    .bottom-nav{height:48px;background:rgba(255,255,255,.03);border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;flex-shrink:0;}
    .nav-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.75);font-size:.82rem;font-weight:500;padding:.4rem 1rem;border-radius:7px;cursor:pointer;transition:all .2s;}
    .nav-btn:hover{background:rgba(255,255,255,.10);color:#fff;}
    .nav-btn:disabled{opacity:.3;cursor:not-allowed;}
    .nav-btn-primary{background:#C8423A;border-color:#C8423A;color:#fff;}
    .nav-dots{display:flex;gap:.4rem;}
    .nav-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.20);cursor:pointer;transition:all .2s;}
    .nav-dot.active{background:#C8423A;transform:scale(1.3);}
  </style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">How Doctors Estimate Heart Attack Risk — Presenter Deck — Script &amp; Broadcaster Notes</div>
    <div class="topbar-sub">helf.school · Cardiovascular Series · Article 03</div>
  </div>
  <div class="topbar-right">
    <div class="slide-counter">Segment <span id="segNum">1</span> of 8</div>
    <div class="kbd-hint">← → keys or buttons</div>
  </div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:12.5%"></div></div>
<div class="main" id="mainContent"></div>
<div class="bottom-nav">
  <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>← Previous</button>
  <div class="nav-dots" id="navDots"></div>
  <button class="nav-btn nav-btn-primary" id="nextBtn" onclick="navigate(1)">Next →</button>
</div>
<script>
const TOTAL=8;
const badgeClass={opening:'badge-opening',section:'badge-section',cta:'badge-cta',closing:'badge-closing'};
const badgeLabel={opening:'Opening',section:'Section',cta:'Call to Action',closing:'Closing'};
const slides=[
  {type:'opening',label:'Intro · Dr Paul',title:'Introduction',timing:'⏱ ~10 seconds',visual:'s0',script:[
    `"I'm Dr Paul — I spent over twenty years as an NHS GP before I retired in 2019."`,
    `"Today I want to talk to you about <strong>how doctors estimate heart attack risk</strong>."`,
    `"Now, I do have to say upfront — what I'm giving you here is health education, not medical advice."`,
    `"If anything I talk about feels relevant to you personally, please do take it to your own doctor."`,
    `"Right — let's get into it."`,
  ]},
  {type:'opening',label:'Segment 1 · Opening Hook',title:'Your Score',timing:'⏱ 0:00–0:45',visual:'s1',script:[
    `"Your GP can calculate the probability of you having a heart attack or stroke in the next ten years. It's expressed as a percentage. And that number changes how they approach your treatment."`,
    `<span class="script-pause">PAUSE</span>`,
    `"This is not guesswork. It's a validated mathematical model called <strong>QRISK3</strong> — built from data on over <strong>7 million people</strong> in UK general practice."`,
    `"In this video I want to explain how this risk scoring works, what goes into it, and — crucially — what it means for you if you get a score."`,
    `"I'm Dr Paul — over twenty years as an NHS GP. This is health education, not medical advice."`,
  ]},
  {type:'section',label:'Segment 2 · Section 1',title:'What is Cardiovascular Risk?',timing:'⏱ 0:45–1:40',visual:'s2',script:[
    `"Heart attacks and strokes don't happen randomly. They happen to people who have accumulated certain risk factors over time — and the more risk factors you have, the higher your probability of a cardiovascular event."`,
    `"The key insight is that <strong>risk factors combine multiplicatively, not just additively</strong>. High blood pressure and high cholesterol together don't just add up — they multiply each other's effect."`,
    `"QRISK3 takes all of this into account. It calculates a single number — your 10-year cardiovascular risk — by combining everything known about you into one validated estimate."`,
    `"A score of 10% means that among 100 people with your risk profile, around 10 would be expected to have a heart attack or stroke in the next ten years. A score of 5% means around 5 in 100."`,
    `"This number doesn't predict what will happen to <em>you</em> personally. But it tells us how hard to work to protect you."`,
  ]},
  {type:'section',label:'Segment 3 · Section 2',title:'The Five Risk Factors That Matter Most',timing:'⏱ 1:40–2:35',visual:'s3',script:[
    `"A landmark study published in the New England Journal of Medicine in 2022, drawing on data from over 2 million people across 133 cohorts in 39 countries, identified five key modifiable risk factors that together account for approximately <strong>half of all cardiovascular disease worldwide</strong>."`,
    `"Those five factors are: <strong>high blood pressure</strong>, <strong>high cholesterol</strong>, <strong>excess body weight</strong>, <strong>diabetes</strong>, and <strong>smoking</strong>."`,
    `"Modifiable. Every one of them. Which means that addressing them — even partially — has a profound effect on your risk."`,
    `"The same study found that eliminating all five risk factors at age 50 could add <strong>more than a decade of cardiovascular disease-free life</strong>."`,
    `"That is a remarkable finding — and it tells us that prevention isn't a marginal gain. It's transformative."`,
  ]},
  {type:'section',label:'Segment 4 · Section 3',title:'How QRISK3 Works',timing:'⏱ 2:35–3:30',visual:'s4',script:[
    `"QRISK3 was developed and validated by Professor Julia Hippisley-Cox and colleagues, published in the BMJ in 2017, using data from over 7 million people in UK general practice."`,
    `"It calculates your 10-year cardiovascular risk by combining: your age, sex, ethnicity, blood pressure, cholesterol ratio, body mass index, smoking status, family history of heart disease, deprivation score — and importantly, conditions that previous calculators missed, including type 2 diabetes, atrial fibrillation, chronic kidney disease, rheumatoid arthritis, severe mental illness, and certain medications."`,
    `"This matters because people in those groups were previously underestimated in their risk. QRISK3 corrects for that."`,
    `"Your GP uses the calculator to decide whether to discuss statin therapy. Under current NICE guidance, a score of <strong>10% or above</strong> means a statin should be offered. Below 10%, it can still be considered — particularly if your lifetime risk is elevated."`,
    `"But the score informs the conversation. The doctor and patient together make the decision."`,
  ]},
  {type:'section',label:'Segment 5 · Section 4',title:'What the Research Shows',timing:'⏱ 3:30–4:15',visual:'s5',script:[
    `"The evidence underlying cardiovascular risk prediction is exceptionally robust. QRISK3 has been validated across millions of UK patients and consistently outperforms earlier models — particularly in ethnic minority groups and those with complex conditions."`,
    `"It's worth knowing the limitations too. QRISK3 may <strong>underestimate risk</strong> in people already on blood pressure or cholesterol medication, people with HIV, and those with autoimmune conditions."`,
    `"It's also a population-level tool — it tells us about groups, not individuals. A 15% risk score doesn't mean you will have a heart attack. It means people like you, with your combination of risk factors, have about a 1-in-7 chance over the next decade."`,
    `"What the score does powerfully is show you which risk factors are driving your number — and therefore which ones are most worth addressing."`,
  ]},
  {type:'cta',label:'Segment 6 · Call to Action',title:'What You Can Do',timing:'⏱ 4:15–4:55',visual:'s6',script:[
    `"<strong>First: ask your GP for your QRISK3 score</strong> if you don't know it. You can also run an estimate yourself at qrisk.org — though your GP will have more accurate data to input."`,
    `"<strong>Second: understand what's driving your score</strong>. Blood pressure? Cholesterol? Smoking? Weight? Each of these is a lever you can pull. The lifestyle changes article on helf.school covers all of them with the evidence."`,
    `"<strong>Third: don't dismiss a high score as inevitable</strong>. These are risk factors. They're not destiny. Most of the factors in your score are modifiable — and the research shows that modifying them makes a measurable difference."`,
    `"The full article is on <strong>helf.school</strong> with all the references linked."`,
  ]},
  {type:'closing',label:'Segment 7 · Closing',title:'Sign-off',timing:'⏱ 4:55–5:20',visual:'s7',script:[
    `"Understanding your cardiovascular risk gives you something powerful: a starting point for an informed conversation with your doctor."`,
    `"Not a verdict. Not a prediction. A number that says — here's where you are, here's what's driving it, and here's what we can do about it."`,
    `<span class="script-pause">PAUSE</span>`,
    `"Thanks for watching. The next video in the series covers statins — the most widely used treatment for elevated cardiovascular risk. It's on helf.school."`,
    `"Take care of yourself."`,
  ]},
];
function buildSegment(s,idx){
  let h='';
  h+=`<div class="seg-meta"><span class="type-badge ${badgeClass[s.type]}">${badgeLabel[s.type]}</span><span class="seg-label">${s.label}</span>${s.section?`<span class="seg-section">${s.section}</span>`:''}<span class="seg-timing">${s.timing}</span></div>`;
  h+=`<div class="seg-title">${s.title}</div>`;
  if(s.visuals_screen){h+=`<div class="diagram-cue"><div class="diagram-cue-label">📺 Switch to visuals screen</div><div class="diagram-cue-file">${s.visuals_screen.file}</div><div class="diagram-cue-desc">${s.visuals_screen.what}</div>${s.visuals_screen.graphic?`<div class="diagram-cue-graphic">On screen: ${s.visuals_screen.graphic}</div>`:''}</div>`;}
  h+=`<div class="script-body">`;
  s.script.forEach(l=>{h+=`<p class="script-line">${l}</p>`;});
  h+=`</div>`;return h;
}
let current=0;
function renderSegment(idx){
  document.getElementById('mainContent').innerHTML=buildSegment(slides[idx],idx);
  document.getElementById('mainContent').scrollTop=0;
  document.getElementById('segNum').textContent=idx+1;
  document.getElementById('progressFill').style.width=((idx+1)/TOTAL*100)+'%';
  document.getElementById('prevBtn').disabled=idx===0;
  document.getElementById('nextBtn').textContent=idx===TOTAL-1?'✓ Done':'Next →';
  document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}
function navigate(dir){const n=current+dir;if(n<0||n>=TOTAL)return;current=n;renderSegment(n);}
const de=document.getElementById('navDots');
slides.forEach((s,i)=>{const d=document.createElement('div');d.className='nav-dot'+(i===0?' active':'');d.title=s.title;d.onclick=()=>{current=i;renderSegment(i);};de.appendChild(d);});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')navigate(1);if(e.key==='ArrowLeft'||e.key==='ArrowUp')navigate(-1);});
renderSegment(0);
</script>
</body>
</html>
