const slides=[
  {type:'opening',label:'Intro · Dr Paul',title:'Introduction',timing:'⏱ ~10 seconds',visual:'s0',script:[
    `"I'm Dr Paul — I spent over twenty years as an NHS GP before I retired in 2019."`,
    `"Today I want to talk to you about <strong>cholesterol</strong>."`,
    `"Now, I do have to say upfront — what I'm giving you here is health education, not medical advice."`,

  {type:'opening',label:'Segment 1 · Opening Hook',title:'The Number Nobody Checks',timing:'⏱ 0:00–0:45',visual:'s1',script:[
    `"Around <strong>59% of adults in England</strong> have a total cholesterol level above the threshold considered raised under NHS guidelines. That's more than half the adult population."`,
    `<span class="script-pause">PAUSE</span>`,
    `"The striking thing about that statistic is this: <strong>high cholesterol causes no symptoms</strong>. No pain. No warning. Most people have absolutely no idea."`,
    `"And yet high cholesterol is one of the most significant contributors to heart attack and stroke — the two biggest killers in this country."`,
    `"In this video I want to explain what cholesterol actually is, why it matters, what the numbers mean — and what the evidence says we can do about it."`,
    `"I'm Dr Paul — I spent over twenty years as an NHS GP. This is health education, not medical advice."`,
  ]},
  {type:'section',label:'Segment 2 · Section 1',title:'What is Cholesterol?',timing:'⏱ 0:45–1:45',visual:'s2',script:[
    `"Cholesterol is a fatty substance found naturally in your blood. Despite its bad reputation, <strong>your body actually needs it</strong> — it plays an essential role in building healthy cells, producing hormones, and helping your body absorb vitamins."`,
    `"The problem arises when there is too much of certain types circulating in the bloodstream."`,
    `"Cholesterol is carried through the blood by proteins, forming particles called lipoproteins. There are three key types."`,
    `"<strong>LDL — low-density lipoprotein</strong> — often called bad cholesterol. When there's too much LDL, it accumulates on artery walls, forming fatty deposits called plaques that narrow and harden the arteries."`,
    `"<strong>HDL — high-density lipoprotein</strong> — often called good cholesterol. HDL carries cholesterol away from the arteries back to the liver, where it's broken down and removed."`,
    `"And <strong>non-HDL cholesterol</strong> — which is total cholesterol minus HDL. This broader measure is now the preferred one in UK clinical guidelines."`,
    `"Importantly: <strong>high cholesterol causes no symptoms</strong>. The only way to know your levels is through a blood test."`,
  ]},
  {type:'section',label:'Segment 3 · Section 2',title:'Why Does It Matter?',timing:'⏱ 1:45–2:35',visual:'s3',script:[
    `"When LDL cholesterol builds up on artery walls over years, it forms plaques. These plaques narrow the arteries — reducing blood flow — and they can rupture, triggering a blood clot that blocks the artery completely. That is what causes a heart attack or stroke."`,
    `"High cholesterol accounts for <strong>over 7% of all deaths in England</strong> and a third of all ischaemic heart disease worldwide."`,
    `"An NHS England analysis estimated that if 90% of people with cardiovascular disease were identified and treated, <strong>14,000 heart attacks, strokes and premature deaths</strong> could be prevented in just three years."`,
    `"Like high blood pressure, high cholesterol is largely silent. Which is why <strong>regular testing matters</strong> — particularly from age 40 onwards."`,
  ]},
  {type:'section',label:'Segment 4 · Section 3',title:'What Your Doctor Will Do',timing:'⏱ 2:35–3:30',visual:'s4',script:[
    `"Cholesterol is measured through a simple blood test — usually as part of an NHS Health Check offered to everyone aged 40 to 74 every five years, or earlier if you have risk factors."`,
    `"The test measures your total cholesterol, HDL, and triglycerides — from which your non-HDL and LDL are calculated. You don't usually need to fast beforehand under current UK guidelines."`,
    `"Your doctor will interpret the results in the context of your <strong>overall cardiovascular risk</strong> — not the numbers in isolation. Here are the general targets for most healthy adults:"`,
    `"Total cholesterol below 5.0 mmol/L. Non-HDL below 4.0 mmol/L. LDL below 3.0 mmol/L. If you already have cardiovascular disease, your targets will be lower."`,
    `"For treatment, lifestyle changes can make a real difference — reducing saturated fat, exercising regularly, maintaining a healthy weight, cutting back on alcohol, and stopping smoking."`,
    `"If medication is needed, <strong>statins</strong> are the most prescribed and best-evidenced treatment. NICE recommends offering a statin to anyone with a 10-year cardiovascular risk of 10% or more — most commonly atorvastatin."`,
  ]},
  {type:'section',label:'Segment 5 · Section 4',title:'What the Research Shows',timing:'⏱ 3:30–4:20',visual:'s5',script:[
    `"The evidence on cholesterol and statins is among the most robust in all of medicine."`,
    `"The Cholesterol Treatment Trialists' Collaboration — the world's largest pooled analysis of statin data — found that <strong>each 1 mmol/L reduction in LDL cuts the risk of major cardiovascular events by approximately one fifth</strong>. This held across men and women, all age groups, and regardless of starting cholesterol level."`,
    `"A further analysis of 27 trials found that even in people at lower cardiovascular risk, each 1 mmol/L LDL reduction produced approximately <strong>11 fewer major vascular events per 1,000 people</strong> over five years."`,
    `"The 2025 ESC/EAS dyslipidaemia guidelines reviewed all available evidence and concluded that <strong>no supplement or vitamin was found to be both safe and effective</strong> for reducing LDL cholesterol or lowering cardiovascular risk."`,
    `"Supplements are widely marketed for cholesterol. The evidence does not support them for people at meaningful cardiovascular risk — where the case for properly monitored statin therapy is strong."`,
  ]},
  {type:'cta',label:'Segment 6 · Call to Action',title:'What You Can Do',timing:'⏱ 4:20–5:00',visual:'s6',script:[
    `"<strong>First: get your cholesterol checked</strong> if it hasn't been done in the last five years. If you're over 40, an NHS Health Check will include it. You can also ask your GP."`,
    `"<strong>Second: understand your numbers</strong>. Ask your doctor what your non-HDL cholesterol is — that's the measure that matters most. Ask what your 10-year cardiovascular risk score is. These numbers together tell a much more meaningful story than total cholesterol alone."`,
    `"<strong>Third: if you've been offered a statin, consider the evidence</strong>. There's a lot of misinformation online about statins. The evidence for their benefit in people at meaningful risk is exceptionally strong. Our statins article on helf.school covers this in full."`,
    `"The full cholesterol article with all research references is on <strong>helf.school</strong>."`,
  ]},
  {type:'closing',label:'Segment 7 · Closing',title:'Sign-off',timing:'⏱ 5:00–5:30',visual:'s7',script:[
    `"Cholesterol is one of those topics where the gap between what people believe and what the evidence shows is particularly wide."`,

    `<span class="script-pause">PAUSE</span>`,
    `"Thanks for watching. The next video in this series covers statins in detail — the benefits, the real risks, and the misinformation. It's all on helf.school."`,
    `"Take care of yourself."`,
  ]},
];

      <div style="font-family:'Fraunces',serif;font-size:1.2rem;font-weight:700;color:var(--coral);">helf.school</div>
    </div>
  `,
  s7:()=>`
    <div class="end-logo">helf.school</div>
    <div class="end-tagline">Evidence-based health education for everyone</div>
    <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:13px;padding:1.1rem 1.4rem;margin-bottom:1rem;width:100%;">
      <div style="font-family:'Fraunces',serif;font-size:0.95rem;font-weight:600;color:#fff;text-align:center;line-height:1.55;">LDL drives cardiovascular risk. That risk is <span style="color:var(--coral);">modifiable.</span></div>
    </div>
    <div class="end-series">
      <div class="end-pill">01 · Hypertension</div><div class="end-pill active">02 · Cholesterol</div><div class="end-pill">03 · Heart Attack Risk</div><div class="end-pill">04 · Statins</div><div class="end-pill">05 · Lifestyle Changes</div><div class="end-pill">06 · Salt</div><div class="end-pill">07 · Supplements</div>
    </div>
    <div style="font-size:0.62rem;color:rgba(255,255,255,0.18);text-align:center;margin-top:0.75rem;">Health education only — not medical advice · Always speak to your own doctor</div>
  `,
};
const TOTAL=slides.length;
const badgeCls={opening:'badge-opening',section:'badge-section',cta:'badge-cta',closing:'badge-closing'};
const badgeLbl={opening:'Opening',section:'Content',cta:'Call to Action',closing:'Closing'};
const visualKeys=slides.map(s=>s.visual);
const slideTypes=slides.map(s=>s.type);
const slideTitles=['Introduction', 'The Number Nobody Checks', 'What is Cholesterol?', 'Why Does It Matter?', 'What Your Doctor Will Do', 'What the Research Shows', 'What You Can Do', 'Sign-off'];
let current=0;
function renderSlide(idx){
  document.getElementById('visualContent').innerHTML=visuals[visualKeys[idx]]();
  document.getElementById('slideNum').textContent=idx+1;
  document.getElementById('progressFill').style.width=((idx+1)/TOTAL*100)+'%';
  document.getElementById('prevBtn').disabled=idx===0;
  document.getElementById('nextBtn').textContent=idx===TOTAL-1?'✓ Done':'Next →';
  const b=document.getElementById('typeBadge');
  b.className='slide-type-badge '+badgeCls[slideTypes[idx]];
  b.textContent=badgeLbl[slideTypes[idx]];
  document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}
function navigate(dir){const n=current+dir;if(n<0||n>=TOTAL)return;current=n;renderSlide(n);}
const de=document.getElementById('navDots');
slideTitles.forEach((t,i)=>{const d=document.createElement('div');d.className='nav-dot'+(i===0?' active':'');d.title=t;d.onclick=()=>{current=i;renderSlide(i);};de.appendChild(d);});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')navigate(1);if(e.key==='ArrowLeft'||e.key==='ArrowUp')navigate(-1);});
renderSlide(0);
</script>
</body>
</html>
