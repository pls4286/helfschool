<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Statins — Benefits and Risks — Teleprompter | helf.school</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --bg:#000; --text:#fff; --highlight:#C8423A; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;overflow:hidden;touch-action:none}
    .controls{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(0,0,0,.90);border-bottom:1px solid rgba(255,255,255,.10);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 1rem;gap:.5rem}
    .ctrl-left{display:flex;align-items:center;gap:.75rem} .ctrl-right{display:flex;align-items:center;gap:.5rem}
    .ctrl-btn{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.20);color:#fff;font-size:.8rem;font-weight:600;padding:.35rem .85rem;border-radius:7px;cursor:pointer;transition:background .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
    .ctrl-btn:hover,.ctrl-btn:active{background:rgba(255,255,255,.22)} .ctrl-btn.active{background:var(--highlight);border-color:var(--highlight)}
    .speed-wrap,.font-wrap{display:flex;align-items:center;gap:.4rem}
    .speed-label,.font-label{font-size:.72rem;color:rgba(255,255,255,.55);white-space:nowrap}
    .speed-btn,.font-btn{width:28px;height:28px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:.9rem;font-weight:700;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
    .speed-btn:active,.font-btn:active{background:rgba(255,255,255,.25)}
    .speed-val{font-size:.8rem;font-weight:600;color:var(--highlight);min-width:18px;text-align:center}
    .seg-indicator{font-size:.72rem;color:rgba(255,255,255,.45);white-space:nowrap} .seg-indicator span{color:var(--highlight);font-weight:600}
    .scroll-outer{position:fixed;top:52px;bottom:56px;left:0;right:0;overflow:hidden}
    .scroll-outer::before,.scroll-outer::after{content:'';position:absolute;left:0;right:0;z-index:10;pointer-events:none}
    .scroll-outer::before{top:0;height:80px;background:linear-gradient(to bottom,#000 0%,transparent 100%)}
    .scroll-outer::after{bottom:0;height:80px;background:linear-gradient(to top,#000 0%,transparent 100%)}
    .reading-line{position:absolute;top:50%;left:0;right:0;height:2px;background:rgba(212,124,58,.35);z-index:9;pointer-events:none}
    .scroll-inner{padding:50vh 2rem 50vh;will-change:transform}
    .segment{margin-bottom:3.5rem}
    .seg-header{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid rgba(255,255,255,.10)}
    .seg-badge{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.15rem .55rem;border-radius:100px}
    .sb-opening{background:rgba(212,124,58,.25);color:var(--highlight)} .sb-section{background:rgba(255,255,255,.10);color:rgba(255,255,255,.70)}
    .sb-cta{background:rgba(122,158,135,.25);color:#7A9E87} .sb-closing{background:rgba(232,168,74,.25);color:#E8A84A}
    .seg-name{font-size:.72rem;font-weight:600;color:rgba(255,255,255,.45)} .seg-time{font-size:.68rem;color:rgba(255,255,255,.30);margin-left:auto}
    .seg-heading{font-size:1rem;font-weight:600;color:rgba(255,255,255,.40);margin-bottom:.85rem;letter-spacing:.02em}
    .script-line{font-size:1.9rem;line-height:1.75;color:#fff;font-weight:400;margin-bottom:.9rem;padding:.25rem 0}
    .script-line strong{color:var(--highlight);font-weight:600} .script-line em{font-style:italic;color:rgba(255,255,255,.80)}
    .pause-marker{display:inline-flex;align-items:center;gap:.4rem;background:rgba(212,124,58,.15);border:1px solid rgba(212,124,58,.35);color:var(--highlight);font-size:.85rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:.3rem .9rem;border-radius:100px;margin:.3rem 0}
    .visual-cue{display:flex;align-items:center;gap:.6rem;background:rgba(232,99,74,.12);border:2px solid rgba(232,99,74,.50);border-radius:10px;padding:.55rem 1rem;margin:.5rem 0}
    .visual-cue-icon{font-size:1.1rem;flex-shrink:0} .visual-cue-text{font-size:.95rem;font-weight:700;color:#fff;line-height:1.4} .visual-cue-text span{color:#E8634A}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(0,0,0,.90);border-top:1px solid rgba(255,255,255,.10);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1rem;gap:.5rem}
    .nav-btn{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:.82rem;font-weight:600;padding:.4rem 1rem;border-radius:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
    .nav-btn:active{background:rgba(255,255,255,.25)} .nav-btn.primary{background:var(--highlight);border-color:var(--highlight)} .nav-btn.primary:active{background:#C06A2A}
    .progress-dots{display:flex;gap:.35rem}
    .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.18);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent} .dot.active{background:var(--highlight);transform:scale(1.4)}
  </style>
</head>
<body>
<div class="controls">
  <div class="ctrl-left">
    <button class="ctrl-btn" id="playBtn" onclick="togglePlay()">▶ Play</button>
    <button class="ctrl-btn" onclick="resetScroll()">↺ Reset</button>
    <div class="speed-wrap"><div class="speed-label">Speed</div><div class="speed-btn" onclick="changeSpeed(-1)">−</div><div class="speed-val" id="speedVal">1</div><div class="speed-btn" onclick="changeSpeed(1)">+</div></div>
    <div class="font-wrap"><div class="font-label">Size</div><div class="font-btn" onclick="changeFont(-2)">A−</div><div class="font-btn" onclick="changeFont(2)">A+</div></div>
  </div>
  <div class="ctrl-right"><div class="seg-indicator">Segment <span id="segDisplay">1</span> of 9</div></div>
</div>
<div class="scroll-outer"><div class="reading-line"></div><div class="scroll-inner" id="scrollInner"></div></div>
<div class="bottom-nav">
  <button class="nav-btn" id="prevBtn" onclick="jumpSeg(-1)" disabled>← Back</button>
  <div class="progress-dots" id="dots"></div>
  <button class="nav-btn primary" id="nextBtn" onclick="jumpSeg(1)">Next →</button>
</div>
<script>
const TOTAL=9;
const segments=[

  { type:'opening', label:'Intro · Dr Paul', title:'Introduction', time:'~15 sec',
    lines:[`"I'm Dr Paul — I spent over twenty years as an NHS GP before I retired in 2019."`,`"Today I want to talk to you about <strong>statins</strong>."`,`"Now, I do have to say upfront — what I'm giving you here is health education, not medical advice."`,`"If anything I talk about feels relevant to you personally, please do take it to your own doctor."`,`"Right — let's get into it."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 1: The controversy card</span> · advance now</div></div>`,]},
  { type:'opening', label:'Segment 1', title:'The Most Controversial Medicine', time:'0:00–0:50',
    lines:[`"Statins are the most prescribed medicine in England. Around <strong>eight million people</strong> in the UK take one every day."`,`"They are also the most argued-about medicine on the internet. Claims of widespread side effects, suggestions of a pharmaceutical cover-up, and an industry of alternative health content that says statins are harmful and unnecessary."`,`<span class="pause-marker">⏸ PAUSE</span>`,`"So in this video I want to do something straightforward. I want to look at what the <strong>actual evidence says</strong> — from randomised controlled trials, from independent analyses, from the largest pooled datasets in cardiovascular medicine."`,`"Because the evidence and the online narrative are very different things. And I think you deserve to know the difference."`,`"I'm Dr Paul — over twenty years as an NHS GP. This is health education, not medical advice."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 2: What are statins?</span> · advance now</div></div>`,]},
  { type:'section', label:'Segment 2', title:'What Are Statins?', time:'0:50–1:35',
    lines:[`"Statins are a class of medication that lower LDL cholesterol — the harmful type that builds up on artery walls — by reducing the amount produced in the liver."`,`"They work by blocking an enzyme called <strong>HMG-CoA reductase</strong> — the key enzyme in the liver's cholesterol production pathway."`,`"The most commonly prescribed statin in the UK is <strong>atorvastatin</strong>. It's available as a generic medicine and costs the NHS very little — less than a pound a month in many cases."`,`"Statins are prescribed for two main purposes. <strong>Primary prevention</strong> — reducing risk in people who haven't yet had a cardiovascular event but whose 10-year risk score is 10% or above. And <strong>secondary prevention</strong> — reducing further risk in people who have already had a heart attack or stroke."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 3: The benefits</span> · advance now</div></div>`,]},
  { type:'section', label:'Segment 3', title:'The Benefits — What the Evidence Shows', time:'1:35–2:25',
    lines:[`"The Cholesterol Treatment Trialists' Collaboration is the world's largest pooled analysis of statin trial data — drawing on individual participant data from over <strong>170,000 people across 26 randomised trials</strong>."`,`"It has consistently found that each 1 mmol/L reduction in LDL cholesterol reduces the risk of major cardiovascular events — heart attack, stroke, cardiovascular death — by approximately <strong>one fifth</strong>."`,`"That benefit holds across men and women, across all age groups, and regardless of starting cholesterol level."`,`"For secondary prevention — people who've already had a heart attack — the numbers are striking. Among every 1,000 people treated for 5 years, roughly <strong>1 in 10 avoid a further major cardiovascular event</strong> that they would otherwise have had."`,`"For primary prevention, the benefit is smaller in absolute terms — but still real and meaningful for those at higher risk."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 4: The side effects</span> · advance now</div></div>`,]},
  { type:'section', label:'Segment 4', title:'The Side Effects — What the Evidence Actually Says', time:'2:25–3:20',
    lines:[`"Now — side effects. This is where the online narrative and the evidence diverge most dramatically."`,`"The most common concern people have is muscle pain. <strong>More than 90% of all muscle symptom reports in people taking statins are not caused by the statin</strong> — this was the finding of the 2022 Lancet analysis of individual data from 23 trials and over 150,000 people."`,`"The explanation is partly the <strong>nocebo effect</strong>. The ASCOT-LLA trial demonstrated this directly — when patients knew they were taking a statin, muscle symptoms were 41% more likely than when they didn't know. When blinded, the rate was virtually identical to placebo."`,`"Genuine statin-caused muscle problems do exist — but they are rare. <strong>Myopathy occurs in around 1 per 10,000 person-years</strong>. Severe rhabdomyolysis — dangerous muscle breakdown — is extremely rare."`,`"A 2026 Lancet analysis reviewed all the side effects listed on statin packaging and found <strong>no causal evidence for most of them</strong> from randomised trial data. It called on regulators to revise the labels."`,`"The genuine risks that do exist: a <strong>small increase in new-onset diabetes</strong> — around 0.2% per year — mainly in those already at higher risk. And a small increase in mild liver enzyme levels — usually clinically insignificant."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 5: What your doctor will do</span> · advance now</div></div>`,]},
  { type:'section', label:'Segment 5', title:'What Your Doctor Will Do', time:'3:20–4:00',
    lines:[`"If your QRISK3 score is 10% or above, your GP should offer you a statin — NICE guidance NG238 is clear on this."`,`"Before starting, they'll do baseline blood tests — a full lipid profile, liver function, and blood glucose. They'll ask about muscle symptoms and review any medications that might interact."`,`"In the UK, <strong>atorvastatin 20mg</strong> is recommended for primary prevention and <strong>atorvastatin 80mg</strong> for secondary prevention."`,`"Cholesterol is rechecked at three months. The target for primary prevention is a reduction of more than 40% in non-HDL cholesterol. For secondary prevention, the LDL target is 2.0 mmol/L or below."`,`"<strong>Important drug interactions</strong>: statins are broken down by an enzyme called CYP3A4. Drugs that block this — including clarithromycin, some antifungals, and amiodarone — can raise statin levels and increase risk. Always tell your doctor what else you're taking."`,`"Statins are <strong>contraindicated in pregnancy</strong>. If you're pregnant, planning a pregnancy, or breastfeeding — speak to your GP about alternatives."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 6: Statins in context</span> · advance now</div></div>`,]},
  { type:'section', label:'Segment 6', title:'Statins in Context', time:'4:00–4:40',
    lines:[`"It's worth stepping back for a moment."`,`"Statins have been studied in hundreds of trials involving hundreds of thousands of people over decades. The evidence base is one of the most thoroughly investigated in all of medicine."`,`"The finding is consistent: for people at meaningful cardiovascular risk, the benefits substantially outweigh the genuine risks."`,`"This doesn't mean everyone should take a statin. It means the decision should be made on the basis of your individual risk profile — not on the basis of internet articles or anecdotes."`,`"If you've been offered a statin and you have concerns, the right conversation to have is with your GP — with the actual evidence on the table, not the myths."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 7: What you can do</span> · advance now</div></div>`,]},
  { type:'cta', label:'Segment 7', title:'What You Can Do', time:'4:40–5:10',
    lines:[`"<strong>First: if you've been offered a statin, don't dismiss it based on what you've read online</strong>. Read the evidence. The helf.school statins article has all the references."`,`"<strong>Second: if you're already taking a statin and you have muscle symptoms</strong>, talk to your GP. Don't just stop. Symptoms can often be managed by switching statin or adjusting dose."`,`"<strong>Third: if you're not sure whether you need a statin</strong>, ask your GP to run your QRISK3 score. That's the starting point for an evidence-based conversation."`,`"Full article with all research at <strong>helf.school</strong>."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 8: Closing card</span> · advance now</div></div>`,]},
  { type:'closing', label:'Segment 8', title:'Sign-off', time:'5:10–5:35',
    lines:[`"Statins are not perfect. No medicine is. But they are among the best-evidenced cardiovascular treatments we have — and the gap between the evidence and the public perception is genuinely large."`,`"My hope is that this video gives you a basis for making an informed decision — one that's grounded in the actual data, not the noise."`,`<span class="pause-marker">⏸ PAUSE</span>`,`"Thanks for watching. All seven cardiovascular articles are on helf.school. Take care of yourself."`,]},

];
let playing=false,speed=1,fontSize=1.9,rafId=null,scrollY=0,lastTime=null,currentSeg=0;
const PX_PER_SEC_BASE=20;
function build(){const inner=document.getElementById('scrollInner');const bc={opening:'sb-opening',section:'sb-section',cta:'sb-cta',closing:'sb-closing'};const bl={opening:'Opening',section:'Section',cta:'Call to Action',closing:'Closing'};let html='';segments.forEach((s,i)=>{html+=`<div class="segment" id="seg${i}"><div class="seg-header"><span class="seg-badge ${bc[s.type]}">${bl[s.type]}</span><span class="seg-name">${s.label}</span><span class="seg-time">${s.time}</span></div><div class="seg-heading">${s.title}</div>`;s.lines.forEach(l=>{if(l.startsWith('<span class="pause-marker"')||l.startsWith('<div class="visual-cue"')){html+=`<div style="margin:.4rem 0;">${l}</div>`;}else{html+=`<div class="script-line">${l}</div>`;}}); html+=`</div>`;}); inner.innerHTML=html;const de=document.getElementById('dots');segments.forEach((s,i)=>{const d=document.createElement('div');d.className='dot'+(i===0?' active':'');d.title=s.title;d.onclick=()=>jumpToSeg(i);de.appendChild(d);});}
function getOuter(){return document.querySelector('.scroll-outer');}
function getInner(){return document.getElementById('scrollInner');}
function togglePlay(){playing=!playing;const btn=document.getElementById('playBtn');if(playing){btn.textContent='⏸ Pause';btn.classList.add('active');lastTime=null;rafId=requestAnimationFrame(tick);}else{btn.textContent='▶ Play';btn.classList.remove('active');if(rafId)cancelAnimationFrame(rafId);}}
function tick(ts){if(!lastTime)lastTime=ts;const dt=(ts-lastTime)/1000;lastTime=ts;scrollY+=PX_PER_SEC_BASE*speed*dt;applyScroll();updateSegIndicator();if(playing)rafId=requestAnimationFrame(tick);}
function applyScroll(){const inner=getInner();const max=inner.scrollHeight-window.innerHeight;scrollY=Math.min(Math.max(scrollY,0),max);inner.style.transform=`translateY(${-scrollY}px)`;}
function resetScroll(){if(playing)togglePlay();scrollY=0;applyScroll();currentSeg=0;updateDots();document.getElementById('segDisplay').textContent='1';document.getElementById('prevBtn').disabled=true;document.getElementById('nextBtn').textContent='Next →';}
function changeSpeed(dir){speed=Math.min(Math.max(speed+dir,1),6);document.getElementById('speedVal').textContent=speed;}
function changeFont(dir){fontSize=Math.min(Math.max(fontSize+dir*0.1,1.0),2.8);document.querySelectorAll('.script-line').forEach(el=>{el.style.fontSize=fontSize+'rem';});}
function getSegTop(i){const el=document.getElementById('seg'+i);if(!el)return 0;const h=getOuter().clientHeight;return el.offsetTop-h*0.5+60;}
function jumpToSeg(i){if(playing)togglePlay();currentSeg=Math.min(Math.max(i,0),segments.length-1);scrollY=Math.max(getSegTop(currentSeg),0);applyScroll();updateDots();updateSegIndicator();document.getElementById('prevBtn').disabled=currentSeg===0;document.getElementById('nextBtn').textContent=currentSeg===segments.length-1?'✓ Done':'Next →';}
function jumpSeg(dir){jumpToSeg(currentSeg+dir);}
function updateSegIndicator(){const midY=scrollY+getOuter().clientHeight*0.5;for(let i=segments.length-1;i>=0;i--){const el=document.getElementById('seg'+i);if(el&&el.offsetTop<=midY+40){if(currentSeg!==i){currentSeg=i;updateDots();document.getElementById('segDisplay').textContent=i+1;document.getElementById('prevBtn').disabled=i===0;document.getElementById('nextBtn').textContent=i===segments.length-1?'✓ Done':'Next →';}break;}}}
function updateDots(){document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===currentSeg));document.getElementById('segDisplay').textContent=currentSeg+1;}
let touchStartY=0,touchScrollY=0;
document.querySelector('.scroll-outer').addEventListener('touchstart',e=>{if(playing)return;touchStartY=e.touches[0].clientY;touchScrollY=scrollY;},{passive:true});
document.querySelector('.scroll-outer').addEventListener('touchmove',e=>{if(playing)return;scrollY=touchScrollY+(touchStartY-e.touches[0].clientY);applyScroll();updateSegIndicator();},{passive:true});
build();applyScroll();
</script></body></html>
