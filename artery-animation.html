<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cholesterol Buildup Animation</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:  #1B2A4A;
      --coral: #E8634A;
      --cream: #FAF7F2;
      --sage:  #7A9E87;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--navy);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      padding: 2rem;
    }
    h1 {
      font-family: 'Fraunces', serif;
      color: #fff;
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      text-align: center;
    }
    .subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 0.82rem;
      margin-bottom: 2rem;
      text-align: center;
      letter-spacing: 0.04em;
    }
    .stage {
      width: 100%;
      max-width: 680px;
      background: #111827;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    canvas { display: block; width: 100%; }
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 1.25rem 1.5rem;
      background: rgba(255,255,255,0.04);
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .btn {
      background: var(--coral);
      color: #fff;
      border: none;
      padding: 0.55rem 1.4rem;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover { background: #D04A33; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: default; }
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7);
    }
    .btn-outline:hover { background: rgba(255,255,255,0.06); color: #fff; }
    .label-panel {
      padding: 1rem 1.5rem 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .stage-label {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .stage-name {
      font-family: 'Fraunces', serif;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
    }
    .progress-dots { display: flex; gap: 6px; }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transition: background 0.3s;
    }
    .dot.active { background: var(--coral); }
    .description {
      padding: 0.5rem 1.5rem 1rem;
      font-size: 0.84rem;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
      min-height: 3rem;
    }
  </style>
</head>
<body>

<h1>Cholesterol &amp; Your Arteries</h1>
<p class="subtitle">How atherosclerosis develops over time</p>

<div class="stage">
  <div class="label-panel">
    <div>
      <div class="stage-label">Stage <span id="stageNum">1</span> of 4</div>
      <div class="stage-name" id="stageName">Healthy artery</div>
    </div>
    <div class="progress-dots">
      <div class="dot active" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>
  </div>
  <div class="description" id="desc">Blood flows freely through a wide, flexible artery. The walls are smooth and clean.</div>
  <canvas id="c" height="280"></canvas>
  <div class="controls">
    <button class="btn btn-outline" id="prevBtn" onclick="prev()">← Back</button>
    <button class="btn" id="nextBtn" onclick="next()">Next stage →</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Responsive ──
function resize() {
  canvas.width  = canvas.parentElement.clientWidth;
  canvas.height = 280;
}
window.addEventListener('resize', () => { resize(); });
resize();

// ── Stages ──
// plaqueRatio: 0–1 controls wall thickening (stages 1-3 only)
// clotAlpha:   0–1 controls clot visibility (stage 4 only)
// For stage 4 we FREEZE plaqueRatio at 0.55 so the lumen stays visible
const stages = [
  { name:'Healthy artery',            plaqueRatio:0,    clotAlpha:0, bloodOp:1,    bloodSpd:1.0,
    desc:'Blood flows freely through a wide, flexible artery. The walls are smooth and clean.' },
  { name:'Early plaque forming',      plaqueRatio:0.28, clotAlpha:0, bloodOp:0.9,  bloodSpd:0.8,
    desc:'LDL cholesterol begins to accumulate inside the artery wall, triggering inflammation. The opening starts to narrow.' },
  { name:'Significant narrowing',     plaqueRatio:0.55, clotAlpha:0, bloodOp:0.75, bloodSpd:0.55,
    desc:'The plaque grows larger. Blood flow becomes restricted and the artery loses flexibility. This is atherosclerosis.' },
  { name:'Blood clot — artery blocked', plaqueRatio:0.55, clotAlpha:1, bloodOp:0.2,  bloodSpd:0.05,
    desc:'The plaque ruptures. A blood clot (shown in yellow) forms and blocks the remaining opening — cutting off oxygen to the heart muscle. This is a heart attack.' },
];

let current = 0;
let animFrom = 0, animTo = 0, animT = 1, animating = false;
let particles = [], frame = 0;

function lerp(a,b,t){ return a+(b-a)*t; }

// ── Particles ──
function initParticles() {
  particles = [];
  for (let i=0;i<20;i++) {
    particles.push({
      x: Math.random()*canvas.width,
      size: 2.5+Math.random()*3,
      speed: 0.5+Math.random()*0.9,
      phase: Math.random()*Math.PI*2,
    });
  }
}
initParticles();

// ── Main draw ──
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  const s0 = stages[animFrom], s1 = stages[animTo];
  const t  = animT;

  const plaqueR  = lerp(s0.plaqueRatio, s1.plaqueRatio, t);
  const clotA    = lerp(s0.clotAlpha,   s1.clotAlpha,   t);
  const bloodOp  = lerp(s0.bloodOp,     s1.bloodOp,     t);
  const bloodSpd = lerp(s0.bloodSpd,    s1.bloodSpd,    t);

  // ── Geometry ──
  const cy          = H / 2;
  const outerR      = H * 0.42;
  const wallBase    = H * 0.07;           // minimum wall thickness
  const wallExtra   = outerR * 0.55;      // maximum extra plaque inward growth
  const wallThick   = wallBase + wallExtra * plaqueR;
  const lumenR      = outerR - wallThick; // always > 0 for stages 1-3; frozen at stage 3 value for stage 4

  // ── Dark background ──
  ctx.fillStyle = '#111827';
  ctx.fillRect(0,0,W,H);

  // ── Outer artery wall ──
  const wallGrad = ctx.createLinearGradient(0, cy-outerR, 0, cy+outerR);
  wallGrad.addColorStop(0,   '#7A2A1A');
  wallGrad.addColorStop(0.3, '#B84A30');
  wallGrad.addColorStop(0.5, '#CC5A3A');
  wallGrad.addColorStop(0.7, '#B84A30');
  wallGrad.addColorStop(1,   '#7A2A1A');
  ctx.fillStyle = wallGrad;
  ctx.fillRect(0, cy-outerR, W, outerR*2);

  // ── Plaque layer (between outerR and lumenR) ──
  if (plaqueR > 0.01) {
    const pGrad = ctx.createLinearGradient(0, cy-(outerR-wallBase), 0, cy+(outerR-wallBase));
    pGrad.addColorStop(0,   'rgba(190,130,40,0.97)');
    pGrad.addColorStop(0.4, 'rgba(150,90,20,0.97)');
    pGrad.addColorStop(0.5, 'rgba(100,55,10,0.97)');
    pGrad.addColorStop(0.6, 'rgba(150,90,20,0.97)');
    pGrad.addColorStop(1,   'rgba(190,130,40,0.97)');
    ctx.fillStyle = pGrad;
    // Top plaque band
    ctx.fillRect(0, cy-outerR+wallBase, W, wallExtra*plaqueR);
    // Bottom plaque band
    ctx.fillRect(0, cy+lumenR, W, wallExtra*plaqueR);

    // Bumpy plaque surface — top
    for (let i=0;i<10;i++) {
      const bx = (W/10)*i + W/20;
      const bh = (wallExtra*plaqueR) * (0.25+0.2*Math.sin(i*2.1));
      const by = cy - lumenR;
      const bg = ctx.createRadialGradient(bx, by-bh*0.3, 0, bx, by, bh*2);
      bg.addColorStop(0, 'rgba(220,180,70,0.55)');
      bg.addColorStop(1, 'rgba(120,60,10,0)');
      ctx.beginPath();
      ctx.ellipse(bx, by, bh*1.4, bh*0.6, 0, 0, Math.PI*2);
      ctx.fillStyle = bg;
      ctx.fill();
    }
    // Bumpy plaque surface — bottom
    for (let i=0;i<10;i++) {
      const bx = (W/10)*i + W/14;
      const bh = (wallExtra*plaqueR) * (0.22+0.2*Math.sin(i*1.7));
      const by = cy + lumenR;
      const bg = ctx.createRadialGradient(bx, by+bh*0.3, 0, bx, by, bh*2);
      bg.addColorStop(0, 'rgba(220,180,70,0.55)');
      bg.addColorStop(1, 'rgba(120,60,10,0)');
      ctx.beginPath();
      ctx.ellipse(bx, by, bh*1.4, bh*0.6, 0, 0, Math.PI*2);
      ctx.fillStyle = bg;
      ctx.fill();
    }
  }

  // ── Blood lumen ──
  const bGrad = ctx.createLinearGradient(0, cy-lumenR, 0, cy+lumenR);
  bGrad.addColorStop(0,   `rgba(180,30,30,${bloodOp*0.7})`);
  bGrad.addColorStop(0.3, `rgba(210,40,40,${bloodOp})`);
  bGrad.addColorStop(0.5, `rgba(230,50,50,${bloodOp})`);
  bGrad.addColorStop(0.7, `rgba(210,40,40,${bloodOp})`);
  bGrad.addColorStop(1,   `rgba(180,30,30,${bloodOp*0.7})`);
  ctx.fillStyle = bGrad;
  ctx.fillRect(0, cy-lumenR, W, lumenR*2);

  // ── Blood particles ──
  frame++;
  particles.forEach(p => {
    const wave = Math.sin(frame*0.045 + p.phase) * lumenR * 0.3;
    const py   = cy + wave;
    const spd  = p.speed * bloodSpd * 3;
    p.x = (p.x + spd + W) % (W+20) - 10;
    if (lumenR > 6 && bloodOp > 0.05) {
      const pg = ctx.createRadialGradient(p.x, py, 0, p.x, py, p.size*1.6);
      pg.addColorStop(0, `rgba(255,210,210,${bloodOp*0.85})`);
      pg.addColorStop(1, 'rgba(255,80,80,0)');
      ctx.beginPath();
      ctx.arc(p.x, py, p.size, 0, Math.PI*2);
      ctx.fillStyle = pg;
      ctx.fill();
    }
  });

  // ── CLOT — drawn AFTER blood, ON TOP, inside lumen ──
  // Completely separate from plaqueRatio. Bold yellow/amber so unmissable.
  if (clotA > 0.01) {
    const clotCX = W * 0.52;
    const clotCY = cy;
    const clotW  = lumenR * 1.6;   // wider than tall — fills left-right
    const clotH  = lumenR * 0.88;  // fits snugly inside lumen height

    // Main clot body — solid amber/yellow
    const cg = ctx.createRadialGradient(clotCX, clotCY-clotH*0.1, 0, clotCX, clotCY, clotW*0.9);
    cg.addColorStop(0,   `rgba(255,220,60,${clotA})`);
    cg.addColorStop(0.5, `rgba(240,180,30,${clotA})`);
    cg.addColorStop(0.85,`rgba(200,130,20,${clotA*0.9})`);
    cg.addColorStop(1,   `rgba(160,90,10,${clotA*0.7})`);

    ctx.beginPath();
    ctx.ellipse(clotCX, clotCY, clotW, clotH, 0, 0, Math.PI*2);
    ctx.fillStyle = cg;
    ctx.fill();

    // Hard dark border — makes shape pop off the red background
    ctx.beginPath();
    ctx.ellipse(clotCX, clotCY, clotW, clotH, 0, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(120,60,0,${clotA})`;
    ctx.lineWidth = 3;
    ctx.stroke();

    // Fibrin strands across the clot (darker lines for texture)
    ctx.save();
    ctx.globalAlpha = clotA * 0.5;
    ctx.strokeStyle = 'rgba(160,100,10,1)';
    ctx.lineWidth   = 1.5;
    // clip to ellipse so lines stay inside
    ctx.beginPath();
    ctx.ellipse(clotCX, clotCY, clotW-2, clotH-2, 0, 0, Math.PI*2);
    ctx.clip();
    for (let row=-3;row<=3;row++) {
      const ry = clotCY + row*(clotH*0.28);
      const hw = clotW * Math.sqrt(Math.max(0, 1-Math.pow(row*0.28,2))) * 0.95;
      ctx.beginPath();
      ctx.moveTo(clotCX-hw, ry + (row%2===0?4:-4));
      ctx.lineTo(clotCX,    ry + (row%2===0?-4:4));
      ctx.lineTo(clotCX+hw, ry + (row%2===0?4:-4));
      ctx.stroke();
    }
    ctx.restore();

    // Label — bold dark navy text, very large, unmissable
    if (clotA > 0.3) {
      ctx.save();
      ctx.globalAlpha = Math.min(1,(clotA-0.3)/0.4);
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      const fs = Math.max(12, Math.min(18, lumenR * 0.62));
      ctx.font = `800 ${fs}px DM Sans`;
      // White halo
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth   = 4;
      ctx.strokeText('BLOOD CLOT', clotCX, clotCY);
      // Navy text
      ctx.fillStyle = '#1B2A4A';
      ctx.fillText('BLOOD CLOT', clotCX, clotCY);
      ctx.restore();
    }
  }

  // ── Wall depth edges ──
  const edH = wallBase * 1.2;
  const tEdge = ctx.createLinearGradient(0, cy-outerR, 0, cy-outerR+edH);
  tEdge.addColorStop(0,'rgba(30,10,5,0.85)'); tEdge.addColorStop(1,'rgba(30,10,5,0)');
  ctx.fillStyle=tEdge; ctx.fillRect(0, cy-outerR, W, edH);

  const bEdge = ctx.createLinearGradient(0, cy+outerR-edH, 0, cy+outerR);
  bEdge.addColorStop(0,'rgba(30,10,5,0)'); bEdge.addColorStop(1,'rgba(30,10,5,0.85)');
  ctx.fillStyle=bEdge; ctx.fillRect(0, cy+outerR-edH, W, edH);

  // ── Floating labels ──
  ctx.save();
  ctx.font = '600 11px DM Sans';
  ctx.textAlign = 'left';
  if (plaqueR > 0.05) {
    ctx.fillStyle = 'rgba(220,175,70,0.9)';
    ctx.fillText('Plaque', 10, cy - lumenR - 8);
  }
  if (bloodOp > 0.1) {
    ctx.fillStyle = 'rgba(255,170,170,0.85)';
    ctx.fillText('Blood flow', 10, cy + 5);
  }
  ctx.restore();

  // ── Lumen width arrow ──
  if (lumenR > 8) {
    const ax = W*0.9;
    const col = plaqueR > 0.3 ? '#E8634A' : '#7A9E87';
    ctx.save();
    ctx.strokeStyle = col; ctx.fillStyle = col;
    ctx.lineWidth = 1.5; ctx.globalAlpha = 0.8;
    ctx.beginPath(); ctx.moveTo(ax, cy-lumenR+8); ctx.lineTo(ax, cy+lumenR-8); ctx.stroke();
    [[ax,cy-lumenR],[ax,cy+lumenR]].forEach(([x,y],i)=>{
      const dir = i===0?1:-1;
      ctx.beginPath();
      ctx.moveTo(x,y); ctx.lineTo(x-4,y+dir*8); ctx.lineTo(x+4,y+dir*8);
      ctx.closePath(); ctx.fill();
    });
    ctx.font = 'bold 10px DM Sans'; ctx.textAlign='center';
    ctx.fillText(plaqueR>0.4?'Narrowed':'Open', ax, cy-lumenR-8);
    ctx.restore();
  }
}

// ── Animation loop ──
function animate() {
  if (animating) {
    animT = Math.min(1, animT + 0.022);
    if (animT >= 1) animating = false;
  }
  draw();
  requestAnimationFrame(animate);
}

// ── UI ──
const names = stages.map(s=>s.name);
const descs  = stages.map(s=>s.desc);

function updateUI() {
  document.getElementById('stageNum').textContent  = current+1;
  document.getElementById('stageName').textContent = names[current];
  document.getElementById('desc').textContent      = descs[current];
  for(let i=0;i<4;i++) document.getElementById(`d${i}`).className='dot'+(i===current?' active':'');
  document.getElementById('prevBtn').disabled = current===0;
  document.getElementById('nextBtn').disabled = current===3;
  document.getElementById('nextBtn').textContent = current===3?'✓ Complete':'Next stage →';
}

function goTo(s) {
  if (s<0||s>3||s===current) return;
  animFrom=current; animTo=s; animT=0; animating=true;
  current=s;
  updateUI();
}

function next(){ goTo(current+1); }
function prev(){ goTo(current-1); }

updateUI();
animate();
</script>
</body>
</html>
