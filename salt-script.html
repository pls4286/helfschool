<!DOCTYPE html>

<head>

  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:#0F1A2E;font-family:'DM Sans',sans-serif;overflow:hidden;color:#fff;}
    .topbar{background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.10);height:52px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .topbar-left{display:flex;flex-direction:column;gap:.1rem;}
    .topbar-title{font-family:'Fraunces',serif;font-size:.95rem;font-weight:600;color:#fff;}
    .topbar-sub{font-size:.75rem;color:rgba(255,255,255,.75);}
    .topbar-right{display:flex;align-items:center;gap:1.5rem;}
    .slide-counter{font-size:.88rem;font-weight:600;color:rgba(255,255,255,.90);}
    .kbd-hint{font-size:.72rem;color:rgba(255,255,255,.60);}
    .progress-bar{height:3px;background:rgba(255,255,255,.08);flex-shrink:0;}
    .progress-fill{height:100%;background:#C8423A;transition:width .35s ease;}
    .main{height:calc(100vh - 55px - 3px - 48px);overflow-y:auto;padding:1.5rem 2rem;}
    .main::-webkit-scrollbar{width:4px;}
    .main::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px;}
    .seg-meta{display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem;flex-wrap:wrap;}
    .seg-label{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C8423A;}
    .seg-title{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:700;color:#fff;margin-bottom:.75rem;}
    .seg-timing{font-size:.75rem;color:rgba(255,255,255,.65);margin-left:auto;}
    .seg-section{font-size:.72rem;color:rgba(255,255,255,.55);background:rgba(255,255,255,.06);border-radius:4px;padding:.15rem .5rem;}
    .diagram-cue{background:rgba(232,99,74,.12);border:2px solid rgba(232,99,74,.55);border-radius:10px;padding:.7rem 1rem;margin:.5rem 0 .8rem;}
    .diagram-cue-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#E8634A;margin-bottom:.25rem;}
    .diagram-cue-file{font-size:.95rem;font-weight:700;color:#fff;font-family:'Fraunces',serif;}
    .diagram-cue-desc{font-size:.82rem;color:rgba(255,255,255,.80);margin-top:.2rem;line-height:1.4;}
    .diagram-cue-graphic{font-size:.78rem;color:rgba(255,255,255,.65);margin-top:.25rem;font-style:italic;line-height:1.4;}
    .script-body{display:flex;flex-direction:column;gap:.5rem;}
    .script-line{font-size:1.05rem;line-height:1.8;color:rgba(255,255,255,.90);padding:.4rem .6rem;border-radius:6px;border-left:3px solid transparent;}
    .script-line:hover{background:rgba(255,255,255,.04);border-left-color:#C8423A;}
    .script-pause{display:inline-block;background:rgba(200,66,58,.15);border:1px solid rgba(200,66,58,.35);color:#C8423A;font-size:.70rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.15rem .55rem;border-radius:100px;}
    .type-badge{display:inline-block;font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.15rem .6rem;border-radius:100px;margin-bottom:.35rem;}
    .badge-opening{background:rgba(232,99,74,.2);color:#E8634A;}
    .badge-section{background:rgba(255,255,255,.08);color:rgba(255,255,255,.75);}
    .badge-cta{background:rgba(122,158,135,.2);color:#7A9E87;}
    .badge-closing{background:rgba(232,168,74,.2);color:#E8A84A;}
    .bottom-nav{height:48px;background:rgba(255,255,255,.03);border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;flex-shrink:0;}
    .nav-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.75);font-size:.82rem;font-weight:500;padding:.4rem 1rem;border-radius:7px;cursor:pointer;transition:all .2s;}
    .nav-btn:hover{background:rgba(255,255,255,.10);color:#fff;}
    .nav-btn:disabled{opacity:.3;cursor:not-allowed;}
    .nav-btn-primary{background:#C8423A;border-color:#C8423A;color:#fff;}
    .nav-dots{display:flex;gap:.4rem;}
    .nav-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.20);cursor:pointer;transition:all .2s;}
    .nav-dot.active{background:#C8423A;transform:scale(1.3);}
  </style>

<body>
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">Salt and Blood Pressure — Presenter Deck — Script &amp; Broadcaster Notes</div>
    <div class="topbar-sub">helf.school · Cardiovascular Series · Article 06</div>
  </div>
  <div class="topbar-right">
    <div class="slide-counter">Segment <span id="segNum">1</span> of 9</div>
    <div class="kbd-hint">← → keys or buttons</div>
  </div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:11.1%"></div></div>
<div class="main" id="mainContent"></div>
<div class="bottom-nav">
  <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>← Previous</button>
  <div class="nav-dots" id="navDots"></div>
  <button class="nav-btn nav-btn-primary" id="nextBtn" onclick="navigate(1)">Next →</button>
</div>
<script>
const TOTAL=9;
const badgeClass={opening:'badge-opening',section:'badge-section',cta:'badge-cta',closing:'badge-closing'};
const badgeLabel={opening:'Opening',section:'Section',cta:'Call to Action',closing:'Closing'};
const slides=[
  {type:'opening',label:'Intro · Dr Paul',title:'Introduction',timing:'⏱ ~10 seconds',visual:'s0',script:[
    `"I'm Dr Paul — I spent over twenty years as an NHS GP before I retired in 2019."`,
    `"Today I want to talk to you about <strong>salt and blood pressure</strong>."`,
    `"Now, I do have to say upfront — what I'm giving you here is health education, not medical advice."`,
    `"If anything I talk about feels relevant to you personally, please do take it to your own doctor."`,
    `"Right — let's get into it."`,
  ]},
  {type:'opening',label:'Segment 1 · Opening',title:'The Salt You Cannot See',timing:'⏱ 0:00–0:45',visual:'s1',script:[
    `"If I asked you to cut down on salt, you'd probably think about the shaker on your table. But that shaker? It accounts for only about <strong>25% of the salt you actually eat</strong>."`,
    `<span class="script-pause">PAUSE</span>`,
    `"The other <strong>75% is already in your food</strong> before you touch it. In the bread, the cheese, the ready meals, the bacon, the sauces. Salt you never measure, never add, and often never think about."`,
    `"That is the most important fact about dietary salt — and most people have no idea. In this video, I want to explain the relationship between salt and blood pressure, what the evidence says, and how meaningful reducing salt actually is."`,
    `"I'm Dr Paul — over twenty years as an NHS GP. Health education, not medical advice."`,
  ]},
  {type:'section',label:'Segment 2 · Section 1',title:'Where Our Salt Comes From',timing:'⏱ 0:45–1:30',visual:'s2',script:[
    `"Let's start with that 75% figure. The National Diet and Nutrition Survey — the most comprehensive assessment of what UK adults eat — consistently finds that the vast majority of dietary salt comes from processed and packaged foods."`,
    `"The biggest contributors are bread and cereals — around 20%. Meat products including bacon and processed meats — around 17%. Ready meals and soups — around 15%. Cheese and dairy — around 12%."`,
    `"These are foods most of us eat every single day — sometimes multiple times a day — without giving their salt content a second thought."`,
    `"Most people in the UK consume around <strong>8 to 9 grams of salt per day</strong>. The recommended maximum under NHS and NICE guidelines is <strong>6 grams</strong> — roughly one teaspoon, including all salt already in food."`,
    `"For many people, simply reducing intake to the recommended level — not eliminating salt, just reducing it — would have a meaningful and measurable effect on blood pressure."`,
  ]},
  {type:'section',label:'Segment 3 · Section 2',title:'How Salt Raises Blood Pressure',timing:'⏱ 1:30–2:10',visual:'s3',script:[
    `"Salt is made up of sodium and chloride. It's the <strong>sodium component</strong> that affects blood pressure."`,
    `"When there's too much sodium in the blood, the body retains water to dilute it. This increases the volume of blood in circulation — and with it, the pressure on artery walls."`,
    `"Over time, this sustained elevation damages blood vessel walls, strains the heart, and accelerates atherosclerosis."`,
    `"The INTERSALT study — covering over 10,000 people across 52 centres worldwide — provided the foundational evidence that sodium intake and blood pressure are directly related at a population level. Higher sodium populations consistently have higher blood pressure."`,
    `"Importantly, the relationship is dose-dependent. The more sodium, the higher the pressure. And the more you reduce sodium, the more blood pressure falls."`,
  ]},
  {type:'section',label:'Segment 4 · Section 3',title:'What the Evidence Shows',timing:'⏱ 2:10–3:00',visual:'s4',script:[
    `"The most important trial on this is the <strong>DASH-Sodium trial</strong>, published in the New England Journal of Medicine in 2001."`,
    `"It found that reducing sodium intake to the recommended level — alongside the DASH dietary pattern — reduced systolic blood pressure by <strong>8 to 14 mmHg</strong> in people with hypertension. That's comparable to the effect of a single antihypertensive drug."`,
    `"A meta-analysis by He and MacGregor, published in the BMJ in 2003, estimated that a <strong>2 mmHg reduction in average systolic blood pressure</strong> across the population would prevent around <strong>12,000 strokes and 7,000 heart attacks per year</strong> in the UK. Salt reduction was identified as the single most effective public health intervention for achieving this."`,
    `"The UK salt reduction programme, tracked by He and colleagues in BMJ Open in 2014, showed that average salt intake fell from around 9.5g per day in 2001 to around 8.1g per day in 2011 — driven largely by reformulation of processed foods. Over the same period, average blood pressure fell measurably."`,
    `"Potassium — found in fruit, vegetables, and legumes — has a direct counterbalancing effect on sodium's impact on blood pressure. A meta-analysis in the BMJ in 2013 found that higher potassium intake was associated with a <strong>24% lower risk of stroke</strong>."`,
  ]},
  {type:'section',label:'Segment 5 · Section 4',title:'What Your Doctor Will Discuss',timing:'⏱ 3:00–3:40',visual:'s5',script:[
    `"If you have hypertension, your GP will almost certainly discuss salt as part of your management plan. Under NICE guideline NG136, salt reduction to under 6 grams per day is recommended as a first-line lifestyle intervention."`,
    `"They may also mention the <strong>DASH diet</strong> — a dietary pattern specifically designed and tested to lower blood pressure. It combines low sodium with high potassium, calcium, and magnesium. Rich in fruit, vegetables, low-fat dairy, whole grains, and lean protein."`,
    `"On food labels: sodium and salt are not the same. Labels often show sodium in milligrams. To convert to salt, multiply by 2.5. So 0.4g of sodium per 100g = 1g of salt per 100g. High salt means more than 1.5g per 100g. Low salt means less than 0.3g."`,
    `"Practical changes that make the biggest difference: switching to lower-salt bread, reducing processed meat, choosing lower-salt cheese, and cooking from scratch more often. The table shaker is the last thing to worry about."`,
  ]},
  {type:'section',label:'Segment 6 · Research Summary',title:'Evidence in Brief',timing:'⏱ 3:40–4:15',visual:'s6',script:[
    `"To summarise the key evidence:"`,
    `"INTERSALT study — 10,000+ people, 52 centres worldwide — confirmed the population-level link between sodium intake and blood pressure."`,
    `"DASH-Sodium trial — NEJM 2001 — sodium reduction to recommended level reduced systolic BP by 8–14 mmHg, comparable to a blood pressure drug."`,
    `"He and MacGregor, BMJ 2003 — a 2 mmHg reduction in population-average blood pressure from salt reduction could prevent 12,000 strokes and 7,000 heart attacks per year in the UK."`,
    `"Aburto et al., BMJ 2013 — higher potassium intake associated with 24% lower stroke risk."`,
    `"The evidence is consistent, replicated across decades of research, and policy-relevant. Salt reduction works. And most of it doesn't require any willpower at the table — it requires awareness of what's in the food."`,
  ]},
  {type:'cta',label:'Segment 7 · Call to Action',title:'What You Can Do',timing:'⏱ 4:15–4:50',visual:'s7',script:[
    `"<strong>Check the labels</strong> on the foods you buy most regularly — bread, cereals, ready meals, cheese. Look for the salt figure per 100g. High is above 1.5g. Low is below 0.3g. Start there."`,
    `"<strong>Think about sources, not the shaker</strong>. The table shaker is not the problem. The bread you eat every day, the cereal in the morning, the cheese at lunch — those are where the big reductions come from."`,
    `"<strong>Add potassium</strong>. More fruit, vegetables, and legumes — potatoes, bananas, spinach, beans, lentils. Potassium directly counteracts sodium's effect on blood pressure."`,
    `"Full article with all evidence at <strong>helf.school</strong>."`,
  ]},
  {type:'closing',label:'Segment 8 · Closing',title:'Sign-off',timing:'⏱ 4:50–5:10',visual:'s8',script:[
    `"The link between salt and blood pressure is one of the most well-evidenced relationships in nutritional science. The mechanism is understood. The trials have been done. And the public health implication is clear."`,
    `"Most of the salt you eat isn't in your hands to control at the table. But knowing where it comes from — and making even a few consistent changes to the foods you buy — can make a measurable difference to your blood pressure and your long-term cardiovascular risk."`,
    `<span class="script-pause">PAUSE</span>`,
    `"Thanks for watching. helf.school — take care of yourself."`,
  ]},
];
function buildSegment(s,idx){
  let h='';
  h+=`<div class="seg-meta"><span class="type-badge ${badgeClass[s.type]}">${badgeLabel[s.type]}</span><span class="seg-label">${s.label}</span>${s.section?`<span class="seg-section">${s.section}</span>`:''}<span class="seg-timing">${s.timing}</span></div>`;
  h+=`<div class="seg-title">${s.title}</div>`;
  if(s.visuals_screen){h+=`<div class="diagram-cue"><div class="diagram-cue-label">📺 Switch to visuals screen</div><div class="diagram-cue-file">${s.visuals_screen.file}</div><div class="diagram-cue-desc">${s.visuals_screen.what}</div>${s.visuals_screen.graphic?`<div class="diagram-cue-graphic">On screen: ${s.visuals_screen.graphic}</div>`:''}</div>`;}
  h+=`<div class="script-body">`;
  s.script.forEach(l=>{h+=`<p class="script-line">${l}</p>`;});
  h+=`</div>`;return h;
}
let current=0;
function renderSegment(idx){
  document.getElementById('mainContent').innerHTML=buildSegment(slides[idx],idx);
  document.getElementById('mainContent').scrollTop=0;
  document.getElementById('segNum').textContent=idx+1;
  document.getElementById('progressFill').style.width=((idx+1)/TOTAL*100)+'%';
  document.getElementById('prevBtn').disabled=idx===0;
  document.getElementById('nextBtn').textContent=idx===TOTAL-1?'✓ Done':'Next →';
  document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}
function navigate(dir){const n=current+dir;if(n<0||n>=TOTAL)return;current=n;renderSegment(n);}
const de=document.getElementById('navDots');
slides.forEach((s,i)=>{const d=document.createElement('div');d.className='nav-dot'+(i===0?' active':'');d.title=s.title;d.onclick=()=>{current=i;renderSegment(i);};de.appendChild(d);});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')navigate(1);if(e.key==='ArrowLeft'||e.key==='ArrowUp')navigate(-1);});
renderSegment(0);
</script>
</body>
</html>
