  {type:'opening',label:'Intro · Dr Paul',title:'Introduction',timing:'⏱ ~10 seconds',visual:'s0',script:[

      `"Hypertension is diagnosed when readings of <strong>140 over 90 or above</strong> are consistently present. The word 'consistently' matters — a single high reading in a clinic doesn't confirm it."`,

      `"Hypertension is the <strong>single largest risk factor for stroke</strong> — contributing to roughly half of all strokes in the UK. It substantially increases the risk of heart attack, heart failure, and kidney damage."`,
      `"And because it causes <strong>no symptoms</strong> — no pain, no warning signs — most people only find out at a routine appointment, or worse, when something goes wrong."`,
      `"In the UK, around <strong>one in three adults</strong> has high blood pressure. Among people over 65, that rises to around <strong>six in ten</strong>."`,
    ]
  },

    visual:'s4',

      `"So you've been told your blood pressure is high. What happens next?"`,

      `"It's considered much more accurate than a clinic reading, because it captures your blood pressure across a full range of activities, without the white coat effect."`,
      `"Your GP will also arrange blood tests and a urine test to check your kidneys — high blood pressure can both cause and be caused by kidney problems."`,
      `"The main drug options in the UK are: <strong>ACE inhibitors or ARBs</strong> — such as ramipril and losartan — which relax blood vessels. <strong>Calcium channel blockers</strong> like amlodipine, which widen blood vessels. And <strong>thiazide-like diuretics</strong> — water tablets — which reduce fluid volume."`,
      `"For most people under 80, the treatment target is below <strong>140/90</strong> in clinic. For those over 80, below <strong>150/90</strong>. These targets are set by current NICE guidelines."`,
    ]
  },
  {
    type:'section', label:'Segment 5 · Section 4', title:'What the Research Shows', timing:'⏱ 3:50–4:45',
    visual:'s5',
    script:[
      `"Now — I want to talk about what the evidence tells us. Because I think this is genuinely reassuring."`,
      `"A major analysis published in <em>The Lancet</em> in 2021, drawing on data from over <strong>340,000 participants</strong>, found that reducing systolic blood pressure by just <strong>5 mmHg</strong> cut the risk of major cardiovascular events by around <strong>10%</strong>. That held across all blood pressure levels studied."`,
      `"Ten percent risk reduction. From a 5-point reduction. That's a significant return for a modest change."`,
      `"A Cochrane review of 16 trials — nearly 27,000 older adults — confirmed that blood pressure medication reduces the risk of death, stroke and heart attack in people over 60. Evidence rated <strong>moderate to high certainty</strong>."`,
      `"For people with <strong>mild</strong> hypertension and no existing cardiovascular disease, the evidence for medication is less clear-cut. A 2025 Cochrane update found limited evidence of benefit in this lower-risk group. This is a reason for an honest conversation with your doctor — not a reason to ignore it."`,

    visual:'s6',
    script:[

      `"The full article — with all the research references linked — is on <strong>helf.school</strong>."`,

    visual:'s7',
    script:[

      `<span class="script-pause">PAUSE</span>`,
      `"Thanks for watching. There are six more cardiovascular articles on helf.school — cholesterol, statins, heart attack risk, lifestyle changes, salt, and supplements. All evidence-based. All free."`,

const visualKeys=slides.map(s=>s.visual);
const slideTypes=slides.map(s=>s.type);
const slideTitles=['Introduction', 'The Silent Condition', 'What is High Blood Pressure?', 'Why Does It Matter?', 'What Your Doctor Will Do', 'What the Research Shows', 'What You Can Do', 'Sign-off'];
let current=0;
function renderSlide(idx){
  document.getElementById('visualContent').innerHTML=visuals[visualKeys[idx]]();
  document.getElementById('slideNum').textContent=idx+1;
  document.getElementById('progressFill').style.width=((idx+1)/TOTAL*100)+'%';
  document.getElementById('prevBtn').disabled=idx===0;
  document.getElementById('nextBtn').textContent=idx===TOTAL-1?'✓ Done':'Next →';
  const b=document.getElementById('typeBadge');
  b.className='slide-type-badge '+badgeCls[slideTypes[idx]];
  b.textContent=badgeLbl[slideTypes[idx]];
  document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}
function navigate(dir){const n=current+dir;if(n<0||n>=TOTAL)return;current=n;renderSlide(n);}
const de=document.getElementById('navDots');
slideTitles.forEach((t,i)=>{const d=document.createElement('div');d.className='nav-dot'+(i===0?' active':'');d.title=t;d.onclick=()=>{current=i;renderSlide(i);};de.appendChild(d);});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')navigate(1);if(e.key==='ArrowLeft'||e.key==='ArrowUp')navigate(-1);});
renderSlide(0);
</script>
