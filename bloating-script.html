<!DOCTYPE html>

<head>

  <style>
    :root { --digest:#D47C3A; --navy:#1B2A4A; --sage:#7A9E87; --coral:#E8634A; }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; height:100%; background:#0F1A2E; font-family:'DM Sans',sans-serif; overflow:hidden; color:#fff; }

    .topbar { background:rgba(255,255,255,.04); border-bottom:1px solid rgba(255,255,255,.10); height:52px; padding:0 1.5rem; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .topbar-left { display:flex; flex-direction:column; gap:.1rem; }
    .topbar-title { font-family:'Fraunces',serif; font-size:.95rem; font-weight:700; color:#fff; }
    .topbar-sub { font-size:.75rem; color:rgba(255,255,255,.75); }
    .topbar-right { display:flex; align-items:center; gap:1.5rem; }

    .kbd-hint { font-size:.72rem; color:rgba(255,255,255,.60); }

    .progress-bar { height:3px; background:rgba(255,255,255,.08); flex-shrink:0; }
    .progress-fill { height:100%; background:var(--digest); transition:width .35s ease; }

    .main { height:calc(100vh - 55px - 3px - 48px); overflow-y:auto; padding:1.5rem 2rem; }
    .main::-webkit-scrollbar { width:4px; }
    .main::-webkit-scrollbar-thumb { background:rgba(255,255,255,.15); border-radius:2px; }

    .seg-meta { display:flex; align-items:center; gap:.75rem; margin-bottom:.5rem; flex-wrap:wrap; }
    .seg-label { font-size:.7rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--digest); }
    .seg-title { font-family:'Fraunces',serif; font-size:1.3rem; font-weight:700; color:#fff; margin-bottom:.75rem; }
    .seg-timing { font-size:.75rem; color:rgba(255,255,255,.65); margin-left:auto; }
    .seg-section { font-size:.72rem; color:rgba(255,255,255,.55); background:rgba(255,255,255,.06); border-radius:4px; padding:.15rem .5rem; }

    .diagram-cue { background:rgba(232,99,74,.12); border:2px solid rgba(232,99,74,.55); border-radius:10px; padding:.7rem 1rem; margin:.5rem 0 .8rem; }
    .diagram-cue-label { font-size:.68rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#E8634A; margin-bottom:.25rem; }
    .diagram-cue-file { font-size:.95rem; font-weight:700; color:#fff; font-family:'Fraunces',serif; }
    .diagram-cue-desc { font-size:.82rem; color:rgba(255,255,255,.80); margin-top:.2rem; line-height:1.4; }
    .diagram-cue-graphic { font-size:.78rem; color:rgba(255,255,255,.65); margin-top:.25rem; font-style:italic; line-height:1.4; }

    .script-body { display:flex; flex-direction:column; gap:.5rem; }
    .script-line { font-size:1.05rem; line-height:1.8; color:rgba(255,255,255,.90); padding:.4rem .6rem; border-radius:6px; border-left:3px solid transparent; }
    .script-line:hover { background:rgba(255,255,255,.04); border-left-color:var(--digest); }
    .script-pause { display:inline-block; background:rgba(212,124,58,.15); border:1px solid rgba(212,124,58,.35); color:var(--digest); font-size:.70rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; padding:.15rem .55rem; border-radius:100px; }

    .type-badge { display:inline-block; font-size:.65rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; padding:.15rem .6rem; border-radius:100px; margin-bottom:.35rem; }
    .badge-opening { background:rgba(232,99,74,.2); color:#E8634A; }
    .badge-section  { background:rgba(255,255,255,.08); color:rgba(255,255,255,.75); }
    .badge-cta      { background:rgba(122,158,135,.2); color:#7A9E87; }
    .badge-closing  { background:rgba(232,168,74,.2); color:#E8A84A; }

    .bottom-nav { height:48px; background:rgba(255,255,255,.03); border-top:1px solid rgba(255,255,255,.07); display:flex; align-items:center; justify-content:space-between; padding:0 1.5rem; flex-shrink:0; }
    .nav-btn { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); color:rgba(255,255,255,.75); font-size:.82rem; font-weight:500; padding:.4rem 1rem; border-radius:7px; cursor:pointer; transition:all .2s; }
    .nav-btn:hover { background:rgba(255,255,255,.10); color:#fff; }
    .nav-btn:disabled { opacity:.3; cursor:not-allowed; }
    .nav-btn-primary { background:var(--digest); border-color:var(--digest); color:#fff; }
    .nav-dots { display:flex; gap:.4rem; }
    .nav-dot { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.20); cursor:pointer; transition:all .2s; }
    .nav-dot.active { background:var(--digest); transform:scale(1.3); }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">What Causes Bloating? — Script &amp; Broadcaster Notes</div>
    <div class="topbar-sub">helf.school · Digestive Health Series · Article 15</div>
  </div>
  <div class="topbar-right">
    <div class="slide-counter">Segment <span id="segNum">1</span> of 9</div>
    <div class="kbd-hint">← → keys or buttons</div>
  </div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:11.1%"></div></div>
<div class="main" id="mainContent"></div>
<div class="bottom-nav">
  <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>← Previous</button>
  <div class="nav-dots" id="navDots"></div>
  <button class="nav-btn nav-btn-primary" id="nextBtn" onclick="navigate(1)">Next →</button>
</div>

<script>
const TOTAL = 9;
const badgeClass = { opening:'badge-opening', section:'badge-section', cta:'badge-cta', closing:'badge-closing' };
const badgeLabel = { opening:'Opening', section:'Section', cta:'Call to Action', closing:'Closing' };

const slides = [

  { type:'opening', label:'Intro · Dr Paul', title:'Introduction', section:'Opening — camera on Dr Paul', timing:'⏱ ~15 seconds',
    visuals_screen: null,
    script: [
      `"I'm Dr Paul — I spent over twenty years as an NHS GP before I retired in 2019."`,
      `"Today I want to talk to you about bloating — what's actually causing it, what the evidence says about managing it, and when it matters enough to see your doctor."`,
      `"What I'm giving you here is health education, not medical advice. If anything feels relevant to you personally, please do take it to your own doctor."`,
      `"Right — let's get into it."`,
    ]
  },

  { type:'opening', label:'Segment 1 · Opening Hook', title:'The Symptom Nobody Talks About', section:'Article intro', timing:'⏱ 0:00–0:40',
    visuals_screen: { file:'bloating-visuals.html → Screen 1', what:'64% stat card', graphic:'Large bold "64%" in amber. Label: "of UK adults reported bloating in the past month". Sub-label: "The most anxiety-provoking digestive symptom in the UK — yet most people never mention it to their doctor." Source: Eur J Nutr 2025.' },
    script: [
      `"Bloating is one of the most common digestive symptoms there is. Nearly two thirds of UK adults experience it in any given month."`,
      `<span class="script-pause">PAUSE</span>`,
      `"Most people don't mention it to their GP. They assume it's normal, or something they ate, or just something to put up with. And yet bloating is the digestive symptom that causes the most anxiety — more than heartburn, more than abdominal pain."`,
      `"So let's take it seriously. Because in most cases, there's a reason for it — and once you know the reason, it's manageable."`,
    ]
  },

  { type:'section', label:'Segment 2 · Section 1', title:'What Is Actually Happening', section:'Article Section 1 — What is it?', timing:'⏱ 0:40–1:30',
    visuals_screen: { file:'bloating-gut-screen.html', what:'Gut diagram — how bloating happens', graphic:'Cross-section of abdomen showing small intestine and colon. Animated: undigested carbohydrates arrive → bacteria ferment → gas produced → gut wall distends. Labels: fermentation zone, gas production, nerve sensitivity, distension. Two states shown side by side: normal vs bloated.' },
    script: [
      `"Bloating isn't one thing. There are several different mechanisms — and which one applies to you determines what you do about it."`,
      `"The most common: certain carbohydrates — particularly FODMAPs — aren't fully absorbed in the small intestine. They pass into the colon, where bacteria ferment them rapidly and produce gas. The gut distends. You feel bloated. We'll come back to FODMAP foods in a moment — you may well have heard of them, but not be entirely sure what they are."`,
      `"But gas production is only part of the story. Some people produce entirely normal amounts of gas — but their gut nerves are oversensitive. They feel what most people wouldn't notice. This is called visceral hypersensitivity, and it's central to IBS."`,
      `"There's also impaired gas transit — gas that doesn't move through efficiently. Constipation makes this worse. Slowed gut motility means pressure builds rather than passing."`,
      `"And then there's SIBO — Small Intestinal Bacterial Overgrowth — where bacteria that normally live in the colon end up in the small intestine and ferment food much earlier than they should."`,
    ]
  },

  { type:'section', label:'Segment 3 · Section 1 cont.', title:'The Six Main Causes', section:'Article Section 1 — causes grid', timing:'⏱ 1:30–2:15',
    visuals_screen: { file:'bloating-visuals.html → Screen 3', what:'Six causes cards animating in', graphic:'Six numbered cards animating in one by one: 🫧 Excess gas production · 🔄 Impaired gas transit · 🧠 Visceral hypersensitivity · 🦠 SIBO · 🥛 Food intolerances · ⚖️ Gut microbiome imbalance. Amber FODMAP callout below pointing to next screen.' },
    script: [
      `"So the six main causes are: excess gas production from fermentation; impaired gas transit; visceral hypersensitivity; SIBO; food intolerances — particularly lactose and fructose; and gut microbiome imbalance."`,
      `"The reason this matters is that each one has a different approach. If you've been told to try a low-FODMAP diet and it hasn't worked, it's possible your bloating isn't FODMAP-driven — it might be visceral hypersensitivity, or constipation, or something else entirely."`,
      `"There are also less common but important causes — coeliac disease, and in women, persistent unexplained bloating can occasionally be the first sign of an ovarian problem. That's a reason not to just ignore it."`,
    ]
  },

  { type:'section', label:'Segment 4 · Section 1 cont.', title:'FODMAPs — What to Eat and What to Avoid', section:'Article Section 1 — FODMAP table', timing:'⏱ 2:15–3:00',
    visuals_screen: { file:'bloating-visuals.html → Screen 4  |  bloating-fodmap-screen.html', what:'FODMAP swap table — visuals screen or full-screen camera-ready', graphic:'Full-screen colour-coded swap table. Left column: food category (Dairy, Grains, Veg, Fruit, Legumes, Sweeteners). Middle: High FODMAP (red) — foods to trial-exclude. Right: Low FODMAP (green) — alternatives. Bold, large text for filming.' },
    script: [
      `"FODMAPs — Fermentable Oligosaccharides, Disaccharides, Monosaccharides And Polyols. A group of short-chain carbohydrates that are poorly absorbed and rapidly fermented in the gut."`,
      `"The key ones: <strong>onion and garlic</strong> are among the highest FODMAP foods — they're in almost everything. <strong>Wheat</strong> — bread, pasta, cereals. <strong>Dairy</strong> — specifically the lactose. <strong>Apples, pears, mangoes</strong>. <strong>Beans and lentils</strong>."`,
      `"The low-FODMAP alternatives aren't restrictive — they're specific. Rice instead of wheat. Lactose-free milk instead of regular. Firm banana instead of apple. Hard cheese is fine. Strawberries are fine. Carrots are fine."`,
      `"One critical point: the low-FODMAP diet is a diagnostic tool, not a permanent diet. You restrict for 2 to 6 weeks, then reintroduce foods one by one to find your specific triggers. Most people can eat the majority of foods again once they've identified what actually bothers them."`,
    ]
  },

  { type:'section', label:'Segment 5 · Section 3', title:'What Your Doctor Will Do', section:'Article Section 3 — investigations & management', timing:'⏱ 3:00–3:50',
    visuals_screen: { file:'bloating-visuals.html → Screen 5', what:'Investigation & management ladder', graphic:'Two-panel layout. Left: investigations table (blood tests, breath test, coeliac screen, pelvic ultrasound). Right: management ladder — 1 Dietary (low-FODMAP, lactose exclusion) · 2 Constipation · 3 Medications · 4 Gut-brain therapies (CBT/hypnotherapy).' },
    script: [
      `"Most bloating doesn't need extensive investigation — the history is usually informative enough. But there are targeted tests when there's clinical reason."`,
      `"A blood test will check for coeliac disease, anaemia, and thyroid problems. A hydrogen breath test can diagnose lactose intolerance, fructose malabsorption, and SIBO. If you're a woman with new, persistent bloating, a pelvic ultrasound to check the ovaries is appropriate."`,
      `"Management depends on the cause. Dietary approaches — particularly a dietitian-led low-FODMAP trial — are first line. Lactose exclusion for 2 to 4 weeks is a simple first step. Addressing constipation matters — it significantly worsens bloating."`,
      `"For medication: antispasmodics like mebeverine can help with spasm. Low-dose antidepressants modulate gut-brain signalling and are genuinely useful in IBS. Rifaximin is used for SIBO when confirmed."`,
      `"Gut-directed hypnotherapy and CBT have good evidence — particularly when there's anxiety or a significant gut-brain axis component."`,
      `"One important caution: <strong>don't start a gluten-free diet before you've been tested for coeliac disease.</strong> Removing gluten beforehand will give a false-negative result."`,
    ]
  },

  { type:'section', label:'Segment 6 · Evidence in Brief', title:'What the Research Shows', section:'Article Section 4 — research', timing:'⏱ 3:50–4:30',
    visuals_screen: { file:'bloating-visuals.html → Screen 6', what:'Four research cards with take-homes', graphic:'Four cards animating in: Rome Foundation 2023 (18% weekly bloating globally) · Halmos et al 2014 (low-FODMAP crossover RCT) · Gut 2022 network meta-analysis · UK adults survey 2025 (64% bloating). Each with amber highlighted take-home sentence.' },
    script: [
      `"Let me take you through the key evidence."`,
      `"The Rome Foundation Global Epidemiology Study — 51,000 people across 26 countries including the UK — found that nearly 18% of the general population experience bloating at least once a week. Women are twice as likely as men. The authors noted it's significantly underscreened in primary care."`,
      `"The landmark FODMAP trial — Halmos and colleagues, Monash University, 2014 — was a randomised controlled crossover study. IBS patients on a low-FODMAP diet had significantly lower symptom scores, and specifically reduced bloating, pain, and wind. This is the study that put the low-FODMAP diet on the clinical map."`,
      `"A 2022 Gut network meta-analysis pooled 13 randomised trials and found the low-FODMAP diet ranked first for all endpoints — global symptoms, abdominal pain, and specifically bloating and distension."`,
      `"And a 2025 UK survey confirmed that 64% of adults — including those with no diagnosed gut condition — had bloating in the past month. It was the symptom that caused the most anxiety. This tells us bloating is not a niche problem. It's a very common one that deserves proper attention."`,
    ]
  },

  { type:'cta', label:'Segment 7 · Call to Action', title:'Three Things You Can Do', section:'Call to action', timing:'⏱ 4:30–5:00',
    visuals_screen: { file:'bloating-visuals.html → Screen 7', what:'Three action cards', graphic:'Three numbered cards: 1 — Talk to your GP (don\'t just put up with persistent bloating). 2 — Keep a food and symptom diary for 2 weeks before your appointment. 3 — If you want to try low-FODMAP, ask for a dietitian referral — don\'t do it alone.' },
    script: [
      `"<strong>First: if bloating is affecting your quality of life — talk to your GP.</strong> Don't just put up with it. There are good treatments, and there may be an underlying cause worth finding."`,
      `"<strong>Second: keep a food and symptom diary for two weeks before you go.</strong> Write down what you eat and when symptoms occur. This is more useful than any test — it helps identify patterns, and it makes your GP appointment significantly more productive."`,
      `"<strong>Third: if you want to trial low-FODMAP, ask for a referral to a registered dietitian.</strong> Done without guidance, the diet is often done incorrectly — either too restrictive, or the reintroduction phase is skipped. A dietitian makes a real difference to the outcome."`,
      `"The full article — including the FODMAP table and reference list — is at <strong>helf.school</strong>, Article 15 in the Digestive Health series."`,
    ]
  },

  { type:'closing', label:'Segment 8 · Closing', title:'Sign-off', section:'Closing — camera on Dr Paul', timing:'⏱ 5:00–5:15',
    visuals_screen: { file:'bloating-visuals.html → Screen 8', what:'helf.school closing card', graphic:'helf.school logo, tagline, series pills with Article 15 highlighted.' },
    script: [
      `"Bloating is one of those symptoms that gets dismissed too easily — by patients, and sometimes by doctors too."`,
      `"Most of the time, there's a reason. And when you find it, it's manageable. That's worth knowing."`,
      `<span class="script-pause">PAUSE</span>`,
      `"Thanks for watching. helf.school — take care of yourself."`,
    ]
  },

];

function buildSegment(s, idx) {
  let h = '';
  h += `<div class="seg-meta"><span class="type-badge ${badgeClass[s.type]}">${badgeLabel[s.type]}</span><span class="seg-label">${s.label}</span>${s.section ? `<span class="seg-section">${s.section}</span>` : ''}<span class="seg-timing">${s.timing}</span></div>`;
  h += `<div class="seg-title">${s.title}</div>`;
  if (s.visuals_screen) {
    h += `<div class="diagram-cue"><div class="diagram-cue-label">📺 Switch to visuals screen</div><div class="diagram-cue-file">${s.visuals_screen.file}</div><div class="diagram-cue-desc">${s.visuals_screen.what}</div><div class="diagram-cue-graphic">On screen: ${s.visuals_screen.graphic}</div></div>`;
  }
  h += `<div class="script-body">`;
  s.script.forEach(l => { h += `<p class="script-line">${l}</p>`; });
  h += `</div>`;
  return h;
}

let current = 0;

function renderSegment(idx) {
  document.getElementById('mainContent').innerHTML = buildSegment(slides[idx], idx);
  document.getElementById('mainContent').scrollTop = 0;
  document.getElementById('segNum').textContent = idx + 1;
  document.getElementById('progressFill').style.width = ((idx + 1) / TOTAL * 100) + '%';
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').textContent = idx === TOTAL - 1 ? '✓ Done' : 'Next →';
  document.querySelectorAll('.nav-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
}

function navigate(dir) {
  const n = current + dir;
  if (n < 0 || n >= TOTAL) return;
  current = n; renderSegment(n);
}

const de = document.getElementById('navDots');
slides.forEach((s, i) => {
  const d = document.createElement('div');
  d.className = 'nav-dot' + (i === 0 ? ' active' : '');
  d.title = s.title;
  d.onclick = () => { current = i; renderSegment(i); };
  de.appendChild(d);
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
});

renderSegment(0);
</script>
</body>
</html>
