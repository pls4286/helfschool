<script>
const TOTAL = 9;

const badgeCls = { opening:'badge-opening', section:'badge-section', cta:'badge-cta', closing:'badge-closing' };
const badgeLbl = { opening:'Opening', section:'Section', cta:'Call to Action', closing:'Closing' };

const slides = [
  // ── SLIDE 0: INTRO ──
  {type:'opening',label:'Intro · Dr Paul',title:'Introduction',timing:'⏱ ~15 seconds',visual:'s0',script:[
    `"I'm Dr Paul — I spent over twenty years as an NHS GP before I retired in 2019."`,
    `"Today I want to talk to you about <strong>acid reflux</strong> — what it is, what it does over time, and what the evidence says about how to treat it."`,
    `"Now, I do have to say upfront — what I'm giving you here is health education, not medical advice."`,
    `"If anything I talk about feels relevant to you personally, please do take it to your own doctor."`,
    `"Right — let's get into it."`,
  ]},

  // ── SLIDE 1: OPENING HOOK ──
  {type:'opening',label:'Segment 1 · Opening Hook',title:'The Burning You Learn to Live With',timing:'⏱ 0:00–0:45',visual:'s1',script:[
    `"Heartburn affects around <strong>one in four adults in the UK</strong>. Most people manage it with antacids from the chemist. Most people don't talk to their GP about it."`,
    `<span class="script-pause">PAUSE</span>`,
    `"And yet acid reflux — when it's persistent — is one of the most undertreated conditions I encountered in general practice. Not because treatment doesn't work. But because people assume it's just something you put up with."`,
    `"It isn't. And for a small but important number of people, putting up with it for years carries real risks. So let's go through what's actually happening."`,
  ]},

  // ── SLIDE 2: WHAT IS IT ──
  {type:'section',label:'Segment 2 · Section 1',title:'What\'s Actually Happening',timing:'⏱ 0:45–1:35',visual:'s2',script:[
    `<span class="diagram-cue"><span>📺 Switch to diagram screen</span>Open: ar-sphincter-screen.html — Normal vs GORD sphincter diagram</span>`,
    `"Between your oesophagus — your gullet — and your stomach, there's a muscular valve called the <strong>lower oesophageal sphincter</strong>."`,
    `"In normal digestion, it opens to let food through, then closes tightly. In acid reflux, it doesn't close properly — and stomach acid travels back up into the oesophagus."`,
    `"The oesophageal lining isn't designed to handle acid. So it becomes inflamed. That inflammation is what you experience as <strong>heartburn</strong> — the burning sensation behind the breastbone."`,
    `"When this happens frequently enough to cause symptoms or damage, it becomes GORD — Gastro-Oesophageal Reflux Disease. G-O-R-D. That's the clinical term."`,
    `"Occasional heartburn — everyone gets that. GORD is when it becomes your normal."`,
  ]},

  // ── SLIDE 3: RISK FACTORS ──
  {type:'section',label:'Segment 3 · Section 2',title:'What Makes It More Likely',timing:'⏱ 1:35–2:20',visual:'s3',script:[
    `"Several things weaken that sphincter valve or increase pressure on the stomach — making reflux more likely."`,
    `"<strong>Excess weight</strong> is the biggest modifiable factor — abdominal pressure pushes contents upwards. <strong>A hiatus hernia</strong> — where part of the stomach slides up through the diaphragm — physically disrupts the valve mechanism."`,
    `"<strong>Smoking</strong> weakens the sphincter directly and reduces saliva, which normally neutralises acid. <strong>Pregnancy</strong> both relaxes the sphincter through hormones and adds abdominal pressure as the uterus grows."`,
    `"<strong>Certain medications</strong> can worsen reflux — NSAIDs like ibuprofen, calcium channel blockers, and some antidepressants. Worth mentioning to your GP."`,
    `"<strong>Meal timing and size</strong> matter too. Large meals, eating late at night, lying flat soon after eating — all give acid more opportunity to escape upwards."`,
  ]},

  // ── SLIDE 4: WHY IT MATTERS — BARRETT'S ──
  {type:'section',label:'Segment 4 · Section 3',title:'Why Persistent GORD Matters',timing:'⏱ 2:20–3:10',visual:'s4',script:[
    `<span class="diagram-cue"><span>📺 Switch to diagram screen</span>Open: ar-barretts-screen.html — The Barrett's Pathway diagram</span>`,
    `"For most people, GORD is a nuisance. But I want to be direct about why it matters more than that."`,
    `"Repeated acid exposure inflames the oesophagus. Over time, this can cause erosions, ulceration, and in some cases narrowing — making swallowing progressively difficult."`,
    `"More importantly: in around 10–15% of people with longstanding GORD, the normal oesophageal lining is replaced by a different cell type. This is called <strong>Barrett's oesophagus</strong>."`,
    `"Barrett's is a precancerous change. Each year, approximately <strong>0.33% of people with Barrett's develop oesophageal adenocarcinoma</strong> — around 1 in 300 per year. For short-segment Barrett's, the risk is lower still, at about 0.19% per year."`,
    `"To keep this in proportion: that risk is low for any individual in any given year. But it compounds. And it's the reason that persistent, longstanding reflux — particularly in middle-aged and older men — warrants investigation."`,
    `"The good news: Barrett's can be detected by endoscopy, monitored, and in many cases treated before cancer develops. The NHS has surveillance programmes for exactly this reason."`,
  ]},

  // ── SLIDE 5: WHAT YOUR DOCTOR WILL DO ──
  {type:'section',label:'Segment 5 · Section 4',title:'What Your Doctor Will Discuss',timing:'⏱ 3:10–3:55',visual:'s5',script:[
    `"GORD is usually diagnosed from the history — there's no test needed for a typical presentation. Your GP hears a clear description of heartburn and starts treatment."`,
    `"Lifestyle first: <strong>weight loss</strong> is the most evidence-based lifestyle intervention. Raising the head of the bed, avoiding late meals, stopping smoking — all recommended in NICE guideline CG184."`,
    `"For medication, the approach is stepped. Start with antacids and alginates — Gaviscon, for instance — for mild symptoms. If those aren't enough, H2 receptor antagonists. If those aren't enough: a <strong>proton pump inhibitor</strong> — a PPI."`,
    `"PPIs — omeprazole, lansoprazole — are the most effective acid-suppressing medicines we have. One important thing: take them <strong>30 to 60 minutes before a meal</strong>. Not at bedtime. They work by blocking the proton pump — which is activated by eating. Wrong timing, reduced effect."`,
    `"Endoscopy — a camera test — isn't needed for most people. NICE recommends it when there are alarm features, or symptoms that persist despite adequate treatment."`,
    `"And alarm features — difficulty swallowing, unexplained weight loss, vomiting blood — those need urgent GP assessment. Not because they always mean something serious. But because they need to be ruled out."`,
  ]},

  // ── SLIDE 6: EVIDENCE SUMMARY ──
  {type:'section',label:'Segment 6 · Evidence in Brief',title:'What the Research Shows',timing:'⏱ 3:55–4:35',visual:'s6',script:[
    `"Let me pull out the key evidence."`,
    `"PPIs versus older H2 receptor antagonists: a large Cochrane analysis confirmed PPIs are significantly more effective at healing oesophagitis and controlling symptoms. <strong>PPIs are the right first-line treatment for GORD.</strong>"`,
    `"The LOTUS trial — a randomised controlled trial across Europe — compared laparoscopic surgery with long-term PPI treatment in over 500 patients, followed for five years. Both produced similar remission rates — around 85–90%. Surgery works as well as long-term medication in appropriately selected patients."`,
    `"On weight loss: the Nurses' Health Study found that even modest weight loss — around 3–4 kilograms — produced significant symptom improvement. This is not soft advice. It's evidence-based first-line treatment."`,
    `"On long-term PPI safety: observational data shows small associations with kidney disease, certain gut infections, and nutrient deficiencies. The absolute risks are modest and these are observational findings — not proven causation. PPIs are safe for appropriate long-term use. The key word is appropriate: lowest effective dose, reviewed regularly."`,
  ]},

  // ── SLIDE 7: CALL TO ACTION ──
  {type:'cta',label:'Segment 7 · Call to Action',title:'What You Can Do',timing:'⏱ 4:35–5:05',visual:'s7',script:[
    `"<strong>First: if you have frequent heartburn — more than twice a week — speak to your GP.</strong> Don't just manage it indefinitely with over-the-counter antacids. There are effective treatments, and it's worth getting a proper assessment."`,
    `"<strong>Second: if you're taking a PPI, check your timing.</strong> Take it 30 to 60 minutes before a meal — not at bedtime. This single change makes a meaningful difference to how well it works."`,
    `"<strong>Third: if you have any alarm features — difficulty swallowing, unexplained weight loss, vomiting blood — see your GP promptly.</strong> These need investigation. Not next month. Now."`,
    `"The full article with references is at <strong>helf.school</strong> — Article 13 in the Digestive Health series."`,
  ]},

  // ── SLIDE 8: SIGN-OFF ──
  {type:'closing',label:'Segment 8 · Closing',title:'Sign-off',timing:'⏱ 5:05–5:20',visual:'s8',script:[
    `"Acid reflux is one of those conditions where the gap between how common it is and how seriously it's taken is much too wide."`,
    `"For most people, it's very treatable. For the few where it progresses — surveillance and early treatment work. But none of that happens if you never speak to your doctor."`,
    `<span class="script-pause">PAUSE</span>`,
    `"Thanks for watching. helf.school — take care of yourself."`,
  ]},
];

// ── RENDER ──
let current = 0;

function renderSlide(idx) {
  const s = slides[idx];
  document.getElementById('segLabel').textContent = s.label;
  document.getElementById('segTitle').textContent = s.title;
  document.getElementById('segTiming').textContent = s.timing;
  document.getElementById('slideNum').textContent = idx + 1;
  document.getElementById('progressFill').style.width = ((idx+1)/TOTAL*100)+'%';
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').textContent = idx === TOTAL-1 ? '✓ Done' : 'Next slide →';

  const badge = document.getElementById('typeBadge');
  badge.className = 'slide-type-badge ' + badgeCls[s.type];
  badge.textContent = badgeLbl[s.type];

  document.querySelectorAll('.nav-dot').forEach((d,i) => d.classList.toggle('active', i===idx));

  document.getElementById('visualContent').innerHTML = visuals[s.visual]();
  document.getElementById('scriptBody').innerHTML = s.script.map(l=>`<p class="script-line">${l}</p>`).join('');
  document.getElementById('scriptBody').scrollTop = 0;
}

function navigate(dir) {
  const next = current + dir;
  if(next < 0 || next >= TOTAL) return;
  current = next;
  renderSlide(current);
}

// Build nav dots
const dotsEl = document.getElementById('navDots');
slides.forEach((s,i) => {
  const d = document.createElement('div');
  d.className = 'nav-dot' + (i===0?' active':'');
  d.title = s.title;
  d.onclick = () => { current = i; renderSlide(i); };
  dotsEl.appendChild(d);
});

// Keyboard navigation
document.addEventListener('keydown', e => {
  if(e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if(e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
});

renderSlide(0);
</script>
