<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>How to Reduce Cardiovascular Risk with Lifestyle Changes — Teleprompter | helf.school</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --bg:#000; --text:#fff; --highlight:#C8423A; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;overflow:hidden;touch-action:none}
    .controls{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(0,0,0,.90);border-bottom:1px solid rgba(255,255,255,.10);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 1rem;gap:.5rem}
    .ctrl-left{display:flex;align-items:center;gap:.75rem} .ctrl-right{display:flex;align-items:center;gap:.5rem}
    .ctrl-btn{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.20);color:#fff;font-size:.8rem;font-weight:600;padding:.35rem .85rem;border-radius:7px;cursor:pointer;transition:background .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
    .ctrl-btn:hover,.ctrl-btn:active{background:rgba(255,255,255,.22)} .ctrl-btn.active{background:var(--highlight);border-color:var(--highlight)}
    .speed-wrap,.font-wrap{display:flex;align-items:center;gap:.4rem}
    .speed-label,.font-label{font-size:.72rem;color:rgba(255,255,255,.55);white-space:nowrap}
    .speed-btn,.font-btn{width:28px;height:28px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:.9rem;font-weight:700;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
    .speed-btn:active,.font-btn:active{background:rgba(255,255,255,.25)}
    .speed-val{font-size:.8rem;font-weight:600;color:var(--highlight);min-width:18px;text-align:center}
    .seg-indicator{font-size:.72rem;color:rgba(255,255,255,.45);white-space:nowrap} .seg-indicator span{color:var(--highlight);font-weight:600}
    .scroll-outer{position:fixed;top:52px;bottom:56px;left:0;right:0;overflow:hidden}
    .scroll-outer::before,.scroll-outer::after{content:'';position:absolute;left:0;right:0;z-index:10;pointer-events:none}
    .scroll-outer::before{top:0;height:80px;background:linear-gradient(to bottom,#000 0%,transparent 100%)}
    .scroll-outer::after{bottom:0;height:80px;background:linear-gradient(to top,#000 0%,transparent 100%)}
    .reading-line{position:absolute;top:50%;left:0;right:0;height:2px;background:rgba(212,124,58,.35);z-index:9;pointer-events:none}
    .scroll-inner{padding:50vh 2rem 50vh;will-change:transform}
    .segment{margin-bottom:3.5rem}
    .seg-header{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid rgba(255,255,255,.10)}
    .seg-badge{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.15rem .55rem;border-radius:100px}
    .sb-opening{background:rgba(212,124,58,.25);color:var(--highlight)} .sb-section{background:rgba(255,255,255,.10);color:rgba(255,255,255,.70)}
    .sb-cta{background:rgba(122,158,135,.25);color:#7A9E87} .sb-closing{background:rgba(232,168,74,.25);color:#E8A84A}
    .seg-name{font-size:.72rem;font-weight:600;color:rgba(255,255,255,.45)} .seg-time{font-size:.68rem;color:rgba(255,255,255,.30);margin-left:auto}
    .seg-heading{font-size:1rem;font-weight:600;color:rgba(255,255,255,.40);margin-bottom:.85rem;letter-spacing:.02em}
    .script-line{font-size:1.9rem;line-height:1.75;color:#fff;font-weight:400;margin-bottom:.9rem;padding:.25rem 0}
    .script-line strong{color:var(--highlight);font-weight:600} .script-line em{font-style:italic;color:rgba(255,255,255,.80)}
    .pause-marker{display:inline-flex;align-items:center;gap:.4rem;background:rgba(212,124,58,.15);border:1px solid rgba(212,124,58,.35);color:var(--highlight);font-size:.85rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:.3rem .9rem;border-radius:100px;margin:.3rem 0}
    .visual-cue{display:flex;align-items:center;gap:.6rem;background:rgba(232,99,74,.12);border:2px solid rgba(232,99,74,.50);border-radius:10px;padding:.55rem 1rem;margin:.5rem 0}
    .visual-cue-icon{font-size:1.1rem;flex-shrink:0} .visual-cue-text{font-size:.95rem;font-weight:700;color:#fff;line-height:1.4} .visual-cue-text span{color:#E8634A}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(0,0,0,.90);border-top:1px solid rgba(255,255,255,.10);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1rem;gap:.5rem}
    .nav-btn{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:.82rem;font-weight:600;padding:.4rem 1rem;border-radius:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
    .nav-btn:active{background:rgba(255,255,255,.25)} .nav-btn.primary{background:var(--highlight);border-color:var(--highlight)} .nav-btn.primary:active{background:#C06A2A}
    .progress-dots{display:flex;gap:.35rem}
    .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.18);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent} .dot.active{background:var(--highlight);transform:scale(1.4)}
  </style>
</head>
<body>
<div class="controls">
  <div class="ctrl-left">
    <button class="ctrl-btn" id="playBtn" onclick="togglePlay()">▶ Play</button>
    <button class="ctrl-btn" onclick="resetScroll()">↺ Reset</button>
    <div class="speed-wrap"><div class="speed-label">Speed</div><div class="speed-btn" onclick="changeSpeed(-1)">−</div><div class="speed-val" id="speedVal">1</div><div class="speed-btn" onclick="changeSpeed(1)">+</div></div>
    <div class="font-wrap"><div class="font-label">Size</div><div class="font-btn" onclick="changeFont(-2)">A−</div><div class="font-btn" onclick="changeFont(2)">A+</div></div>
  </div>
  <div class="ctrl-right"><div class="seg-indicator">Segment <span id="segDisplay">1</span> of 10</div></div>
</div>
<div class="scroll-outer"><div class="reading-line"></div><div class="scroll-inner" id="scrollInner"></div></div>
<div class="bottom-nav">
  <button class="nav-btn" id="prevBtn" onclick="jumpSeg(-1)" disabled>← Back</button>
  <div class="progress-dots" id="dots"></div>
  <button class="nav-btn primary" id="nextBtn" onclick="jumpSeg(1)">Next →</button>
</div>
<script>
const TOTAL=10;
const segments=[

  { type:'opening', label:'Intro · Dr Paul', title:'Introduction', time:'~15 sec',
    lines:[`"I'm Dr Paul — I spent over twenty years as an NHS GP before I retired in 2019."`,`"Today I want to talk to you about <strong>lifestyle changes and cardiovascular risk</strong>."`,`"Now, I do have to say upfront — what I'm giving you here is health education, not medical advice."`,`"If anything I talk about feels relevant to you personally, please do take it to your own doctor."`,`"Right — let's get into it."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 1: Opening hook</span> · advance now</div></div>`,]},
  { type:'opening', label:'Segment 1', title:'Not Soft Options', time:'0:00–0:45',
    lines:[`"When we talk about lifestyle changes for cardiovascular health, there's a tendency to see them as the polite, gentle option — the things a doctor mentions before getting to the serious medicine."`,`"I want to challenge that framing. Because the evidence on lifestyle changes is not soft. In some areas, it's as strong as the evidence for medication — and in a few, it's stronger."`,`"The INTERHEART study — over 30,000 people across 52 countries — found that nine modifiable risk factors account for <strong>more than 90% of the risk of a first heart attack worldwide</strong>. The majority of those factors are directly influenced by lifestyle."`,`"In this video I want to go through the seven key lifestyle areas with the evidence behind each one. I'm Dr Paul — over twenty years as an NHS GP. Health education, not medical advice."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 2: Seven factors overview</span> · advance now</div></div>`,]},
  { type:'section', label:'Segment 2', title:'Seven Factors, One Direction', time:'0:45–1:20',
    lines:[`"The seven lifestyle factors with the strongest cardiovascular evidence are: <strong>diet</strong>, <strong>physical activity</strong>, <strong>smoking</strong>, <strong>body weight</strong>, <strong>alcohol</strong>, <strong>psychological stress</strong>, and <strong>sleep</strong>."`,`"These factors don't operate in isolation. They interact — often powerfully. Better sleep reduces stress. Reduced stress improves dietary choices. Regular movement improves sleep quality. Stopping smoking improves exercise tolerance."`,`"A New England Journal of Medicine analysis in 2022 found that addressing five of the biggest modifiable risk factors at age 50 could add <strong>more than ten years of cardiovascular disease-free life</strong>."`,`"Let's go through each one with the evidence."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 3: Diet — Mediterranean evidence</span> · advance now</div></div>`,]},
  { type:'section', label:'Segment 3', title:'Diet — The Mediterranean Evidence', time:'1:20–2:05',
    lines:[`"Of all dietary patterns studied in cardiovascular research, the <strong>Mediterranean diet</strong> has the most robust evidence."`,`"The PREDIMED trial — a randomised controlled trial across Spain involving nearly 7,500 people at high cardiovascular risk — found that those assigned to a Mediterranean diet supplemented with olive oil or nuts had approximately a <strong>30% reduction in major cardiovascular events</strong> compared to a control diet, over nearly five years."`,`"The Mediterranean pattern is: high intake of vegetables, fruits, legumes, whole grains, fish, and olive oil. Low intake of red meat, processed foods, and added sugars. It's not a rigid prescription — it's a pattern."`,`"An umbrella review in the BMJ in 2024 found consistent associations between <strong>ultra-processed foods</strong> and increased cardiovascular risk, independent of overall diet quality."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 4: Movement and smoking</span> · advance now</div></div>`,]},
  { type:'section', label:'Segment 4', title:'Movement and Stopping Smoking', time:'2:05–2:55',
    lines:[`"A large meta-analysis in the British Journal of Sports Medicine in 2023 — pooling data from over 30 million participants — found that <strong>meeting just half the recommended weekly activity level</strong> was associated with a 17% reduction in cardiovascular disease risk."`,`"The recommended level in the UK is 150 minutes of moderate-intensity activity per week. Half of that — 75 minutes — still produces meaningful benefit. The message is not perfection. It's movement."`,`"On smoking: it is <strong>the single most powerful modifiable cardiovascular risk factor</strong>. The good news is that the benefit of stopping begins quickly. Within one year, excess cardiovascular risk falls by around half. Within fifteen years, risk approaches that of a lifelong non-smoker."`,`"A Cochrane review found that stopping smoking after a heart attack reduces the risk of a further cardiovascular event by approximately <strong>36%</strong> — a larger effect than almost any single medication."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 5: Alcohol, stress and sleep</span> · advance now</div></div>`,]},
  { type:'section', label:'Segment 5', title:'Alcohol, Stress and Sleep', time:'2:55–3:45',
    lines:[`"On alcohol: earlier observational studies suggested a protective effect of moderate drinking. More rigorous analysis has substantially revised this."`,`"A Mendelian randomisation study in JAMA Network Open in 2022 — using genetic data from 371,000 UK Biobank participants — found that genetically predicted alcohol intake was associated with increased risk of hypertension and coronary artery disease. The apparent protective effect appears to be largely explained by confounding."`,`"On stress: the INTERHEART study identified psychosocial stress as one of nine independent risk factors for heart attack, accounting for approximately <strong>33% of attributable risk globally</strong>. Mindfulness-based stress reduction has randomised trial evidence showing measurable reductions in blood pressure."`,`"On sleep: a meta-analysis of 74 studies covering over 3 million participants found a J-shaped relationship — both <strong>too little</strong> (under 6–7 hours) and <strong>too much sleep</strong> (over 8–9 hours) are independently associated with increased cardiovascular mortality. The sweet spot is 7–8 hours."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 6: How your GP uses this</span> · advance now</div></div>`,]},
  { type:'section', label:'Segment 6', title:'How Your GP Uses This', time:'3:45–4:20',
    lines:[`"Lifestyle factors sit at the heart of every cardiovascular risk consultation. Not as a warm-up before the prescription — but as a core part of the clinical assessment."`,`"If you're referred to NHS Stop Smoking Services, your chance of quitting successfully is roughly three times higher than willpower alone. Structured weight management programmes, cardiac rehabilitation — these are referrals your GP can make."`,`"The key message is this: <strong>lifestyle changes work through multiple pathways at once</strong>. Improving diet lowers blood pressure and cholesterol. Exercise reduces insulin resistance and improves vascular function. These effects are additive — and in some combinations, more than additive."`,`"They are also compatible with medication. Statins and antihypertensives work best when combined with lifestyle modification — not instead of it."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 7: Research summary</span> · advance now</div></div>`,]},
  { type:'section', label:'Segment 7', title:'The Evidence in Summary', time:'4:20–4:55',
    lines:[`"To summarise the key findings:"`,`"Mediterranean diet: <strong>30% reduction in major cardiovascular events</strong> — PREDIMED, NEJM 2018."`,`"Physical activity: <strong>17% risk reduction from just half the recommended level</strong> — BJSM meta-analysis, 2023, 30 million participants."`,`"Smoking cessation: <strong>36% reduction in further cardiovascular events</strong> post-heart attack — Cochrane review."`,`"Alcohol: increasing evidence that there is <strong>no safe cardiovascular level</strong> for people with elevated risk — JAMA Network Open, 2022."`,`"Sleep: <strong>7–8 hours optimal</strong> — J-shaped mortality curve — JAHA meta-analysis, 74 studies, 3 million participants."`,`"The research doesn't suggest perfection. It suggests that meaningful change in even one or two areas produces measurable reductions in cardiovascular risk."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 8: What you can do</span> · advance now</div></div>`,]},
  { type:'cta', label:'Segment 8', title:'What You Can Do', time:'4:55–5:25',
    lines:[`"<strong>Pick one lever</strong>. You don't need to change everything at once. The evidence shows that even a single meaningful change — more movement, less ultra-processed food, better sleep — produces measurable cardiovascular benefit."`,`"<strong>Tell your GP what you're doing</strong>. Lifestyle changes affect your blood pressure, cholesterol, and blood glucose readings. Your GP needs to know so they can interpret your results and potentially adjust any medication."`,`"<strong>Don't treat lifestyle changes as an alternative to medication</strong>. They're not either/or. They work together — and each one strengthens the effect of the other."`,`"Full article with all evidence at <strong>helf.school</strong>."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 9: Closing card</span> · advance now</div></div>`,]},
  { type:'closing', label:'Segment 9', title:'Sign-off', time:'5:25–5:50',
    lines:[`"Cardiovascular disease is not inevitable. Most of the risk factors behind it are modifiable. And the evidence — from large randomised trials and meta-analyses covering millions of people — is clear that changing them changes outcomes."`,`"The best place to start is wherever you are right now."`,`<span class="pause-marker">⏸ PAUSE</span>`,`"Thanks for watching. All seven cardiovascular articles are on helf.school. Take care of yourself."`,]},

];
let playing=false,speed=1,fontSize=1.9,rafId=null,scrollY=0,lastTime=null,currentSeg=0;
const PX_PER_SEC_BASE=20;
function build(){const inner=document.getElementById('scrollInner');const bc={opening:'sb-opening',section:'sb-section',cta:'sb-cta',closing:'sb-closing'};const bl={opening:'Opening',section:'Section',cta:'Call to Action',closing:'Closing'};let html='';segments.forEach((s,i)=>{html+=`<div class="segment" id="seg${i}"><div class="seg-header"><span class="seg-badge ${bc[s.type]}">${bl[s.type]}</span><span class="seg-name">${s.label}</span><span class="seg-time">${s.time}</span></div><div class="seg-heading">${s.title}</div>`;s.lines.forEach(l=>{if(l.startsWith('<span class="pause-marker"')||l.startsWith('<div class="visual-cue"')){html+=`<div style="margin:.4rem 0;">${l}</div>`;}else{html+=`<div class="script-line">${l}</div>`;}}); html+=`</div>`;}); inner.innerHTML=html;const de=document.getElementById('dots');segments.forEach((s,i)=>{const d=document.createElement('div');d.className='dot'+(i===0?' active':'');d.title=s.title;d.onclick=()=>jumpToSeg(i);de.appendChild(d);});}
function getOuter(){return document.querySelector('.scroll-outer');}
function getInner(){return document.getElementById('scrollInner');}
function togglePlay(){playing=!playing;const btn=document.getElementById('playBtn');if(playing){btn.textContent='⏸ Pause';btn.classList.add('active');lastTime=null;rafId=requestAnimationFrame(tick);}else{btn.textContent='▶ Play';btn.classList.remove('active');if(rafId)cancelAnimationFrame(rafId);}}
function tick(ts){if(!lastTime)lastTime=ts;const dt=(ts-lastTime)/1000;lastTime=ts;scrollY+=PX_PER_SEC_BASE*speed*dt;applyScroll();updateSegIndicator();if(playing)rafId=requestAnimationFrame(tick);}
function applyScroll(){const inner=getInner();const max=inner.scrollHeight-window.innerHeight;scrollY=Math.min(Math.max(scrollY,0),max);inner.style.transform=`translateY(${-scrollY}px)`;}
function resetScroll(){if(playing)togglePlay();scrollY=0;applyScroll();currentSeg=0;updateDots();document.getElementById('segDisplay').textContent='1';document.getElementById('prevBtn').disabled=true;document.getElementById('nextBtn').textContent='Next →';}
function changeSpeed(dir){speed=Math.min(Math.max(speed+dir,1),6);document.getElementById('speedVal').textContent=speed;}
function changeFont(dir){fontSize=Math.min(Math.max(fontSize+dir*0.1,1.0),2.8);document.querySelectorAll('.script-line').forEach(el=>{el.style.fontSize=fontSize+'rem';});}
function getSegTop(i){const el=document.getElementById('seg'+i);if(!el)return 0;const h=getOuter().clientHeight;return el.offsetTop-h*0.5+60;}
function jumpToSeg(i){if(playing)togglePlay();currentSeg=Math.min(Math.max(i,0),segments.length-1);scrollY=Math.max(getSegTop(currentSeg),0);applyScroll();updateDots();updateSegIndicator();document.getElementById('prevBtn').disabled=currentSeg===0;document.getElementById('nextBtn').textContent=currentSeg===segments.length-1?'✓ Done':'Next →';}
function jumpSeg(dir){jumpToSeg(currentSeg+dir);}
function updateSegIndicator(){const midY=scrollY+getOuter().clientHeight*0.5;for(let i=segments.length-1;i>=0;i--){const el=document.getElementById('seg'+i);if(el&&el.offsetTop<=midY+40){if(currentSeg!==i){currentSeg=i;updateDots();document.getElementById('segDisplay').textContent=i+1;document.getElementById('prevBtn').disabled=i===0;document.getElementById('nextBtn').textContent=i===segments.length-1?'✓ Done':'Next →';}break;}}}
function updateDots(){document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===currentSeg));document.getElementById('segDisplay').textContent=currentSeg+1;}
let touchStartY=0,touchScrollY=0;
document.querySelector('.scroll-outer').addEventListener('touchstart',e=>{if(playing)return;touchStartY=e.touches[0].clientY;touchScrollY=scrollY;},{passive:true});
document.querySelector('.scroll-outer').addEventListener('touchmove',e=>{if(playing)return;scrollY=touchScrollY+(touchStartY-e.touches[0].clientY);applyScroll();updateSegIndicator();},{passive:true});
build();applyScroll();
</script></body></html>
