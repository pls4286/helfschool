const slides=[
  {type:'opening',label:'Intro · Dr Paul',title:'Introduction',timing:'⏱ ~10 seconds',visual:'s0',script:[
    `"I'm Dr Paul — I spent over twenty years as an NHS GP before I retired in 2019."`,
    `"Today I want to talk to you about <strong>statins</strong>."`,
    `"Now, I do have to say upfront — what I'm giving you here is health education, not medical advice."`,

  ]},
  {type:'opening',label:'Segment 1 · Opening Hook',title:'The Most Controversial Medicine',timing:'⏱ 0:00–0:50',visual:'s1',script:[
    `"Statins are the most prescribed medicine in England. Around <strong>eight million people</strong> in the UK take one every day."`,
    `"They are also the most argued-about medicine on the internet. Claims of widespread side effects, suggestions of a pharmaceutical cover-up, and an industry of alternative health content that says statins are harmful and unnecessary."`,
    `<span class="script-pause">PAUSE</span>`,
    `"So in this video I want to do something straightforward. I want to look at what the <strong>actual evidence says</strong> — from randomised controlled trials, from independent analyses, from the largest pooled datasets in cardiovascular medicine."`,
    `"Because the evidence and the online narrative are very different things. And I think you deserve to know the difference."`,
    `"I'm Dr Paul — over twenty years as an NHS GP. This is health education, not medical advice."`,
  ]},
  {type:'section',label:'Segment 2 · Section 1',title:'What Are Statins?',timing:'⏱ 0:50–1:35',visual:'s2',script:[
    `"Statins are a class of medication that lower LDL cholesterol — the harmful type that builds up on artery walls — by reducing the amount produced in the liver."`,
    `"They work by blocking an enzyme called <strong>HMG-CoA reductase</strong> — the key enzyme in the liver's cholesterol production pathway."`,
    `"The most commonly prescribed statin in the UK is <strong>atorvastatin</strong>. It's available as a generic medicine and costs the NHS very little — less than a pound a month in many cases."`,
    `"Statins are prescribed for two main purposes. <strong>Primary prevention</strong> — reducing risk in people who haven't yet had a cardiovascular event but whose 10-year risk score is 10% or above. And <strong>secondary prevention</strong> — reducing further risk in people who have already had a heart attack or stroke."`,
  ]},
  {type:'section',label:'Segment 3 · Section 2',title:'The Benefits — What the Evidence Shows',timing:'⏱ 1:35–2:25',visual:'s3',script:[
    `"The Cholesterol Treatment Trialists' Collaboration is the world's largest pooled analysis of statin trial data — drawing on individual participant data from over <strong>170,000 people across 26 randomised trials</strong>."`,
    `"It has consistently found that each 1 mmol/L reduction in LDL cholesterol reduces the risk of major cardiovascular events — heart attack, stroke, cardiovascular death — by approximately <strong>one fifth</strong>."`,
    `"That benefit holds across men and women, across all age groups, and regardless of starting cholesterol level."`,
    `"For secondary prevention — people who've already had a heart attack — the numbers are striking. Among every 1,000 people treated for 5 years, roughly <strong>1 in 10 avoid a further major cardiovascular event</strong> that they would otherwise have had."`,
    `"For primary prevention, the benefit is smaller in absolute terms — but still real and meaningful for those at higher risk."`,
  ]},
  {type:'section',label:'Segment 4 · Section 3',title:'The Side Effects — What the Evidence Actually Says',timing:'⏱ 2:25–3:20',visual:'s4',script:[
    `"Now — side effects. This is where the online narrative and the evidence diverge most dramatically."`,
    `"The most common concern people have is muscle pain. <strong>More than 90% of all muscle symptom reports in people taking statins are not caused by the statin</strong> — this was the finding of the 2022 Lancet analysis of individual data from 23 trials and over 150,000 people."`,
    `"The explanation is partly the <strong>nocebo effect</strong>. The ASCOT-LLA trial demonstrated this directly — when patients knew they were taking a statin, muscle symptoms were 41% more likely than when they didn't know. When blinded, the rate was virtually identical to placebo."`,
    `"Genuine statin-caused muscle problems do exist — but they are rare. <strong>Myopathy occurs in around 1 per 10,000 person-years</strong>. Severe rhabdomyolysis — dangerous muscle breakdown — is extremely rare."`,
    `"A 2026 Lancet analysis reviewed all the side effects listed on statin packaging — cognitive impairment, depression, sleep disturbance, peripheral neuropathy — and found <strong>no causal evidence for most of them</strong> from randomised trial data. It called on regulators to revise the labels."`,
    `"The genuine risks that do exist: a <strong>small increase in new-onset diabetes</strong> — around 0.2% per year — mainly in those already at higher risk. And a small increase in mild liver enzyme levels — usually clinically insignificant."`,
  ]},
  {type:'section',label:'Segment 5 · Section 4',title:'What Your Doctor Will Do',timing:'⏱ 3:20–4:00',visual:'s5',script:[
    `"If your QRISK3 score is 10% or above, your GP should offer you a statin — NICE guidance NG238 is clear on this."`,
    `"Before starting, they'll do baseline blood tests — a full lipid profile, liver function, and blood glucose. They'll ask about muscle symptoms and review any medications that might interact."`,
    `"In the UK, <strong>atorvastatin 20mg</strong> is recommended for primary prevention and <strong>atorvastatin 80mg</strong> for secondary prevention."`,
    `"Cholesterol is rechecked at three months. The target for primary prevention is a reduction of more than 40% in non-HDL cholesterol. For secondary prevention, the LDL target is 2.0 mmol/L or below."`,
    `"<strong>Important drug interactions</strong>: statins are broken down by an enzyme called CYP3A4. Drugs that block this — including clarithromycin, some antifungals, and amiodarone — can raise statin levels and increase risk. Always tell your doctor what else you're taking."`,
    `"Statins are <strong>contraindicated in pregnancy</strong>. If you're pregnant, planning a pregnancy, or breastfeeding — speak to your GP about alternatives."`,
  ]},
  {type:'section',label:'Segment 6 · The Bigger Picture',title:'Statins in Context',timing:'⏱ 4:00–4:40',visual:'s6',script:[
    `"It's worth stepping back for a moment."`,
    `"Statins have been studied in hundreds of trials involving hundreds of thousands of people over decades. The evidence base is one of the most thoroughly investigated in all of medicine."`,
    `"The finding is consistent: for people at meaningful cardiovascular risk, the benefits substantially outweigh the genuine risks."`,
    `"This doesn't mean everyone should take a statin. It means the decision should be made on the basis of your individual risk profile — not on the basis of internet articles or anecdotes."`,
    `"If you've been offered a statin and you have concerns, the right conversation to have is with your GP — with the actual evidence on the table, not the myths."`,
  ]},
  {type:'cta',label:'Segment 7 · Call to Action',title:'What You Can Do',timing:'⏱ 4:40–5:10',visual:'s7',script:[
    `"<strong>First: if you've been offered a statin, don't dismiss it based on what you've read online</strong>. Read the evidence. The helf.school statins article has all the references."`,
    `"<strong>Second: if you're already taking a statin and you have muscle symptoms</strong>, talk to your GP. Don't just stop. Symptoms can often be managed by switching statin or adjusting dose."`,
    `"<strong>Third: if you're not sure whether you need a statin</strong>, ask your GP to run your QRISK3 score. That's the starting point for an evidence-based conversation."`,
    `"Full article with all research at <strong>helf.school</strong>."`,
  ]},
  {type:'closing',label:'Segment 8 · Closing',title:'Sign-off',timing:'⏱ 5:10–5:35',visual:'s8',script:[
    `"Statins are not perfect. No medicine is. But they are among the best-evidenced cardiovascular treatments we have — and the gap between the evidence and the public perception is genuinely large."`,
    `"My hope is that this video gives you a basis for making an informed decision — one that's grounded in the actual data, not the noise."`,
    `<span class="script-pause">PAUSE</span>`,
    `"Thanks for watching. All seven cardiovascular articles are on helf.school. Take care of yourself."`,
  ]},
];

function afterRender(v){
  if(v==='s0'){const e=document.getElementById('introTopic');if(e)e.textContent='Statins — Benefits &amp; Risks';}
  if(v==='s7')[0,1,2].forEach(i=>setTimeout(()=>{const e=document.getElementById('ac'+i);if(e)e.classList.add('visible');},200+i*300));
}
const TOTAL=slides.length;
const badgeCls={opening:'badge-opening',section:'badge-section',cta:'badge-cta',closing:'badge-closing'};
const badgeLbl={opening:'Opening',section:'Content',cta:'Call to Action',closing:'Closing'};
const visualKeys=slides.map(s=>s.visual);
const slideTypes=slides.map(s=>s.type);
const slideTitles=['Introduction', 'The Most Controversial Medicine', 'What Are Statins?', 'The Benefits — What the Evidence Shows', 'The Side Effects — What the Evidence Actually Says', 'What Your Doctor Will Do', 'Statins in Context', 'What You Can Do', 'Sign-off'];
let current=0;
function renderSlide(idx){
  document.getElementById('visualContent').innerHTML=visuals[visualKeys[idx]]();
  document.getElementById('slideNum').textContent=idx+1;
  document.getElementById('progressFill').style.width=((idx+1)/TOTAL*100)+'%';
  document.getElementById('prevBtn').disabled=idx===0;
  document.getElementById('nextBtn').textContent=idx===TOTAL-1?'✓ Done':'Next →';
  const b=document.getElementById('typeBadge');
  b.className='slide-type-badge '+badgeCls[slideTypes[idx]];
  b.textContent=badgeLbl[slideTypes[idx]];
  document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}
function navigate(dir){const n=current+dir;if(n<0||n>=TOTAL)return;current=n;renderSlide(n);}
const de=document.getElementById('navDots');
slideTitles.forEach((t,i)=>{const d=document.createElement('div');d.className='nav-dot'+(i===0?' active':'');d.title=t;d.onclick=()=>{current=i;renderSlide(i);};de.appendChild(d);});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')navigate(1);if(e.key==='ArrowLeft'||e.key==='ArrowUp')navigate(-1);});
renderSlide(0);
</script>
