<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Understanding IBS — Visuals Screen | helf.school</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy:#1B2A4A; --coral:#E8634A; --cream:#FAF7F2;
      --sage:#7A9E87; --amber:#E8A84A; --digest:#D47C3A;
      --digest-dim:rgba(212,124,58,.18);
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'DM Sans',sans-serif; background:#0F1A2E; color:#fff; height:100vh; overflow:hidden; display:flex; flex-direction:column; }

    /* ── TOP BAR ── */
    .topbar { background:rgba(255,255,255,.04); border-bottom:1px solid rgba(255,255,255,.08); padding:0 1.5rem; height:48px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .topbar-sub { font-size:.75rem; color:rgba(255,255,255,.75); }
    .slide-counter { font-size:.85rem; font-weight:600; color:rgba(255,255,255,.90); }

    /* ── PROGRESS ── */
    .progress-bar { height:3px; background:rgba(255,255,255,.08); flex-shrink:0; }
    .progress-fill { height:100%; background:var(--digest); transition:width .35s ease; }

    /* ── VISUAL STAGE ── */
    .visual-stage { flex:1; background:var(--navy); display:flex; align-items:center; justify-content:center; padding:1.2rem 1rem; position:relative; overflow:hidden; }
    .visual-stage::before { content:''; position:absolute; top:-80px; right:-80px; width:280px; height:280px; border-radius:50%; background:radial-gradient(circle,rgba(212,124,58,.10) 0%,transparent 70%); pointer-events:none; }
    .slide-type-badge { position:absolute; top:12px; right:12px; font-size:.65rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; padding:.22rem .65rem; border-radius:100px; }
    .badge-opening { background:rgba(212,124,58,.20); color:var(--digest); }
    .badge-section  { background:rgba(27,42,74,.60); color:rgba(255,255,255,.85); }
    .badge-cta      { background:rgba(122,158,135,.20); color:var(--sage); }
    .badge-closing  { background:rgba(232,168,74,.20); color:var(--amber); }
    .visual-content { width:100%; max-height:100%; display:flex; align-items:center; justify-content:center; }

    /* ── BOTTOM NAV ── */
    .bottom-nav { background:rgba(255,255,255,.03); border-top:1px solid rgba(255,255,255,.07); padding:.5rem 1.5rem; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .nav-btn { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); color:rgba(255,255,255,.75); font-size:.82rem; font-weight:500; padding:.45rem 1rem; border-radius:7px; cursor:pointer; transition:all .2s; }
    .nav-btn:hover { background:rgba(255,255,255,.10); color:#fff; }
    .nav-btn:disabled { opacity:.3; cursor:not-allowed; }
    .nav-btn-primary { background:var(--digest); border-color:var(--digest); color:#fff; }
    .nav-btn-primary:hover { background:#C06A2A; }
    .nav-dots { display:flex; gap:.4rem; }
    .nav-dot { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.20); cursor:pointer; transition:all .2s; }
    .nav-dot.active { background:var(--digest); transform:scale(1.3); }

    /* ── SHARED COMPONENT STYLES ── */

    /* Stat card */
    .stat-card { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.10); border-radius:16px; padding:1.5rem 1.75rem; width:100%; max-width:360px; text-align:center; }
    .stat-big { font-family:'Fraunces',serif; font-size:3.5rem; font-weight:700; line-height:1; color:var(--digest); }
    .stat-label { font-size:.9rem; color:rgba(255,255,255,.90); margin-top:.5rem; line-height:1.5; }
    .stat-source { font-size:.75rem; color:rgba(255,255,255,.65); margin-top:.75rem; }

    /* Factor / mechanism cards */
    .cards-grid { display:grid; grid-template-columns:1fr 1fr; gap:.55rem; width:100%; }
    .f-card { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:10px; padding:.7rem .85rem; display:flex; align-items:flex-start; gap:.6rem; opacity:0; transform:translateY(8px); transition:opacity .4s ease,transform .4s ease; }
    .f-card.visible { opacity:1; transform:translateY(0); }
    .f-icon { font-size:1.1rem; flex-shrink:0; }
    .f-title { font-size:.8rem; font-weight:600; color:#fff; margin-bottom:.15rem; }
    .f-sub { font-size:.73rem; color:rgba(255,255,255,.80); line-height:1.4; }

    /* Subtype cards */
    .subtype-grid { display:grid; grid-template-columns:1fr 1fr; gap:.55rem; width:100%; }
    .subtype-card { border-radius:10px; padding:.75rem .9rem; border:1px solid; opacity:0; transform:translateY(8px); transition:opacity .4s ease,transform .4s ease; }
    .subtype-card.visible { opacity:1; transform:translateY(0); }
    .subtype-tag { display:inline-block; font-size:.72rem; font-weight:700; padding:.15rem .5rem; border-radius:100px; margin-bottom:.35rem; }
    .subtype-name { font-family:'Fraunces',serif; font-size:.88rem; font-weight:700; margin-bottom:.2rem; }
    .subtype-desc { font-size:.73rem; color:rgba(255,255,255,.80); line-height:1.4; }
    .sc-d { background:rgba(232,99,74,.08); border-color:rgba(232,99,74,.25); }
    .sc-d .subtype-tag { background:rgba(232,99,74,.15); color:#E8634A; }
    .sc-d .subtype-name { color:#E8634A; }
    .sc-c { background:rgba(122,158,135,.08); border-color:rgba(122,158,135,.25); }
    .sc-c .subtype-tag { background:rgba(122,158,135,.15); color:#7A9E87; }
    .sc-c .subtype-name { color:#7A9E87; }
    .sc-m { background:rgba(232,168,74,.07); border-color:rgba(232,168,74,.22); }
    .sc-m .subtype-tag { background:rgba(232,168,74,.15); color:#E8A84A; }
    .sc-m .subtype-name { color:#E8A84A; }
    .sc-u { background:rgba(107,94,168,.08); border-color:rgba(107,94,168,.25); }
    .sc-u .subtype-tag { background:rgba(107,94,168,.15); color:#9B8FD4; }
    .sc-u .subtype-name { color:#9B8FD4; }

    /* Treatment ladder */
    .treat-ladder { display:flex; flex-direction:column; gap:.45rem; width:100%; }
    .treat-step { display:flex; align-items:flex-start; gap:.8rem; padding:.65rem .9rem; border-radius:10px; border:1px solid; opacity:0; transform:translateX(-12px); transition:opacity .4s ease,transform .4s ease; }
    .treat-step.visible { opacity:1; transform:translateX(0); }
    .ts-num { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.75rem; font-weight:700; flex-shrink:0; margin-top:.05rem; }
    .ts-text h5 { font-size:.82rem; font-weight:600; color:#fff; margin-bottom:.12rem; }
    .ts-text p { font-size:.73rem; color:rgba(255,255,255,.80); line-height:1.4; }
    .ts1 { background:rgba(122,158,135,.08); border-color:rgba(122,158,135,.25); }
    .ts1 .ts-num { background:rgba(122,158,135,.20); color:var(--sage); }
    .ts2 { background:rgba(232,168,74,.07); border-color:rgba(232,168,74,.22); }
    .ts2 .ts-num { background:rgba(232,168,74,.18); color:var(--amber); }
    .ts3 { background:rgba(212,124,58,.08); border-color:rgba(212,124,58,.25); }
    .ts3 .ts-num { background:rgba(212,124,58,.20); color:var(--digest); }
    .ts4 { background:rgba(107,94,168,.08); border-color:rgba(107,94,168,.25); }
    .ts4 .ts-num { background:rgba(107,94,168,.20); color:#9B8FD4; }

    /* Research rows */
    .research-rows { display:flex; flex-direction:column; gap:.45rem; width:100%; }
    .rr { display:flex; flex-direction:column; gap:.25rem; padding:.55rem .7rem; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.07); border-radius:9px; opacity:0; transition:opacity .4s ease; }
    .rr.visible { opacity:1; }
    .rr-badge { font-size:.62rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; background:var(--digest-dim); color:var(--digest); padding:.18rem .5rem; border-radius:100px; align-self:flex-start; }
    .rr-text { font-size:.78rem; color:rgba(255,255,255,.85); line-height:1.5; }
    .rr-text strong { color:#fff; }
    .rr-take { display:block; margin-top:.3rem; padding:.28rem .6rem; background:rgba(212,124,58,.18); border-left:3px solid var(--digest); border-radius:0 6px 6px 0; font-size:.77rem; font-weight:700; color:#fff; line-height:1.4; }

    /* Impact cards */
    .impact-wrap { display:flex; flex-direction:column; gap:.5rem; width:100%; }
    .impact-card { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:10px; padding:.75rem 1rem; opacity:0; transform:translateY(8px); transition:opacity .4s ease,transform .4s ease; }
    .impact-card.visible { opacity:1; transform:translateY(0); }
    .impact-label { font-size:.68rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,.55); margin-bottom:.3rem; }
    .impact-text { font-size:.82rem; color:rgba(255,255,255,.85); line-height:1.5; }
    .impact-text strong { color:#fff; }
    .alarm-box { background:rgba(232,99,74,.08); border:1px solid rgba(232,99,74,.25); border-radius:10px; padding:.75rem 1rem; margin-top:.25rem; opacity:0; transform:translateY(8px); transition:opacity .4s ease,transform .4s ease; }
    .alarm-box.visible { opacity:1; transform:translateY(0); }
    .alarm-title { font-size:.76rem; font-weight:700; color:#E8634A; margin-bottom:.35rem; }
    .alarm-list { display:flex; flex-wrap:wrap; gap:.3rem; }
    .alarm-pill { font-size:.7rem; background:rgba(232,99,74,.12); border:1px solid rgba(232,99,74,.25); color:rgba(255,255,255,.85); padding:.18rem .55rem; border-radius:100px; }

    /* CTA cards */
    .cta-cards { display:flex; flex-direction:column; gap:.55rem; width:100%; }
    .cta-card { display:flex; align-items:flex-start; gap:.85rem; padding:.8rem 1rem; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); border-radius:11px; opacity:0; transform:translateY(8px); transition:opacity .4s ease,transform .4s ease; }
    .cta-card.visible { opacity:1; transform:translateY(0); }
    .cta-num { width:28px; height:28px; background:var(--digest); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.78rem; font-weight:700; color:#fff; flex-shrink:0; }
    .cta-text h5 { font-size:.87rem; font-weight:600; color:#fff; margin-bottom:.2rem; }
    .cta-text p { font-size:.77rem; color:rgba(255,255,255,.80); line-height:1.45; }

    /* Intro / closing */
    .intro-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem; text-align:center; padding:1rem; }
    .intro-logo { font-family:'Fraunces',serif; font-size:2rem; font-weight:700; color:var(--digest); }
    .intro-tagline { font-size:.72rem; color:rgba(255,255,255,.70); letter-spacing:.14em; text-transform:uppercase; }
    .intro-topic { font-family:'Fraunces',serif; font-size:1.4rem; font-weight:600; color:#fff; line-height:1.3; max-width:300px; }
    .intro-series { font-size:.72rem; color:rgba(255,255,255,.70); margin-top:.2rem; }
    .end-logo { font-family:'Fraunces',serif; font-size:2.2rem; font-weight:700; color:var(--digest); margin-bottom:.2rem; }
    .end-tagline { font-size:.78rem; color:rgba(255,255,255,.70); margin-bottom:1.25rem; }
    .end-series { display:flex; flex-wrap:wrap; gap:.35rem; justify-content:center; }
    .end-pill { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.10); color:rgba(255,255,255,.50); font-size:.68rem; padding:.18rem .65rem; border-radius:100px; }
    .end-pill.active { background:rgba(212,124,58,.14); border-color:var(--digest); color:var(--digest); }

    /* Section label */
    .sec-label { font-size:.72rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.75); text-align:center; margin-bottom:.5rem; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-sub">helf.school · Digestive Health Series · Article 16 — IBS · Visuals Screen</div>
  <div class="slide-counter">Screen <span id="slideNum">1</span> of 9</div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:11.1%"></div></div>

<div class="visual-stage" id="visualStage">
  <div class="slide-type-badge" id="typeBadge"></div>
  <div class="visual-content" id="visualContent"></div>
</div>

<div class="bottom-nav">
  <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>← Previous</button>
  <div class="nav-dots" id="navDots"></div>
  <button class="nav-btn nav-btn-primary" id="nextBtn" onclick="navigate(1)">Next →</button>
</div>

<script>
const TOTAL = 9;
const badgeCls = { opening:'badge-opening', section:'badge-section', cta:'badge-cta', closing:'badge-closing' };
const badgeLbl = { opening:'Opening', section:'Section', cta:'Call to Action', closing:'Closing' };
const slideTypes  = ['opening','opening','section','section','section','section','section','cta','closing'];
const slideTitles = ['Intro','1 in 10','Subtypes','Gut-Brain','Doctor & Treatment','Research','Why Undertreated','Action','Sign-off'];

const visuals = {

  // ── S0: INTRO ──────────────────────────────────────────────────────────
  s0: () => `
    <div class="intro-wrap">
      <div class="intro-logo">helf<span style="color:rgba(255,255,255,.60)">.</span>school</div>
      <div class="intro-tagline">Health Education</div>
      <div class="intro-topic">Understanding Irritable Bowel Syndrome</div>
      <div class="intro-series">Digestive Health Series · Article 16</div>
    </div>`,

  // ── S1: 1 IN 10 STAT ───────────────────────────────────────────────────
  s1: () => `
    <div class="stat-card">
      <div class="stat-big">1 in 10</div>
      <div class="stat-label">UK adults are affected by <strong>irritable bowel syndrome</strong> — one of the most common conditions seen in primary care worldwide</div>
      <div class="stat-source">Oka P et al. Lancet Gastroenterol Hepatol 2020 · Sperber AD et al. Gastroenterology 2021</div>
    </div>`,

  // ── S2: FOUR SUBTYPES ─────────────────────────────────────────────────
  s2: () => {
    setTimeout(() => {
      ['sc0','sc1','sc2','sc3'].forEach((id,i) => {
        setTimeout(() => { const e = document.getElementById(id); if(e) e.classList.add('visible'); }, 300 + i * 300);
      });
    }, 100);
    return `
    <div style="width:100%;display:flex;flex-direction:column;gap:.5rem;">
      <div class="sec-label">IBS — The Four Subtypes</div>
      <div class="subtype-grid">
        <div class="subtype-card sc-d" id="sc0">
          <span class="subtype-tag">IBS-D</span>
          <div class="subtype-name">Diarrhoea-predominant</div>
          <div class="subtype-desc">Loose stools, urgency, frequent bowel movements. Often triggered by eating. Most common subtype overall.</div>
        </div>
        <div class="subtype-card sc-c" id="sc1">
          <span class="subtype-tag">IBS-C</span>
          <div class="subtype-name">Constipation-predominant</div>
          <div class="subtype-desc">Hard stools, straining, feeling of incomplete emptying. Bloating prominent. More common in women.</div>
        </div>
        <div class="subtype-card sc-m" id="sc2">
          <span class="subtype-tag">IBS-M</span>
          <div class="subtype-name">Mixed</div>
          <div class="subtype-desc">Both loose stools and constipation — often alternating. Most complex to manage. Significant bloating.</div>
        </div>
        <div class="subtype-card sc-u" id="sc3">
          <span class="subtype-tag">IBS-U</span>
          <div class="subtype-name">Unclassified</div>
          <div class="subtype-desc">Meets IBS criteria but doesn't fit neatly into D, C, or M. Stool pattern varies or is inconsistent.</div>
        </div>
      </div>
      <div style="background:rgba(212,124,58,.08);border:1px solid rgba(212,124,58,.2);border-radius:9px;padding:.55rem .85rem;font-size:.75rem;color:rgba(255,255,255,.80);line-height:1.5;margin-top:.1rem;">
        IBS is now formally classified as a <strong style="color:#fff">disorder of gut-brain interaction</strong> — driven by abnormal gut-brain communication, not structural damage.
      </div>
    </div>`;
  },

  // ── S3: GUT-BRAIN MECHANISMS ──────────────────────────────────────────
  s3: () => {
    setTimeout(() => {
      ['m0','m1','m2','m3','m4'].forEach((id,i) => {
        setTimeout(() => { const e = document.getElementById(id); if(e) e.classList.add('visible'); }, 200 + i * 280);
      });
    }, 100);
    return `
    <div style="width:100%;display:flex;flex-direction:column;gap:.4rem;">
      <div class="sec-label">What Drives IBS — The Gut-Brain Axis</div>
      <div class="f-card" id="m0">
        <span class="f-icon">🔄</span>
        <div><div class="f-title">Altered gut motility</div><div class="f-sub">The gut moves too fast (diarrhoea, urgency) or too slowly (constipation, bloating). Disruption of normal bowel muscle coordination.</div></div>
      </div>
      <div class="f-card" id="m1">
        <span class="f-icon">⚡</span>
        <div><div class="f-title">Visceral hypersensitivity</div><div class="f-sub">Gut nerves are oversensitive — normal gut activity causes pain. Consistently found in IBS. Explains why symptoms are real despite normal scans.</div></div>
      </div>
      <div class="f-card" id="m2">
        <span class="f-icon">🦠</span>
        <div><div class="f-title">Altered gut microbiome</div><div class="f-sub">Gut bacteria composition differs in many people with IBS. Cause or consequence still being established — but a real finding.</div></div>
      </div>
      <div class="f-card" id="m3">
        <span class="f-icon">🤒</span>
        <div><div class="f-title">Post-infectious IBS (PI-IBS)</div><div class="f-sub">~10% of cases follow a gut infection. The infection resolves — the gut doesn't return to normal. A recognised and distinct subtype.</div></div>
      </div>
      <div class="f-card" id="m4">
        <span class="f-icon">🧠</span>
        <div><div class="f-title">The gut-brain connection</div><div class="f-sub">Bidirectional — anxiety worsens gut symptoms; gut symptoms worsen mental health. Real two-way communication via the vagus nerve.</div></div>
      </div>
    </div>`;
  },

  // ── S4: WHAT YOUR DOCTOR WILL DO ───────────────────────────────────────
  s4: () => {
    setTimeout(() => {
      ['ts0','ts1','ts2','ts3'].forEach((id,i) => {
        setTimeout(() => { const e = document.getElementById(id); if(e) e.classList.add('visible'); }, 400 + i * 300);
      });
    }, 100);
    return `
    <div style="width:100%;display:flex;flex-direction:column;gap:.4rem;">
      <div class="sec-label">Tests Your GP May Run First</div>
      <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:9px;overflow:hidden;margin-bottom:.3rem;">
        <table style="width:100%;border-collapse:collapse;font-size:.73rem;">
          <thead><tr style="background:var(--digest);">
            <th style="padding:.4rem .7rem;text-align:left;font-weight:600;letter-spacing:.04em;">Test</th>
            <th style="padding:.4rem .7rem;text-align:left;font-weight:600;letter-spacing:.04em;">Rules out</th>
          </tr></thead>
          <tbody>
            <tr style="border-bottom:1px solid rgba(255,255,255,.07);">
              <td style="padding:.35rem .7rem;color:#fff;font-weight:600;">FBC + CRP</td>
              <td style="padding:.35rem .7rem;color:rgba(255,255,255,.80);">Anaemia, inflammation — IBD or malignancy</td>
            </tr>
            <tr style="border-bottom:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.02);">
              <td style="padding:.35rem .7rem;color:#fff;font-weight:600;">Coeliac serology</td>
              <td style="padding:.35rem .7rem;color:rgba(255,255,255,.80);">Coeliac disease — common IBS-D mimic</td>
            </tr>
            <tr style="border-bottom:1px solid rgba(255,255,255,.07);">
              <td style="padding:.35rem .7rem;color:#fff;font-weight:600;">Faecal calprotectin</td>
              <td style="padding:.35rem .7rem;color:rgba(255,255,255,.80);">Gut inflammation — distinguishes IBS from IBD</td>
            </tr>
            <tr>
              <td style="padding:.35rem .7rem;color:#fff;font-weight:600;">Thyroid function</td>
              <td style="padding:.35rem .7rem;color:rgba(255,255,255,.80);">Hypothyroidism (constipation) / hyperthyroidism</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="sec-label" style="margin-top:.1rem;">Stepped Treatment</div>
      <div class="treat-ladder">
        <div class="treat-step ts1" id="ts0">
          <div class="ts-num">1</div>
          <div class="ts-text"><h5>Lifestyle &amp; dietary advice</h5><p>Regular meals, soluble fibre, reduce caffeine/alcohol. Physical activity. NICE CG61 first-line.</p></div>
        </div>
        <div class="treat-step ts2" id="ts1">
          <div class="ts-num">2</div>
          <div class="ts-text"><h5>Low-FODMAP diet — dietitian-led</h5><p>4–6 week restriction then systematic reintroduction. Effective in ~50–70% of people. Requires dietitian guidance.</p></div>
        </div>
        <div class="treat-step ts3" id="ts2">
          <div class="ts-num">3</div>
          <div class="ts-text"><h5>Symptom-specific medications</h5><p>Antispasmodics for cramps · Loperamide for IBS-D · Laxatives for IBS-C · Peppermint oil capsules.</p></div>
        </div>
        <div class="treat-step ts4" id="ts3">
          <div class="ts-num">4</div>
          <div class="ts-text"><h5>Second-line — neuromodulators &amp; psychological therapies</h5><p>Low-dose amitriptyline (ATLANTIS 2023) · Gut-directed hypnotherapy · CBT.</p></div>
        </div>
      </div>
    </div>`;
  },

  // ── S5: RESEARCH ────────────────────────────────────────────────────────
  s5: () => {
    setTimeout(() => {
      document.querySelectorAll('.rr').forEach((r,i) => {
        setTimeout(() => r.classList.add('visible'), 200 + i * 280);
      });
    }, 150);
    return `
    <div class="research-rows">
      <div class="sec-label">Key Evidence</div>
      <div class="rr">
        <div class="rr-badge">Oka et al. · Lancet Gastroenterol 2020</div>
        <div class="rr-text"><strong>Global IBS prevalence</strong> — systematic review, worldwide data. Rome III: 9.2% global. Rome IV: 3.8%. UK: ~1 in 10.
          <span class="rr-take">→ IBS is one of the most common chronic conditions in primary care.</span>

        </div>

  },

// ── RENDER ────────────────────────────────────────────────────────────────
const visualKeys = ['s0','s1','s2','s3','s4','s5','s6','s7','s8'];
let current = 0;

function renderSlide(idx) {
  const key = visualKeys[idx];
  document.getElementById('visualContent').innerHTML = visuals[key]();
  document.getElementById('slideNum').textContent = idx + 1;
  document.getElementById('progressFill').style.width = ((idx+1)/TOTAL*100)+'%';
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').textContent = idx === TOTAL-1 ? '✓ Done' : 'Next →';
  const badge = document.getElementById('typeBadge');
  badge.className = 'slide-type-badge ' + badgeCls[slideTypes[idx]];
  badge.textContent = badgeLbl[slideTypes[idx]];
  document.querySelectorAll('.nav-dot').forEach((d,i) => d.classList.toggle('active', i===idx));
}

function navigate(dir) {
  const next = current + dir;
  if(next < 0 || next >= TOTAL) return;
  current = next;
  renderSlide(current);
}

const dotsEl = document.getElementById('navDots');
slideTitles.forEach((t,i) => {
  const d = document.createElement('div');
  d.className = 'nav-dot' + (i===0?' active':'');
  d.title = t;
  d.onclick = () => { current = i; renderSlide(i); };
  dotsEl.appendChild(d);
});

document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight'||e.key==='ArrowDown') navigate(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')   navigate(-1);
});

renderSlide(0);
</script>
