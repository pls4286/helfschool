<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Acid Reflux — Causes, Symptoms and Treatment — Teleprompter | helf.school</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --bg:#000; --text:#fff; --highlight:#D47C3A; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;overflow:hidden;touch-action:none}
    .controls{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(0,0,0,.90);border-bottom:1px solid rgba(255,255,255,.10);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 1rem;gap:.5rem}
    .ctrl-left{display:flex;align-items:center;gap:.75rem} .ctrl-right{display:flex;align-items:center;gap:.5rem}
    .ctrl-btn{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.20);color:#fff;font-size:.8rem;font-weight:600;padding:.35rem .85rem;border-radius:7px;cursor:pointer;transition:background .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
    .ctrl-btn:hover,.ctrl-btn:active{background:rgba(255,255,255,.22)} .ctrl-btn.active{background:var(--highlight);border-color:var(--highlight)}
    .speed-wrap,.font-wrap{display:flex;align-items:center;gap:.4rem}
    .speed-label,.font-label{font-size:.72rem;color:rgba(255,255,255,.55);white-space:nowrap}
    .speed-btn,.font-btn{width:28px;height:28px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:.9rem;font-weight:700;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
    .speed-btn:active,.font-btn:active{background:rgba(255,255,255,.25)}
    .speed-val{font-size:.8rem;font-weight:600;color:var(--highlight);min-width:18px;text-align:center}
    .seg-indicator{font-size:.72rem;color:rgba(255,255,255,.45);white-space:nowrap} .seg-indicator span{color:var(--highlight);font-weight:600}
    .scroll-outer{position:fixed;top:52px;bottom:56px;left:0;right:0;overflow:hidden}
    .scroll-outer::before,.scroll-outer::after{content:'';position:absolute;left:0;right:0;z-index:10;pointer-events:none}
    .scroll-outer::before{top:0;height:80px;background:linear-gradient(to bottom,#000 0%,transparent 100%)}
    .scroll-outer::after{bottom:0;height:80px;background:linear-gradient(to top,#000 0%,transparent 100%)}
    .reading-line{position:absolute;top:50%;left:0;right:0;height:2px;background:rgba(212,124,58,.35);z-index:9;pointer-events:none}
    .scroll-inner{padding:50vh 2rem 50vh;will-change:transform}
    .segment{margin-bottom:3.5rem}
    .seg-header{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid rgba(255,255,255,.10)}
    .seg-badge{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.15rem .55rem;border-radius:100px}
    .sb-opening{background:rgba(212,124,58,.25);color:var(--highlight)} .sb-section{background:rgba(255,255,255,.10);color:rgba(255,255,255,.70)}
    .sb-cta{background:rgba(122,158,135,.25);color:#7A9E87} .sb-closing{background:rgba(232,168,74,.25);color:#E8A84A}
    .seg-name{font-size:.72rem;font-weight:600;color:rgba(255,255,255,.45)} .seg-time{font-size:.68rem;color:rgba(255,255,255,.30);margin-left:auto}
    .seg-heading{font-size:1rem;font-weight:600;color:rgba(255,255,255,.40);margin-bottom:.85rem;letter-spacing:.02em}
    .script-line{font-size:1.9rem;line-height:1.75;color:#fff;font-weight:400;margin-bottom:.9rem;padding:.25rem 0}
    .script-line strong{color:var(--highlight);font-weight:600} .script-line em{font-style:italic;color:rgba(255,255,255,.80)}
    .pause-marker{display:inline-flex;align-items:center;gap:.4rem;background:rgba(212,124,58,.15);border:1px solid rgba(212,124,58,.35);color:var(--highlight);font-size:.85rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:.3rem .9rem;border-radius:100px;margin:.3rem 0}
    .visual-cue{display:flex;align-items:center;gap:.6rem;background:rgba(232,99,74,.12);border:2px solid rgba(232,99,74,.50);border-radius:10px;padding:.55rem 1rem;margin:.5rem 0}
    .visual-cue-icon{font-size:1.1rem;flex-shrink:0} .visual-cue-text{font-size:.95rem;font-weight:700;color:#fff;line-height:1.4} .visual-cue-text span{color:#E8634A}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(0,0,0,.90);border-top:1px solid rgba(255,255,255,.10);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1rem;gap:.5rem}
    .nav-btn{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:.82rem;font-weight:600;padding:.4rem 1rem;border-radius:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
    .nav-btn:active{background:rgba(255,255,255,.25)} .nav-btn.primary{background:var(--highlight);border-color:var(--highlight)} .nav-btn.primary:active{background:#C06A2A}
    .progress-dots{display:flex;gap:.35rem}
    .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.18);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent} .dot.active{background:var(--highlight);transform:scale(1.4)}
  </style>
</head>
<body>
<div class="controls">
  <div class="ctrl-left">
    <button class="ctrl-btn" id="playBtn" onclick="togglePlay()">▶ Play</button>
    <button class="ctrl-btn" onclick="resetScroll()">↺ Reset</button>
    <div class="speed-wrap"><div class="speed-label">Speed</div><div class="speed-btn" onclick="changeSpeed(-1)">−</div><div class="speed-val" id="speedVal">1</div><div class="speed-btn" onclick="changeSpeed(1)">+</div></div>
    <div class="font-wrap"><div class="font-label">Size</div><div class="font-btn" onclick="changeFont(-2)">A−</div><div class="font-btn" onclick="changeFont(2)">A+</div></div>
  </div>
  <div class="ctrl-right"><div class="seg-indicator">Segment <span id="segDisplay">1</span> of 9</div></div>
</div>
<div class="scroll-outer"><div class="reading-line"></div><div class="scroll-inner" id="scrollInner"></div></div>
<div class="bottom-nav">
  <button class="nav-btn" id="prevBtn" onclick="jumpSeg(-1)" disabled>← Back</button>
  <div class="progress-dots" id="dots"></div>
  <button class="nav-btn primary" id="nextBtn" onclick="jumpSeg(1)">Next →</button>
</div>
<script>
const TOTAL=9;
const segments=[

  { type:'opening', label:'Intro · Dr Paul', title:'Introduction', time:'~15 sec',
    lines:[`"I'm Dr Paul — I spent over twenty years as an NHS GP before I retired in 2019."`,`"Today I want to talk to you about <strong>acid reflux</strong> — what it is, what it does over time, and what the evidence says about how to treat it."`,`"Now, I do have to say upfront — what I'm giving you here is health education, not medical advice."`,`"If anything I talk about feels relevant to you personally, please do take it to your own doctor."`,`"Right — let's get into it."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 1: 1 in 4 stat card</span> · advance now</div></div>`,]},
  { type:'opening', label:'Segment 1', title:'The Burning You Learn to Live With', time:'0:00–0:45',
    lines:[`"Heartburn affects around <strong>one in four adults in the UK</strong>. Most people manage it with antacids from the chemist. Most people don't talk to their GP about it."`,`<span class="pause-marker">⏸ PAUSE</span>`,`"And yet acid reflux — when it's persistent — is one of the most undertreated conditions I encountered in general practice. Not because treatment doesn't work. But because people assume it's just something you put up with."`,`"It isn't. And for a small but important number of people, putting up with it for years carries real risks. So let's go through what's actually happening."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 2: LOS anatomy diagram</span> · advance now</div></div>`,]},
  { type:'section', label:'Segment 2', title:"What's Actually Happening", time:'0:45–1:35',
    lines:[`"Between your oesophagus — your gullet — and your stomach, there's a muscular valve called the <strong>lower oesophageal sphincter</strong>."`,`"In normal digestion, it opens to let food through, then closes tightly. In acid reflux, it doesn't close properly — and stomach acid travels back up into the oesophagus."`,`"The oesophageal lining isn't designed to handle acid. So it becomes inflamed. That inflammation is what you experience as <strong>heartburn</strong> — the burning sensation behind the breastbone."`,`"When this happens frequently enough to cause symptoms or damage, it becomes GORD — Gastro-Oesophageal Reflux Disease. G-O-R-D. That's the clinical term."`,`"Occasional heartburn — everyone gets that. GORD is when it becomes your normal."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 3: Risk factor cards</span> · advance now</div></div>`,]},
  { type:'section', label:'Segment 3', title:'What Makes It More Likely', time:'1:35–2:20',
    lines:[`"Several things weaken that sphincter valve or increase pressure on the stomach — making reflux more likely."`,`"<strong>Excess weight</strong> is the biggest modifiable factor — abdominal pressure pushes contents upwards. <strong>A hiatus hernia</strong> — where part of the stomach slides up through the diaphragm — physically disrupts the valve mechanism."`,`"<strong>Smoking</strong> weakens the sphincter directly and reduces saliva, which normally neutralises acid. <strong>Pregnancy</strong> both relaxes the sphincter through hormones and adds abdominal pressure as the uterus grows."`,`"<strong>Certain medications</strong> can worsen reflux — NSAIDs like ibuprofen, calcium channel blockers, and some antidepressants. Worth mentioning to your GP."`,`"<strong>Meal timing and size</strong> matter too. Large meals, eating late at night, lying flat soon after eating — all give acid more opportunity to escape upwards."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 4: Barrett's pathway diagram</span> · advance now</div></div>`,]},
  { type:'section', label:'Segment 4', title:"Why Persistent GORD Matters", time:'2:20–3:10',
    lines:[`"For most people, GORD is a nuisance. But I want to be direct about why it matters more than that."`,`"Repeated acid exposure inflames the oesophagus. Over time, this can cause erosions, ulceration, and in some cases narrowing — making swallowing progressively difficult."`,`"More importantly: in around 10–15% of people with longstanding GORD, the normal oesophageal lining is replaced by a different cell type. This is called <strong>Barrett's oesophagus</strong>."`,`"Barrett's is a precancerous change. Each year, approximately <strong>0.33% of people with Barrett's develop oesophageal adenocarcinoma</strong> — around 1 in 300 per year. For short-segment Barrett's, the risk is lower still, at about 0.19% per year."`,`"To keep this in proportion: that risk is low for any individual in any given year. But it compounds. And it's the reason that persistent, longstanding reflux — particularly in middle-aged and older men — warrants investigation."`,`"The good news: Barrett's can be detected by endoscopy, monitored, and in many cases treated before cancer develops. The NHS has surveillance programmes for exactly this reason."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 5: Stepped care medication ladder</span> · advance now</div></div>`,]},
  { type:'section', label:'Segment 5', title:'What Your Doctor Will Discuss', time:'3:10–3:55',
    lines:[`"GORD is usually diagnosed from the history — there's no test needed for a typical presentation. Your GP hears a clear description of heartburn and starts treatment."`,`"Lifestyle first: <strong>weight loss</strong> is the most evidence-based lifestyle intervention. Raising the head of the bed, avoiding late meals, stopping smoking — all recommended in NICE guideline CG184."`,`"For medication, the approach is stepped. Start with antacids and alginates — Gaviscon, for instance — for mild symptoms. If those aren't enough, H2 receptor antagonists. If those aren't enough: a <strong>proton pump inhibitor</strong> — a PPI."`,`"PPIs — omeprazole, lansoprazole — are the most effective acid-suppressing medicines we have. One important thing: take them <strong>30 to 60 minutes before a meal</strong>. Not at bedtime. They work by blocking the proton pump — which is activated by eating. Wrong timing, reduced effect."`,`"Endoscopy — a camera test — isn't needed for most people. NICE recommends it when there are alarm features, or symptoms that persist despite adequate treatment."`,`"And alarm features — difficulty swallowing, unexplained weight loss, vomiting blood — those need urgent GP assessment. Not because they always mean something serious. But because they need to be ruled out."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 6: Research evidence cards</span> · advance now</div></div>`,]},
  { type:'section', label:'Segment 6', title:'What the Research Shows', time:'3:55–4:35',
    lines:[`"Let me pull out the key evidence."`,`"PPIs versus older H2 receptor antagonists: a large Cochrane analysis confirmed PPIs are significantly more effective at healing oesophagitis and controlling symptoms. <strong>PPIs are the right first-line treatment for GORD.</strong>"`,`"The LOTUS trial — a randomised controlled trial across Europe — compared laparoscopic surgery with long-term PPI treatment in over 500 patients, followed for five years. Both produced similar remission rates — around 85–90%. Surgery works as well as long-term medication in appropriately selected patients."`,`"On weight loss: the Nurses' Health Study found that even modest weight loss — around 3–4 kilograms — produced significant symptom improvement. This is not soft advice. It's evidence-based first-line treatment."`,`"On long-term PPI safety: observational data shows small associations with kidney disease, certain gut infections, and nutrient deficiencies. The absolute risks are modest and these are observational findings — not proven causation. PPIs are safe for appropriate long-term use. The key word is appropriate: lowest effective dose, reviewed regularly."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 7: Three action cards</span> · advance now</div></div>`,]},
  { type:'cta', label:'Segment 7', title:'What You Can Do', time:'4:35–5:05',
    lines:[`"<strong>First: if you have frequent heartburn — more than twice a week — speak to your GP.</strong> Don't just manage it indefinitely with over-the-counter antacids. There are effective treatments, and it's worth getting a proper assessment."`,`"<strong>Second: if you're taking a PPI, check your timing.</strong> Take it 30 to 60 minutes before a meal — not at bedtime. This single change makes a meaningful difference to how well it works."`,`"<strong>Third: if you have any alarm features — difficulty swallowing, unexplained weight loss, vomiting blood — see your GP promptly.</strong> These need investigation. Not next month. Now."`,`"The full article with references is at <strong>helf.school</strong> — Article 13 in the Digestive Health series."`,`<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 8: Closing card</span> · advance now</div></div>`,]},
  { type:'closing', label:'Segment 8', title:'Sign-off', time:'5:05–5:20',
    lines:[`"Acid reflux is one of those conditions where the gap between how common it is and how seriously it's taken is much too wide."`,`"For most people, it's very treatable. For the few where it progresses — surveillance and early treatment work. But none of that happens if you never speak to your doctor."`,`<span class="pause-marker">⏸ PAUSE</span>`,`"Thanks for watching. helf.school — take care of yourself."`,]},

];
let playing=false,speed=1,fontSize=1.9,rafId=null,scrollY=0,lastTime=null,currentSeg=0;
const PX_PER_SEC_BASE=20;
function build(){const inner=document.getElementById('scrollInner');const bc={opening:'sb-opening',section:'sb-section',cta:'sb-cta',closing:'sb-closing'};const bl={opening:'Opening',section:'Section',cta:'Call to Action',closing:'Closing'};let html='';segments.forEach((s,i)=>{html+=`<div class="segment" id="seg${i}"><div class="seg-header"><span class="seg-badge ${bc[s.type]}">${bl[s.type]}</span><span class="seg-name">${s.label}</span><span class="seg-time">${s.time}</span></div><div class="seg-heading">${s.title}</div>`;s.lines.forEach(l=>{if(l.startsWith('<span class="pause-marker"')||l.startsWith('<div class="visual-cue"')){html+=`<div style="margin:.4rem 0;">${l}</div>`;}else{html+=`<div class="script-line">${l}</div>`;}}); html+=`</div>`;}); inner.innerHTML=html;const de=document.getElementById('dots');segments.forEach((s,i)=>{const d=document.createElement('div');d.className='dot'+(i===0?' active':'');d.title=s.title;d.onclick=()=>jumpToSeg(i);de.appendChild(d);});}
function getOuter(){return document.querySelector('.scroll-outer');}
function getInner(){return document.getElementById('scrollInner');}
function togglePlay(){playing=!playing;const btn=document.getElementById('playBtn');if(playing){btn.textContent='⏸ Pause';btn.classList.add('active');lastTime=null;rafId=requestAnimationFrame(tick);}else{btn.textContent='▶ Play';btn.classList.remove('active');if(rafId)cancelAnimationFrame(rafId);}}
function tick(ts){if(!lastTime)lastTime=ts;const dt=(ts-lastTime)/1000;lastTime=ts;scrollY+=PX_PER_SEC_BASE*speed*dt;applyScroll();updateSegIndicator();if(playing)rafId=requestAnimationFrame(tick);}
function applyScroll(){const inner=getInner();const max=inner.scrollHeight-window.innerHeight;scrollY=Math.min(Math.max(scrollY,0),max);inner.style.transform=`translateY(${-scrollY}px)`;}
function resetScroll(){if(playing)togglePlay();scrollY=0;applyScroll();currentSeg=0;updateDots();document.getElementById('segDisplay').textContent='1';document.getElementById('prevBtn').disabled=true;document.getElementById('nextBtn').textContent='Next →';}
function changeSpeed(dir){speed=Math.min(Math.max(speed+dir,1),6);document.getElementById('speedVal').textContent=speed;}
function changeFont(dir){fontSize=Math.min(Math.max(fontSize+dir*0.1,1.0),2.8);document.querySelectorAll('.script-line').forEach(el=>{el.style.fontSize=fontSize+'rem';});}
function getSegTop(i){const el=document.getElementById('seg'+i);if(!el)return 0;const h=getOuter().clientHeight;return el.offsetTop-h*0.5+60;}
function jumpToSeg(i){if(playing)togglePlay();currentSeg=Math.min(Math.max(i,0),segments.length-1);scrollY=Math.max(getSegTop(currentSeg),0);applyScroll();updateDots();updateSegIndicator();document.getElementById('prevBtn').disabled=currentSeg===0;document.getElementById('nextBtn').textContent=currentSeg===segments.length-1?'✓ Done':'Next →';}
function jumpSeg(dir){jumpToSeg(currentSeg+dir);}
function updateSegIndicator(){const midY=scrollY+getOuter().clientHeight*0.5;for(let i=segments.length-1;i>=0;i--){const el=document.getElementById('seg'+i);if(el&&el.offsetTop<=midY+40){if(currentSeg!==i){currentSeg=i;updateDots();document.getElementById('segDisplay').textContent=i+1;document.getElementById('prevBtn').disabled=i===0;document.getElementById('nextBtn').textContent=i===segments.length-1?'✓ Done':'Next →';}break;}}}
function updateDots(){document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===currentSeg));document.getElementById('segDisplay').textContent=currentSeg+1;}
let touchStartY=0,touchScrollY=0;
document.querySelector('.scroll-outer').addEventListener('touchstart',e=>{if(playing)return;touchStartY=e.touches[0].clientY;touchScrollY=scrollY;},{passive:true});
document.querySelector('.scroll-outer').addEventListener('touchmove',e=>{if(playing)return;scrollY=touchScrollY+(touchStartY-e.touches[0].clientY);applyScroll();updateSegIndicator();},{passive:true});
build();applyScroll();
</script></body></html>
