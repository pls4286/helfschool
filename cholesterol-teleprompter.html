<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Cholesterol Explained — Teleprompter | helf.school</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --bg:#000; --text:#fff; --highlight:#C8423A; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;overflow:hidden;touch-action:none}
    .controls{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(0,0,0,.90);border-bottom:1px solid rgba(255,255,255,.10);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 1rem;gap:.5rem}
    .ctrl-left{display:flex;align-items:center;gap:.75rem}
    .ctrl-right{display:flex;align-items:center;gap:.5rem}
    .ctrl-btn{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.20);color:#fff;font-size:.8rem;font-weight:600;padding:.35rem .85rem;border-radius:7px;cursor:pointer;transition:background .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
    .ctrl-btn:hover,.ctrl-btn:active{background:rgba(255,255,255,.22)}
    .ctrl-btn.active{background:var(--highlight);border-color:var(--highlight)}
    .speed-wrap,.font-wrap{display:flex;align-items:center;gap:.4rem}
    .speed-label,.font-label{font-size:.72rem;color:rgba(255,255,255,.55);white-space:nowrap}
    .speed-btn,.font-btn{width:28px;height:28px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:.9rem;font-weight:700;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
    .speed-btn:active,.font-btn:active{background:rgba(255,255,255,.25)}
    .speed-val{font-size:.8rem;font-weight:600;color:var(--highlight);min-width:18px;text-align:center}
    .seg-indicator{font-size:.72rem;color:rgba(255,255,255,.45);white-space:nowrap}
    .seg-indicator span{color:var(--highlight);font-weight:600}
    .scroll-outer{position:fixed;top:52px;bottom:56px;left:0;right:0;overflow:hidden}
    .scroll-outer::before,.scroll-outer::after{content:'';position:absolute;left:0;right:0;z-index:10;pointer-events:none}
    .scroll-outer::before{top:0;height:80px;background:linear-gradient(to bottom,#000 0%,transparent 100%)}
    .scroll-outer::after{bottom:0;height:80px;background:linear-gradient(to top,#000 0%,transparent 100%)}
    .reading-line{position:absolute;top:50%;left:0;right:0;height:2px;background:rgba(212,124,58,.35);z-index:9;pointer-events:none}
    .scroll-inner{padding:50vh 2rem 50vh;will-change:transform}
    .segment{margin-bottom:3.5rem}
    .seg-header{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid rgba(255,255,255,.10)}
    .seg-badge{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.15rem .55rem;border-radius:100px}
    .sb-opening{background:rgba(212,124,58,.25);color:var(--highlight)}
    .sb-section{background:rgba(255,255,255,.10);color:rgba(255,255,255,.70)}
    .sb-cta{background:rgba(122,158,135,.25);color:#7A9E87}
    .sb-closing{background:rgba(232,168,74,.25);color:#E8A84A}
    .seg-name{font-size:.72rem;font-weight:600;color:rgba(255,255,255,.45)}
    .seg-time{font-size:.68rem;color:rgba(255,255,255,.30);margin-left:auto}
    .seg-heading{font-size:1rem;font-weight:600;color:rgba(255,255,255,.40);margin-bottom:.85rem;letter-spacing:.02em}
    .script-line{font-size:1.9rem;line-height:1.75;color:#fff;font-weight:400;margin-bottom:.9rem;padding:.25rem 0}
    .script-line strong{color:var(--highlight);font-weight:600}
    .script-line em{font-style:italic;color:rgba(255,255,255,.80)}
    .pause-marker{display:inline-flex;align-items:center;gap:.4rem;background:rgba(212,124,58,.15);border:1px solid rgba(212,124,58,.35);color:var(--highlight);font-size:.85rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:.3rem .9rem;border-radius:100px;margin:.3rem 0}
    .visual-cue{display:flex;align-items:center;gap:.6rem;background:rgba(232,99,74,.12);border:2px solid rgba(232,99,74,.50);border-radius:10px;padding:.55rem 1rem;margin:.5rem 0}
    .visual-cue-icon{font-size:1.1rem;flex-shrink:0}
    .visual-cue-text{font-size:.95rem;font-weight:700;color:#fff;line-height:1.4}
    .visual-cue-text span{color:#E8634A}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(0,0,0,.90);border-top:1px solid rgba(255,255,255,.10);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1rem;gap:.5rem}
    .nav-btn{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:.82rem;font-weight:600;padding:.4rem 1rem;border-radius:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
    .nav-btn:active{background:rgba(255,255,255,.25)}
    .nav-btn.primary{background:var(--highlight);border-color:var(--highlight)}
    .nav-btn.primary:active{background:#C06A2A}
    .progress-dots{display:flex;gap:.35rem}
    .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.18);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
    .dot.active{background:var(--highlight);transform:scale(1.4)}
  </style>
</head>
<body>
<div class="controls">
  <div class="ctrl-left">
    <button class="ctrl-btn" id="playBtn" onclick="togglePlay()">▶ Play</button>
    <button class="ctrl-btn" onclick="resetScroll()">↺ Reset</button>
    <div class="speed-wrap"><div class="speed-label">Speed</div><div class="speed-btn" onclick="changeSpeed(-1)">−</div><div class="speed-val" id="speedVal">1</div><div class="speed-btn" onclick="changeSpeed(1)">+</div></div>
    <div class="font-wrap"><div class="font-label">Size</div><div class="font-btn" onclick="changeFont(-2)">A−</div><div class="font-btn" onclick="changeFont(2)">A+</div></div>
  </div>
  <div class="ctrl-right"><div class="seg-indicator">Segment <span id="segDisplay">1</span> of 8</div></div>
</div>
<div class="scroll-outer">
  <div class="reading-line"></div>
  <div class="scroll-inner" id="scrollInner"></div>
</div>
<div class="bottom-nav">
  <button class="nav-btn" id="prevBtn" onclick="jumpSeg(-1)" disabled>← Back</button>
  <div class="progress-dots" id="dots"></div>
  <button class="nav-btn primary" id="nextBtn" onclick="jumpSeg(1)">Next →</button>
</div>
<script>
const TOTAL = 8;
const segments = [

  { type:'opening', label:'Intro · Dr Paul', title:'Introduction', time:'~15 sec',
    lines:[
      `"I'm Dr Paul — I spent over twenty years as an NHS GP before I retired in 2019."`,
      `"Today I want to talk to you about <strong>cholesterol</strong>."`,
      `"Now, I do have to say upfront — what I'm giving you here is health education, not medical advice."`,
      `"If anything I talk about feels relevant to you personally, please do take it to your own doctor."`,
      `"Right — let's get into it."`,
      `<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 1: 59% stat card</span> · advance now</div></div>`,
    ]
  },
  { type:'opening', label:'Segment 1', title:'The Number Nobody Checks', time:'0:00–0:45',
    lines:[
      `"Around <strong>59% of adults in England</strong> have a total cholesterol level above the threshold considered raised under NHS guidelines. That's more than half the adult population."`,
      `<span class="pause-marker">⏸ PAUSE</span>`,
      `"The striking thing about that statistic is this: <strong>high cholesterol causes no symptoms</strong>. No pain. No warning. Most people have absolutely no idea."`,
      `"And yet high cholesterol is one of the most significant contributors to heart attack and stroke — the two biggest killers in this country."`,
      `"In this video I want to explain what cholesterol actually is, why it matters, what the numbers mean — and what the evidence says we can do about it."`,
      `"I'm Dr Paul — I spent over twenty years as an NHS GP. This is health education, not medical advice."`,
      `<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 2: What is cholesterol?</span> · advance now</div></div>`,
    ]
  },
  { type:'section', label:'Segment 2', title:'What is Cholesterol?', time:'0:45–1:45',
    lines:[
      `"Cholesterol is a fatty substance found naturally in your blood. Despite its bad reputation, <strong>your body actually needs it</strong> — it plays an essential role in building healthy cells, producing hormones, and helping your body absorb vitamins."`,
      `"The problem arises when there is too much of certain types circulating in the bloodstream."`,
      `"Cholesterol is carried through the blood by proteins, forming particles called lipoproteins. There are three key types."`,
      `"<strong>LDL — low-density lipoprotein</strong> — often called bad cholesterol. When there's too much LDL, it accumulates on artery walls, forming fatty deposits called plaques that narrow and harden the arteries."`,
      `"<strong>HDL — high-density lipoprotein</strong> — often called good cholesterol. HDL carries cholesterol away from the arteries back to the liver, where it's broken down and removed."`,
      `"And <strong>non-HDL cholesterol</strong> — which is total cholesterol minus HDL. This broader measure is now the preferred one in UK clinical guidelines."`,
      `"Importantly: <strong>high cholesterol causes no symptoms</strong>. The only way to know your levels is through a blood test."`,
      `<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 3: Why does it matter?</span> · advance now</div></div>`,
    ]
  },
  { type:'section', label:'Segment 3', title:'Why Does It Matter?', time:'1:45–2:35',
    lines:[
      `"When LDL cholesterol builds up on artery walls over years, it forms plaques. These plaques narrow the arteries — reducing blood flow — and they can rupture, triggering a blood clot that blocks the artery completely. That is what causes a heart attack or stroke."`,
      `"High cholesterol accounts for <strong>over 7% of all deaths in England</strong> and a third of all ischaemic heart disease worldwide."`,
      `"An NHS England analysis estimated that if 90% of people with cardiovascular disease were identified and treated, <strong>14,000 heart attacks, strokes and premature deaths</strong> could be prevented in just three years."`,
      `"Like high blood pressure, high cholesterol is largely silent. Which is why <strong>regular testing matters</strong> — particularly from age 40 onwards."`,
      `<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 4: What your doctor will do</span> · advance now</div></div>`,
    ]
  },
  { type:'section', label:'Segment 4', title:'What Your Doctor Will Do', time:'2:35–3:30',
    lines:[
      `"Cholesterol is measured through a simple blood test — usually as part of an NHS Health Check offered to everyone aged 40 to 74 every five years, or earlier if you have risk factors."`,
      `"The test measures your total cholesterol, HDL, and triglycerides — from which your non-HDL and LDL are calculated. You don't usually need to fast beforehand under current UK guidelines."`,
      `"Your doctor will interpret the results in the context of your <strong>overall cardiovascular risk</strong> — not the numbers in isolation. Here are the general targets for most healthy adults:"`,
      `"Total cholesterol below 5.0 mmol/L. Non-HDL below 4.0 mmol/L. LDL below 3.0 mmol/L. If you already have cardiovascular disease, your targets will be lower."`,
      `"For treatment, lifestyle changes can make a real difference — reducing saturated fat, exercising regularly, maintaining a healthy weight, cutting back on alcohol, and stopping smoking."`,
      `"If medication is needed, <strong>statins</strong> are the most prescribed and best-evidenced treatment. NICE recommends offering a statin to anyone with a 10-year cardiovascular risk of 10% or more — most commonly atorvastatin."`,
      `<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 5: What the research shows</span> · advance now</div></div>`,
    ]
  },
  { type:'section', label:'Segment 5', title:'What the Research Shows', time:'3:30–4:20',
    lines:[
      `"The evidence on cholesterol and statins is among the most robust in all of medicine."`,
      `"The Cholesterol Treatment Trialists' Collaboration — the world's largest pooled analysis of statin data — found that <strong>each 1 mmol/L reduction in LDL cuts the risk of major cardiovascular events by approximately one fifth</strong>. This held across men and women, all age groups, and regardless of starting cholesterol level."`,
      `"A further analysis of 27 trials found that even in people at lower cardiovascular risk, each 1 mmol/L LDL reduction produced approximately <strong>11 fewer major vascular events per 1,000 people</strong> over five years."`,
      `"The 2025 ESC/EAS dyslipidaemia guidelines reviewed all available evidence and concluded that <strong>no supplement or vitamin was found to be both safe and effective</strong> for reducing LDL cholesterol or lowering cardiovascular risk."`,
      `"Supplements are widely marketed for cholesterol. The evidence does not support them for people at meaningful cardiovascular risk — where the case for properly monitored statin therapy is strong."`,
      `<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 6: What you can do</span> · advance now</div></div>`,
    ]
  },
  { type:'cta', label:'Segment 6', title:'What You Can Do', time:'4:20–5:00',
    lines:[
      `"<strong>First: get your cholesterol checked</strong> if it hasn't been done in the last five years. If you're over 40, an NHS Health Check will include it. You can also ask your GP."`,
      `"<strong>Second: understand your numbers</strong>. Ask your doctor what your non-HDL cholesterol is — that's the measure that matters most. Ask what your 10-year cardiovascular risk score is. These numbers together tell a much more meaningful story than total cholesterol alone."`,
      `"<strong>Third: if you've been offered a statin, consider the evidence</strong>. There's a lot of misinformation online about statins. The evidence for their benefit in people at meaningful risk is exceptionally strong. Our statins article on helf.school covers this in full."`,
      `"The full cholesterol article with all research references is on <strong>helf.school</strong>."`,
      `<div class="visual-cue"><div class="visual-cue-icon">📺</div><div class="visual-cue-text">COMING UP — <span>Screen 7: Closing card</span> · advance now</div></div>`,
    ]
  },
  { type:'closing', label:'Segment 7', title:'Sign-off', time:'5:00–5:30',
    lines:[
      `"Cholesterol is one of those topics where the gap between what people believe and what the evidence shows is particularly wide."`,
      `"The science is clear: LDL drives cardiovascular risk. That risk is modifiable. And the treatments we have — including statins — are among the safest and most effective medicines available."`,
      `<span class="pause-marker">⏸ PAUSE</span>`,
      `"Thanks for watching. The next video in this series covers statins in detail — the benefits, the real risks, and the misinformation. It's all on helf.school."`,
      `"Take care of yourself."`,
    ]
  },

];

let playing=false,speed=1,fontSize=1.9,rafId=null,scrollY=0,lastTime=null,currentSeg=0;
const PX_PER_SEC_BASE=20;

function build(){
  const inner=document.getElementById('scrollInner');
  const bc={opening:'sb-opening',section:'sb-section',cta:'sb-cta',closing:'sb-closing'};
  const bl={opening:'Opening',section:'Section',cta:'Call to Action',closing:'Closing'};
  let html='';
  segments.forEach((s,i)=>{
    html+=`<div class="segment" id="seg${i}"><div class="seg-header"><span class="seg-badge ${bc[s.type]}">${bl[s.type]}</span><span class="seg-name">${s.label}</span><span class="seg-time">${s.time}</span></div><div class="seg-heading">${s.title}</div>`;
    s.lines.forEach(l=>{
      if(l.startsWith('<span class="pause-marker"')||l.startsWith('<div class="visual-cue"')){html+=`<div style="margin:.4rem 0;">${l}</div>`;}
      else{html+=`<div class="script-line">${l}</div>`;}
    });
    html+=`</div>`;
  });
  inner.innerHTML=html;
  const de=document.getElementById('dots');
  segments.forEach((s,i)=>{const d=document.createElement('div');d.className='dot'+(i===0?' active':'');d.title=s.title;d.onclick=()=>jumpToSeg(i);de.appendChild(d);});
}

function getOuter(){return document.querySelector('.scroll-outer');}
function getInner(){return document.getElementById('scrollInner');}

function togglePlay(){
  playing=!playing;
  const btn=document.getElementById('playBtn');
  if(playing){btn.textContent='⏸ Pause';btn.classList.add('active');lastTime=null;rafId=requestAnimationFrame(tick);}
  else{btn.textContent='▶ Play';btn.classList.remove('active');if(rafId)cancelAnimationFrame(rafId);}
}

function tick(ts){
  if(!lastTime)lastTime=ts;
  const dt=(ts-lastTime)/1000;lastTime=ts;
  scrollY+=PX_PER_SEC_BASE*speed*dt;
  applyScroll();updateSegIndicator();
  if(playing)rafId=requestAnimationFrame(tick);
}

function applyScroll(){
  const inner=getInner();
  const max=inner.scrollHeight-window.innerHeight;
  scrollY=Math.min(Math.max(scrollY,0),max);
  inner.style.transform=`translateY(${-scrollY}px)`;
}

function resetScroll(){
  if(playing)togglePlay();scrollY=0;applyScroll();currentSeg=0;updateDots();
  document.getElementById('segDisplay').textContent='1';
  document.getElementById('prevBtn').disabled=true;
  document.getElementById('nextBtn').textContent='Next →';
}

function changeSpeed(dir){speed=Math.min(Math.max(speed+dir,1),6);document.getElementById('speedVal').textContent=speed;}
function changeFont(dir){
  fontSize=Math.min(Math.max(fontSize+dir*0.1,1.0),2.8);
  document.querySelectorAll('.script-line').forEach(el=>{el.style.fontSize=fontSize+'rem';});
}

function getSegTop(i){
  const el=document.getElementById('seg'+i);if(!el)return 0;
  const h=getOuter().clientHeight;
  return el.offsetTop-h*0.5+60;
}

function jumpToSeg(i){
  if(playing)togglePlay();
  currentSeg=Math.min(Math.max(i,0),segments.length-1);
  scrollY=Math.max(getSegTop(currentSeg),0);
  applyScroll();updateDots();updateSegIndicator();
  document.getElementById('prevBtn').disabled=currentSeg===0;
  document.getElementById('nextBtn').textContent=currentSeg===segments.length-1?'✓ Done':'Next →';
}

function jumpSeg(dir){jumpToSeg(currentSeg+dir);}

function updateSegIndicator(){
  const midY=scrollY+getOuter().clientHeight*0.5;
  for(let i=segments.length-1;i>=0;i--){
    const el=document.getElementById('seg'+i);
    if(el&&el.offsetTop<=midY+40){
      if(currentSeg!==i){currentSeg=i;updateDots();document.getElementById('segDisplay').textContent=i+1;document.getElementById('prevBtn').disabled=i===0;document.getElementById('nextBtn').textContent=i===segments.length-1?'✓ Done':'Next →';}
      break;
    }
  }
}

function updateDots(){
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===currentSeg));
  document.getElementById('segDisplay').textContent=currentSeg+1;
}

let touchStartY=0,touchScrollY=0;
document.querySelector('.scroll-outer').addEventListener('touchstart',e=>{if(playing)return;touchStartY=e.touches[0].clientY;touchScrollY=scrollY;},{passive:true});
document.querySelector('.scroll-outer').addEventListener('touchmove',e=>{if(playing)return;scrollY=touchScrollY+(touchStartY-e.touches[0].clientY);applyScroll();updateSegIndicator();},{passive:true});

build();applyScroll();
</script>
</body>
</html>
