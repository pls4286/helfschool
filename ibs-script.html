<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Understanding IBS — Script | helf.school</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #0F1A2E; font-family: 'DM Sans', sans-serif; overflow: hidden; color: #fff; }

    /* ── TOPBAR ── */
    .topbar {
      background: rgba(255,255,255,.04);
      border-bottom: 1px solid rgba(255,255,255,.10);
      height: 52px;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .topbar-left { display: flex; flex-direction: column; gap: .1rem; }
    .topbar-title { font-family: 'Fraunces', serif; font-size: .95rem; font-weight: 600; color: #fff; }
    .topbar-sub { font-size: .75rem; color: rgba(255,255,255,.75); }
    .topbar-right { display: flex; align-items: center; gap: 1.5rem; }
    .slide-counter { font-size: .88rem; font-weight: 600; color: rgba(255,255,255,.90); }
    .kbd-hint { font-size: .72rem; color: rgba(255,255,255,.60); }

    /* ── PROGRESS ── */
    .progress-bar { height: 3px; background: rgba(255,255,255,.08); flex-shrink: 0; }
    .progress-fill { height: 100%; background: #D47C3A; transition: width .35s ease; }

    /* ── MAIN ── */
    .main {
      height: calc(100vh - 55px - 3px - 48px);
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .main::-webkit-scrollbar { width: 4px; }
    .main::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 2px; }

    /* ── SEGMENT HEADER ── */
    .seg-meta {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: .6rem;
      flex-wrap: wrap;
    }
    .seg-label {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #D47C3A;
    }
    .seg-title {
      font-family: 'Fraunces', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: .75rem;
    }
    .seg-timing {
      font-size: .75rem;
      color: rgba(255,255,255,.65);
      margin-left: auto;
    }
    .seg-section {
      font-size: .72rem;
      color: rgba(255,255,255,.55);
      background: rgba(255,255,255,.06);
      border-radius: 4px;
      padding: .15rem .5rem;
    }

    /* ── DIAGRAM CUE ── */
    .diagram-cue {
      background: rgba(212,124,58,.12);
      border: 2px solid rgba(212,124,58,.55);
      border-radius: 10px;
      padding: .7rem 1rem;
      margin: .5rem 0 .9rem;
    }
    .diagram-cue-label {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #D47C3A;
      margin-bottom: .25rem;
    }
    .diagram-cue-file {
      font-size: .95rem;
      font-weight: 700;
      color: #fff;
      font-family: 'Fraunces', serif;
    }
    .diagram-cue-desc {
      font-size: .82rem;
      color: rgba(255,255,255,.80);
      margin-top: .2rem;
      line-height: 1.4;
    }
    .diagram-cue-graphic {
      font-size: .78rem;
      color: rgba(255,255,255,.65);
      margin-top: .25rem;
      font-style: italic;
      line-height: 1.4;
    }

    /* ── SCRIPT ── */
    .script-body { display: flex; flex-direction: column; gap: .5rem; }
    .script-line {
      font-size: 1.05rem;
      line-height: 1.8;
      color: rgba(255,255,255,.90);
      padding: .4rem .6rem;
      border-radius: 6px;
      border-left: 3px solid transparent;
    }
    .script-line:hover { background: rgba(255,255,255,.04); border-left-color: #D47C3A; }

    .script-pause {
      display: inline-block;
      background: rgba(212,124,58,.15);
      border: 1px solid rgba(212,124,58,.35);
      color: #D47C3A;
      font-size: .70rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .15rem .55rem;
      border-radius: 100px;
    }

    /* ── TYPE BADGES ── */
    .type-badge {
      display: inline-block;
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: .15rem .6rem;
      border-radius: 100px;
      margin-bottom: .35rem;
    }
    .badge-opening { background: rgba(212,124,58,.20); color: #D47C3A; }
    .badge-section  { background: rgba(255,255,255,.08); color: rgba(255,255,255,.75); }
    .badge-cta      { background: rgba(122,158,135,.20); color: #7A9E87; }
    .badge-closing  { background: rgba(232,168,74,.20);  color: #E8A84A; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      height: 48px;
      background: rgba(255,255,255,.03);
      border-top: 1px solid rgba(255,255,255,.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      flex-shrink: 0;
    }
    .nav-btn {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.75);
      font-size: .82rem;
      font-weight: 500;
      padding: .4rem 1rem;
      border-radius: 7px;
      cursor: pointer;
      transition: all .2s;
    }
    .nav-btn:hover { background: rgba(255,255,255,.10); color: #fff; }
    .nav-btn:disabled { opacity: .3; cursor: not-allowed; }
    .nav-btn-primary { background: #D47C3A; border-color: #D47C3A; color: #fff; }

    .nav-dots { display: flex; gap: .4rem; }
    .nav-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,.20);
      cursor: pointer;
      transition: all .2s;
    }
    .nav-dot.active { background: #D47C3A; transform: scale(1.3); }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">Understanding IBS — Script &amp; Broadcaster Notes</div>
    <div class="topbar-sub">helf.school · Digestive Health Series · Article 16</div>
  </div>
  <div class="topbar-right">
    <div class="slide-counter">Segment <span id="segNum">1</span> of 9</div>
    <div class="kbd-hint">← → keys or buttons</div>
  </div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:11.1%"></div></div>

<div class="main" id="mainContent"></div>

<div class="bottom-nav">
  <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>← Previous</button>
  <div class="nav-dots" id="navDots"></div>
  <button class="nav-btn nav-btn-primary" id="nextBtn" onclick="navigate(1)">Next →</button>
</div>

<script>
const TOTAL = 9;

const segments = [

  {
    type: 'opening',
    label: 'Intro · Dr Paul',
    title: 'Introduction',
    section: 'Opening — camera on Dr Paul',
    timing: '⏱ ~15 seconds',
    visuals_screen: null,
    script: [
      `"I'm Dr Paul — I spent over twenty years as an NHS GP before I retired in 2019."`,
      `"Today I want to talk to you about <strong>irritable bowel syndrome</strong> — what it actually is, what drives it, and what the evidence says about managing it."`,
      `"Now, I do have to say upfront — what I'm giving you here is health education, not medical advice."`,
      `"If anything I talk about feels relevant to you personally, please do take it to your own doctor."`,
      `"Right — let's get into it."`,
    ]
  },

  {
    type: 'opening',
    label: 'Segment 1 · Opening Hook',
    title: "The Condition That Gets Dismissed",
    section: 'Article intro — Why this matters',
    timing: '⏱ 0:00–0:45',
    visuals_screen: {
      file: 'ibs-visuals.html → Screen 1',
      what: '1 in 10 stat card with prevalence context',
      graphic: 'Large bold figure "1 in 10" — UK adults affected by IBS. Supporting text: one of the most common conditions in primary care. Source: Oka et al. Lancet Gastroenterol Hepatol 2020.'
    },
    script: [
      `"Irritable bowel syndrome affects around <strong>one in ten people in the UK</strong>. It is one of the most common reasons people see their GP. And it is one of the most consistently mismanaged."`,
      `<span class="script-pause">PAUSE</span>`,
      `"Not because GPs don't care. But because IBS doesn't show up on a scan or a blood test — and that can lead to a consultation that ends with 'everything looks normal' and very little else."`,
      `"What I want to do in this video is give you a proper understanding of what IBS actually is, why 'everything looks normal' doesn't mean you're fine, and — importantly — what the evidence says actually works."`,
    ]
  },

  {
    type: 'section',
    label: 'Segment 2 · Section 1',
    title: "What IBS Actually Is",
    section: 'Article Section 1 — What is IBS?',
    timing: '⏱ 0:45–1:40',
    visuals_screen: {
      file: 'ibs-visuals.html → Screen 2',
      what: 'Four IBS subtype cards',
      graphic: 'Four cards animating in one by one: IBS-D (Diarrhoea-predominant) · IBS-C (Constipation-predominant) · IBS-M (Mixed) · IBS-U (Unclassified). Each with tag colour, brief description of predominant symptoms.'
    },
    script: [
      `"IBS is a long-term condition characterised by recurrent abdominal pain and changes in bowel habit — diarrhoea, constipation, or alternating between both — <strong>without any structural abnormality to explain them</strong>."`,
      `"Blood tests come back normal. Scans look normal. Colonoscopies look normal. That is sometimes taken to mean the patient is fine. It doesn't mean that. It means the problem lies somewhere we can't easily image."`,
      `"IBS is now formally classified as a <strong>disorder of gut-brain interaction</strong>. That's the modern term — and it's a meaningful one. The symptoms are driven by abnormal communication between the gut and the brain. Not by damage. Not by inflammation. By a system that isn't working the way it should."`,
      `"IBS is divided into four subtypes based on the predominant bowel pattern — and this matters, because management differs between them. IBS-D, IBS-C, IBS-M for mixed, and IBS-U for unclassified."`,
    ]
  },

  {
    type: 'section',
    label: 'Segment 3 · Section 1 (continued)',
    title: "The Gut-Brain Axis — What Drives IBS",
    section: 'Article Section 1 — Mechanisms',
    timing: '⏱ 1:40–2:30',
    visuals_screen: {
      file: 'ibs-visuals.html → Screen 3',
      what: 'Five gut-brain mechanism cards',
      graphic: 'Five cards animating in: 🔄 Altered gut motility · ⚡ Visceral hypersensitivity · 🦠 Altered gut microbiome · 🤒 Post-infectious IBS (PI-IBS, ~10%) · 🧠 Gut-brain connection (bidirectional). Each with one-line explanation.'
    },
    script: [
      `"IBS isn't a single disease with a single cause. It's a syndrome — a cluster of symptoms arising from several overlapping mechanisms."`,
      `"<strong>Altered gut motility</strong> — the gut moves too fast, causing diarrhoea and urgency, or too slowly, causing constipation and bloating. <strong>Visceral hypersensitivity</strong> — the nerves of the gut are oversensitive. Normal gut activity that most people wouldn't notice is experienced as pain. This is consistently found in IBS and explains why symptoms are real even when scans look normal."`,
      `"<strong>Altered gut microbiome</strong> — the composition of gut bacteria differs in many people with IBS. Whether cause or consequence is still being established. <strong>Post-infectious IBS</strong> — around 10% of cases follow a documented gut infection. The infection resolves but the gut doesn't return to normal."`,
      `"And the <strong>gut-brain connection</strong> — this is bidirectional. Anxiety and low mood worsen gut symptoms. Gut symptoms worsen mental health. This is not psychosomatic — it's real two-way communication along the vagus nerve and enteric nervous system."`,
      `<span class="script-pause">PAUSE</span>`,
      `"One important distinction: IBS is <strong>not inflammatory bowel disease</strong> — IBD. Crohn's disease and ulcerative colitis involve chronic inflammation and structural damage. IBS does not. They are completely different conditions. If you hear them used interchangeably, that's an error."`,
    ]
  },

  {
    type: 'section',
    label: 'Segment 4 · Section 3',
    title: "What Your Doctor Will Do",
    section: 'Article Section 3 — What your doctor might do',
    timing: '⏱ 2:30–3:20',
    visuals_screen: {
      file: 'ibs-visuals.html → Screen 4',
      what: 'Diagnostic tests table + stepped treatment ladder',
      graphic: 'Top: five-row tests table (FBC+CRP / Coeliac serology / Faecal calprotectin / Thyroid / Hydrogen breath test) with "what it checks for" column. Below: four-step treatment ladder — 1 Lifestyle (green) · 2 Low-FODMAP dietitian-led (amber) · 3 Symptom-specific medications (orange) · 4 Neuromodulators + psychological therapies (purple).'
    },
    script: [
      `"IBS is a clinical diagnosis — made from the history, not from tests. But before diagnosing IBS, a GP will usually do a limited set of investigations to rule out conditions that can mimic it."`,
      `"A <strong>full blood count and CRP</strong> — looking for anaemia and inflammation, which can indicate inflammatory bowel disease or cancer. <strong>Coeliac serology</strong> — coeliac disease looks exactly like IBS-D and is missed surprisingly often. <strong>Faecal calprotectin</strong> — a stool test that distinguishes gut inflammation from functional symptoms."`,
      `"A colonoscopy is not needed for typical IBS in a younger patient without alarm features. It may be appropriate over fifty with new symptoms, or where there is diagnostic uncertainty."`,
      `"Management is stepped — start with the least intensive, best-evidenced approach and escalate if needed. <strong>Step one</strong>: lifestyle and dietary advice — regular meals, adequate soluble fibre, reducing caffeine and alcohol. <strong>Step two</strong>: a dietitian-led low-FODMAP diet trial — the strongest dietary evidence for IBS, effective in around 50–70% of people."`,
      `"<strong>Step three</strong>: symptom-specific medications — antispasmodics for cramps, loperamide for IBS-D, laxatives for IBS-C. <strong>Step four</strong>: second-line — low-dose amitriptyline and psychological therapies. More on those in a moment."`,
      `"One important note: <strong>don't start a gluten-free diet before coeliac testing.</strong> If coeliac disease is being investigated, removing gluten before the blood test will produce a false-negative result. Always test first."`,
    ]
  },

  {
    type: 'section',
    label: 'Segment 5 · Section 4',
    title: "What the Research Shows",
    section: 'Article Section 4 — What the research shows',
    timing: '⏱ 3:20–4:10',
    visuals_screen: {
      file: 'ibs-visuals.html → Screen 5',
      what: 'Four research evidence cards',
      graphic: 'Four cards animating in: 🌍 Oka et al. Lancet Gastroenterol 2020 (global prevalence 5–10%) · 🥗 Peters et al. APT 2016 (hypnotherapy = FODMAP, 74 patients) · 💊 ATLANTIS trial Lancet 2023 (amitriptyline NNT=6, p=0.0079) · 📋 Rome IV Mearin et al. Gastroenterology 2016 (diagnostic criteria). Each with key finding highlighted.'
    },
    script: [
      `"Let me pull out the key evidence."`,
      `"On <strong>prevalence</strong>: a 2020 Lancet systematic review by Oka and colleagues pooled data worldwide. Using Rome III criteria, global prevalence was 9.2%. Using the more restrictive Rome IV criteria, 3.8%. In the UK, around 1 in 10 people are affected."`,
      `"On <strong>treatment</strong>: Peters and colleagues at Monash University compared gut-directed hypnotherapy, low-FODMAP diet, and the combination in 74 IBS patients. At six weeks and six months, all three produced comparable, durable improvements. Hypnotherapy additionally improved anxiety and quality of life more than diet alone. Both interventions have separate placebo-controlled evidence — Whorwell's landmark 1984 Lancet trial for hypnotherapy, and multiple RCTs reviewed by Gibson in 2017 for low-FODMAP."`,
      `"On <strong>amitriptyline</strong>: the ATLANTIS trial, published in The Lancet in 2023, is the largest trial of a tricyclic antidepressant in IBS ever conducted. 463 patients, 55 GP practices in England, six months. Low-dose amitriptyline was significantly superior to placebo — IBS symptom score difference of 27 points, p=0.0079. Number needed to treat: <strong>6</strong>. The conclusion: GPs should offer amitriptyline to patients whose symptoms don't improve with first-line treatment."`,
      `"This is a drug GPs can prescribe. It doesn't need a specialist referral. The ATLANTIS trial has given primary care a clear signal — and it's one that hasn't yet fully translated into practice."`,
    ]
  },

  {
    type: 'section',
    label: 'Segment 6 · Why it matters',
    title: "Why IBS Gets Undertreated",
    section: 'Article Section 2 — Why does it matter?',
    timing: '⏱ 4:10–4:45',
    visuals_screen: {
      file: 'ibs-visuals.html → Screen 6',
      what: 'Impact stat cards + alarm features callout',
      graphic: 'Two stat cards: Quality of life impact — IBS affects work, relationships, travel, diet / Underdiagnosed and undertreated globally (Sperber 2021, 33 countries). Below: red alarm features box — blood in stool · unexplained weight loss · nocturnal symptoms · age over 60 · worsening pattern.'
    },
    script: [
      `"IBS significantly impairs quality of life. It affects work, social life, relationships, travel, and diet in ways that people without the condition rarely appreciate."`,
      `"And yet the 2021 Rome Foundation Global Study — 73,000 adults across 33 countries — confirmed that IBS is significantly underdiagnosed and undertreated worldwide."`,
      `"Part of the problem is the consultation dynamic. Being told 'everything looks normal' — without an explanation of what IBS is, why symptoms are real, and what can be done — leaves people without a path forward."`,
      `"I want to be clear about alarm features, because these are important. <strong>Blood in the stool, unexplained weight loss, nocturnal symptoms that wake you from sleep, symptoms starting after 60, a family history of bowel cancer or IBD, or any symptom that is new or worsening</strong> — these are not typical of IBS. They need prompt GP assessment. Not because they always mean something serious — but because other causes need to be excluded."`,
    ]
  },

  {
    type: 'cta',
    label: 'Segment 7 · Call to Action',
    title: 'What You Can Do',
    section: 'Call to action — three key messages',
    timing: '⏱ 4:45–5:10',
    visuals_screen: {
      file: 'ibs-visuals.html → Screen 7',
      what: 'Three action cards',
      graphic: 'Three numbered cards: 1 — Ask your GP for a proper IBS management plan, not just "everything is normal". 2 — Ask specifically about low-FODMAP dietitian referral and gut-directed hypnotherapy. 3 — If first-line treatment hasn\'t helped, ask about low-dose amitriptyline — the ATLANTIS trial supports its use in primary care.'
    },
    script: [
      `"<strong>First: if you have IBS, ask for a structured management plan.</strong> Not just reassurance that tests are normal. A diagnosis, an explanation, and a plan — starting with lifestyle and diet, with clear next steps if that doesn't help."`,
      `"<strong>Second: ask specifically about a low-FODMAP diet with dietitian support, and about gut-directed hypnotherapy.</strong> Both have strong trial evidence. Both are available on the NHS, though access varies. You may need to ask."`,
      `"<strong>Third: if first-line treatment hasn't worked, ask about low-dose amitriptyline.</strong> The 2023 ATLANTIS trial gives your GP a clear basis to prescribe it. It doesn't need a gastroenterology referral. It's a conversation you can have at your next appointment."`,
      `"The full article with all references is at <strong>helf.school</strong> — Article 16 in the Digestive Health series."`,
    ]
  },

  {
    type: 'closing',
    label: 'Segment 8 · Closing',
    title: 'Sign-off',
    section: 'Closing — camera on Dr Paul',
    timing: '⏱ 5:10–5:25',
    visuals_screen: {
      file: 'ibs-visuals.html → Screen 8',
      what: 'helf.school closing card',
      graphic: 'helf.school logo, tagline "Evidence-based health education for everyone", Digestive Health Series pill with Article 16 highlighted.'
    },
    script: [
      `"IBS is one of the conditions most poorly served by the traditional model of medicine — where a scan or blood test tells you what's wrong. With IBS, the investigations are normal. That doesn't mean the patient is fine."`,
      `"The good news is that the evidence base has never been stronger. Dietary therapy, psychological therapy, and medication all have solid trial evidence."`,
      `<span class="script-pause">PAUSE</span>`,
      `"If you have IBS — you deserve a proper explanation of what it is, a structured management plan, and access to the treatments that work. Don't accept 'everything's normal, it's probably stress' without more."`,
      `"Thanks for watching. helf.school — take care of yourself."`,
    ]
  },

];

// ── RENDER ──
let current = 0;

function buildSegment(s, idx) {
  const badgeClass = { opening:'badge-opening', section:'badge-section', cta:'badge-cta', closing:'badge-closing' }[s.type];
  const badgeLabel = { opening:'Opening', section:'Section', cta:'Call to Action', closing:'Closing' }[s.type];

  let html = '';

  html += `<div class="seg-meta">
    <span class="type-badge ${badgeClass}">${badgeLabel}</span>
    <span class="seg-label">${s.label}</span>
    <span class="seg-section">${s.section}</span>
    <span class="seg-timing">${s.timing}</span>
  </div>`;

  html += `<div class="seg-title">${s.title}</div>`;

  if (s.visuals_screen) {
    html += `<div class="diagram-cue">
      <div class="diagram-cue-label">📺 Switch to visuals screen</div>
      <div class="diagram-cue-file">${s.visuals_screen.file}</div>
      <div class="diagram-cue-desc">${s.visuals_screen.what}</div>
      <div class="diagram-cue-graphic">On screen: ${s.visuals_screen.graphic}</div>
    </div>`;
  }

  html += `<div class="script-body">`;
  s.script.forEach(line => {
    html += `<p class="script-line">${line}</p>`;
  });
  html += `</div>`;

  return html;
}

function renderSegment(idx) {
  const s = segments[idx];
  document.getElementById('mainContent').innerHTML = buildSegment(s, idx);
  document.getElementById('mainContent').scrollTop = 0;
  document.getElementById('segNum').textContent = idx + 1;
  document.getElementById('progressFill').style.width = ((idx + 1) / TOTAL * 100) + '%';
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').textContent = idx === TOTAL - 1 ? '✓ Done' : 'Next →';
  document.querySelectorAll('.nav-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= TOTAL) return;
  current = next;
  renderSegment(current);
}

const dotsEl = document.getElementById('navDots');
segments.forEach((s, i) => {
  const d = document.createElement('div');
  d.className = 'nav-dot' + (i === 0 ? ' active' : '');
  d.title = s.title;
  d.onclick = () => { current = i; renderSegment(i); };
  dotsEl.appendChild(d);
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
});

renderSegment(0);
</script>
</body>
</html>
